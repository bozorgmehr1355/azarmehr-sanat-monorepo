function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

const fa  = (n) => String(n).replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);

async function api(method, path, body, baseOverride) {
  const BASE = baseOverride || API_BASE;
  const token = localStorage.getItem("adminToken");
  let urlPath = path;
  // Already a backend path (/api/...), strip the prefix
  if (urlPath.startsWith("/api/")) {
    urlPath = urlPath.replace("/api/", "");
  } else {
    // Supabase-style path: convert table_name to table-name
    const qi = urlPath.indexOf("?");
    const pp = qi >= 0 ? urlPath.substring(0, qi) : urlPath;
    const qs = qi >= 0 ? urlPath.substring(qi) : "";
    urlPath = pp.replace(/_/g, "-") + qs;
  }
  const headers = {
    "Content-Type": "application/json",
    ...(token ? { Authorization: `Bearer ${token}` } : {})
  };
  const res = await fetch(`${BASE}/${urlPath}`, {
    method,
    headers,
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  if (!res.ok) {
    let errMsg = `HTTP ${res.status}`;
    try { const e = await res.json(); errMsg = e.error || e.message || errMsg; } catch(e) {}
    throw new Error(errMsg);
  }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

/** Share a PDF via Web Share API or fallback to copy-link + download. */
async function sharePdf(endpointPath, title) {
  const token = localStorage.getItem("adminToken");
  const url = `${API_BASE}/${endpointPath}`;
  // 1) Try Web Share API with the blob
  try {
    const res = await fetch(url, {
      headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) }
    });
    if (res.ok && navigator.share && navigator.canShare) {
      const blob = await res.blob();
      // Web Share API supports sharing files on modern browsers (mobile Chrome / Safari)
      const file = new File([blob], title || 'document.pdf', { type: 'application/pdf' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: title || 'سند' });
        return 'share';
      }
    }
  } catch(e) { /* fall through */ }
  // 2) Fallback: copy link to clipboard
  try {
    await navigator.clipboard.writeText(url);
    return 'copied';
  } catch(e) { /* fall through */ }
  // 3) Last resort: open in new tab
  window.open(url, '_blank');
  return 'opened';
}

/** Normalize items from any naming convention (mirrors backend _pdf.js). */
function normalizeItemRow(raw) {
  if (!raw) return null;
  const name = raw.product_name || raw.item_name || raw.name || raw.title || raw.description || null;
  if (!name) return null;
  const qty = Number(raw.qty || raw.quantity || raw.count || 0);
  const unitPrice = Number(raw.unit_price || raw.price || raw.price_unit || raw.unitAmount || 0);
  const discount = Number(raw.discount || raw.discount_amount || raw.line_discount_amount || 0);
  const unit = raw.unit || raw.packaging || raw.unit_name || '';
  let lineTotal = Number(raw.line_total || raw.total || raw.subtotal || raw.amount || 0);
  if (!lineTotal && qty && unitPrice) { lineTotal = qty * unitPrice - discount; }
  if (!lineTotal && unitPrice && !qty) { lineTotal = unitPrice; }
  return { name, qty, unitPrice, discount, unit, lineTotal };
}

/** Fallback: parse items from order notes/description (mirrors _pdf.js). */
function parseFallbackItemsFromNotes(order) {
  if (!order) return [];
  const textFields = [order.note, order.description, order.customer_note, order.admin_note, order.items_text, order.order_text];
  const total = Number(order.total_amount) || 0;
  for (const field of textFields) {
    if (!field || typeof field !== 'string') continue;
    const t = field.trim();
    if (!t) continue;
    const m = t.match(/^(.*?)\s*[xX×]([\d]+)$/);
    if (m) {
      const qty = parseInt(m[2], 10);
      const price = qty > 0 && total > 0 ? Math.round(total / qty) : total;
      return [{ name: m[1].trim(), qty, unitPrice: price, discount: 0, unit: '', lineTotal: total }];
    }
    return [{ name: t, qty: 1, unitPrice: total, discount: 0, unit: '', lineTotal: total }];
  }
  return [];
}

/** Download a PDF (with auth) by opening in a new tab then falling back to direct fetch+download. */
async function downloadPdf(endpointPath, filename) {
  const token = localStorage.getItem("adminToken");
  const url = `${API_BASE}/${endpointPath}`;
  // Try fetch with auth header first
  try {
    const res = await fetch(url, {
      headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) }
    });
    if (res.ok) {
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || 'document.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
      return;
    }
  } catch(e) { /* fallback to window.open */ }
  // Fallback: open in new tab (may prompt for auth)
  window.open(url, '_blank');
}

/* ═══════════════════════════════════════ JALALI DATE ════════════════════════════════ */
const J_MONTHS = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
const J_WEEKDAYS = ["ش","ی","د","س","چ","پ","ج"]; // شنبه تا جمعه

function g2j(gy,gm,gd){
  var g_y=gy-1600,g_m=gm-1,g_d=gd-1;
  var gdn=365*g_y+Math.floor((g_y+3)/4)-Math.floor((g_y+99)/100)+Math.floor((g_y+399)/400);
  var gdm=[31,28,31,30,31,30,31,31,30,31,30,31];
  for(var i=0;i<g_m;i++)gdn+=gdm[i];
  if(g_m>1&&((g_y%4===0&&g_y%100!==0)||g_y%400===0))gdn++;
  gdn+=g_d;
  var jdn=gdn-79,jnp=Math.floor(jdn/12053);jdn%=12053;
  var jy=979+33*jnp+4*Math.floor(jdn/1461);jdn%=1461;
  if(jdn>=366){jy+=Math.floor((jdn-1)/365);jdn=(jdn-1)%365;}
  var jdm=[31,31,31,31,31,31,30,30,30,30,30,29],jm=0;
  for(;jm<11&&jdn>=jdm[jm];jm++)jdn-=jdm[jm];
  return[jy,jm+1,jdn+1];
}

function j2g(jy,jm,jd){
  var jdm=[31,31,31,31,31,31,30,30,30,30,30,29];
  jy-=979;jm-=1;jd-=1;
  var jdn=365*jy+Math.floor(jy/33)*8+Math.floor((jy%33+3)/4);
  for(var i=0;i<jm;i++)jdn+=jdm[i];
  jdn+=jd;
  var gdn=jdn+79;
  var gy=1600+400*Math.floor(gdn/146097);gdn%=146097;
  var leap=true;
  if(gdn>=36525){gdn--;gy+=100*Math.floor(gdn/36524);gdn%=36524;if(gdn>=365)gdn++;else leap=false;}
  gy+=4*Math.floor(gdn/1461);gdn%=1461;
  if(gdn>=366){leap=false;gdn--;gy+=Math.floor(gdn/365);gdn%=365;}
  var gdm=[31,leap?29:28,31,30,31,30,31,31,30,31,30,31],gm=0;
  for(;gm<12&&gdn>=gdm[gm];gm++)gdn-=gdm[gm];
  return[gy,gm+1,gdn+1];
}

function jDaysInMonth(jy,jm){ return jm<=6?31:jm<=11?30:(jy%33===1||jy%33===5||jy%33===9||jy%33===13||jy%33===17||jy%33===22||jy%33===26||jy%33===30)?30:29; }

function jFirstWeekday(jy,jm) {
  const [gy,gm,gd]=j2g(jy,jm,1);
  const d=new Date(gy,gm-1,gd).getDay(); // 0=Sun
  return (d+1)%7; // 0=Sat,1=Sun,...,6=Fri
}

function JalaliPicker({ value, onChange, placeholder="انتخاب تاریخ" }) {
  const todayArr = g2j(...(()=>{const n=new Date();return[n.getFullYear(),n.getMonth()+1,n.getDate()]})());
  const parse = (v) => { if(!v) return null; const [gy,gm,gd]=v.split('-').map(Number); return g2j(gy,gm,gd); };
  const sel = parse(value);
  const [open, setOpen] = useState(false);
  const [view, setView] = useState(()=> sel ? {y:sel[0],m:sel[1]} : {y:todayArr[0],m:todayArr[1]});

  const pick = (jd) => {
    const [gy,gm,gd]=j2g(view.y,view.m,jd);
    onChange(`${gy}-${String(gm).padStart(2,'0')}-${String(gd).padStart(2,'0')}`);
    setOpen(false);
  };

  const display = sel ? `${fa(sel[0])}/${fa(String(sel[1]).padStart(2,'0'))}/${fa(String(sel[2]).padStart(2,'0'))}` : "";
  const prevM = ()=>setView(v=>{let m=v.m-1,y=v.y;if(m<1){m=12;y--;}return{y,m};});
  const nextM = ()=>setView(v=>{let m=v.m+1,y=v.y;if(m>12){m=1;y++;}return{y,m};});

  const days = jDaysInMonth(view.y,view.m);
  const skip = jFirstWeekday(view.y,view.m);

  return (
    <div style={{ position:"relative" }}>
      <div onClick={()=>setOpen(v=>!v)} style={{ ...iStyle, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", userSelect:"none" }}>
        <span style={{ color:display?C.text:C.textMuted, fontSize:13 }}>{display||placeholder}</span>
        <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke={C.textDim} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      {open && (
        <div style={{ position:"absolute", zIndex:600, top:"calc(100% + 4px)", right:0, background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:14, width:272, boxShadow:"0 12px 40px #000a", direction:"rtl" }}>
          {/* ناوبری ماه */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <button onClick={nextM} style={{ background:"none", border:"none", cursor:"pointer", color:C.text, fontSize:18, lineHeight:1, padding:"0 4px" }}>‹</button>
            <div style={{ textAlign:"center" }}>
              <span style={{ fontSize:13, fontWeight:700, color:C.text }}>{J_MONTHS[view.m-1]}</span>
              <span style={{ fontSize:12, color:C.textDim, marginRight:6 }}>{fa(view.y)}</span>
            </div>
            <button onClick={prevM} style={{ background:"none", border:"none", cursor:"pointer", color:C.text, fontSize:18, lineHeight:1, padding:"0 4px" }}>›</button>
          </div>
          {/* روزهای هفته */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:4 }}>
            {J_WEEKDAYS.map(d=><div key={d} style={{ textAlign:"center", fontSize:10, color:C.textDim, padding:"3px 0", fontWeight:700 }}>{d}</div>)}
          </div>
          {/* روزها */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:1 }}>
            {Array.from({length:skip}).map((_,i)=><div key={`s${i}`}/>)}
            {Array.from({length:days}).map((_,i)=>{
              const jd=i+1;
              const isSel=sel&&sel[0]===view.y&&sel[1]===view.m&&sel[2]===jd;
              const isToday=todayArr[0]===view.y&&todayArr[1]===view.m&&todayArr[2]===jd;
              return (
                <button key={jd} onClick={()=>pick(jd)} style={{
                  textAlign:"center", padding:"6px 2px", fontSize:12, borderRadius:6, border:"none",
                  fontFamily:FF, cursor:"pointer",
                  background:isSel?C.primary:isToday?C.primaryDim:"transparent",
                  color:isSel?"#fff":isToday?C.primary:C.text,
                  fontWeight:isSel||isToday?700:400
                }}>{fa(jd)}</button>
              );
            })}
          </div>
          {value && (
            <button onClick={()=>{onChange("");setOpen(false);}} style={{ marginTop:10, fontSize:11, color:C.danger, background:"none", border:"none", cursor:"pointer", fontFamily:FF, display:"block" }}>× پاک کردن</button>
          )}
        </div>
      )}
    </div>
  );
}

/* قیمت‌گذاری بر اساس حجم سفارش */
var DEFAULT_TIERS = [
  { min:1,   max:10,       discount:0,  label:"۱ تا ۱۰ کارتن",   note:"نرخ پایه" },
  { min:11,  max:50,       discount:5,  label:"۱۱ تا ۵۰ کارتن",  note:"۵٪ تخفیف" },
  { min:51,  max:100,      discount:10, label:"۵۱ تا ۱۰۰ کارتن", note:"۱۰٪ تخفیف" },
  { min:101, max:Infinity, discount:15, label:"بیش از ۱۰۰ کارتن",note:"۱۵٪ تخفیف" },
];
try {
  var saved = localStorage.getItem("price_tiers");
  if (saved) {
    var parsed = JSON.parse(saved);
    DEFAULT_TIERS = DEFAULT_TIERS.map(function(t,i){ return parsed[i] ? {...t, discount:parsed[i]} : t; });
  }
} catch(e){}
var PRICE_TIERS = DEFAULT_TIERS.slice();
const getTierDiscount = (qty) => {
  const t = PRICE_TIERS.find(t => qty >= t.min && qty <= t.max);
  return t ? t.discount : 0;
};

function Tag({ status }) {
  const s = ORDER_STATUS[status] || { label:status, color:C.textMuted, bg:C.surfaceAlt };
  return (
    <span style={{
      display:"inline-block", padding:"3px 10px", borderRadius:20,
      background:s.bg, color:s.color, fontSize:11, fontWeight:600, whiteSpace:"nowrap"
    }}>{s.label}</span>
  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const bg = { error:C.danger, warning:C.warning, info:C.info }[type] || C.success;
  return (
    <div style={{
      position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", zIndex:99999,
      background:bg, color:"#fff", padding:"10px 24px", borderRadius:10,
      fontFamily:FF, fontSize:13, fontWeight:500, boxShadow:"0 4px 20px rgba(0,0,0,0.5)",

function Btn({ label, onClick, icon, color=C.primary, outline, danger, small, disabled, full }) {
  const isDanger = danger && !outline;
  const bg   = outline ? "transparent" : (isDanger ? "#EF444422" : color);
  const bdr  = outline ? `1px solid #2A2A2A` : (isDanger ? "1px solid #EF444444" : "none");
  const clr  = outline ? "#D1D3D4" : (isDanger ? "#EF4444" : "#111111");
  return (
    <button onClick={onClick} disabled={disabled} style={{
      display:"inline-flex", alignItems:"center", gap:6, justifyContent:"center",
      padding: small ? "8px 14px" : "11px 20px",
      width: full ? "100%" : undefined,
      borderRadius:10, border:bdr, background: disabled ? "#222222" : bg,
      color: disabled ? "#6B7280" : clr, cursor: disabled ? "not-allowed" : "pointer",
      fontFamily:FF, fontSize: small ? 12 : 13, fontWeight:700, opacity: disabled ? 0.5 : 1,
      transition:"0.12s",
      boxShadow: (!outline && !isDanger && !disabled) ? "0 0 20px #D4880E33" : "none",
    }}>
      {icon && <Ic name={icon} size={14} color={disabled ? "#6B7280" : clr} />}
      {label}
    </button>
  );
}

function KPICard({ label, value, sub, color=C.primary, icon, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => onClick && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        padding:20, background: hover ? C.surfaceAlt : C.surface,
        borderRadius:14, border:`1px solid ${hover ? color+"44" : C.border}`,
        position:"relative", overflow:"hidden", animation:"fadeUp 0.3s ease",
        cursor: onClick ? "pointer" : "default",
        transition:"all 0.15s", transform: hover ? "translateY(-2px)" : "none",
        boxShadow: hover ? `0 6px 24px ${color}18` : "none"
      }}
    >
      <div style={{ position:"absolute", top:0, right:0, width:3, height:"100%", background:color }} />
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div>
          <p style={{ fontSize:11, color:C.textMuted, marginBottom:8, fontWeight:600, letterSpacing:"0.5px" }}>{label}</p>
          <p style={{ fontSize:24, fontWeight:700, color:C.text, marginBottom:4 }}>{value}</p>

            <div style={{ padding:10, background:color+"18", borderRadius:10, transition:"background 0.15s", ...(hover?{background:color+"30"}:{}) }}>

function InvoiceBtn({ orderId, order, customer, items, type, showToast, onUpdate }) {
  const [loading, setLoading] = useState(false);
  const [sharing, setSharing] = useState(false);
  const load = async () => {
    setLoading(true);
    try {
      // 1. Issue the invoice (create record in crm_invoices table)
      try {
        await api("POST", "crm_invoices", {
          order_id: orderId,
          invoice_type: type,
          total: order.total_amount || 0,
          status: "issued",
          invoice_number: type === "proforma"
            ? `PF-${order.order_number || orderId}`
            : `INV-${order.order_number || orderId}-${Date.now()}`
        });
      } catch(e) {
        console.warn("Invoice record creation warning:", e.message);
      }

      // 2. For proforma, also update order status
      if (type === "proforma") {
        try {
          await api("POST", "crm-proforma-issue", { order_id: orderId });
        } catch(e) { console.warn(e.message); }
        if (order.order_status !== "proforma_issued") {
          try {
            await api("PATCH", `crm_orders?id=eq.${orderId}`, {
              order_status: "proforma_issued",
              proforma_issued_at: new Date().toISOString()
            });
          } catch(e) { console.warn(e.message); }
        }
      }

      // 3. Download PDF
      const pdfEndpoint = type === "proforma" ? `crm-proforma-pdf?id=eq.${orderId}` : `crm-invoice-pdf?id=eq.${orderId}`;
      const pdfFilename = type === "proforma" ? `proforma-${orderId}.pdf` : `invoice-${orderId}.pdf`;
      downloadPdf(pdfEndpoint, pdfFilename);

      showToast(type === "proforma" ? "پیش‌فاکتور صادر شد" : "فاکتور رسمی صادر شد", "success");
      if (onUpdate) onUpdate();
    } catch(e) {
      showToast("خطا: " + (e.message || "عملیات ناموفق"), "error");
    } finally {
      setLoading(false);
    }
  };
  const pdfEp = type === "proforma" ? `crm-proforma-pdf?id=eq.${orderId}` : `crm-invoice-pdf?id=eq.${orderId}`;
  const pdfFn = type === "proforma" ? `proforma-${orderId}.pdf` : `invoice-${orderId}.pdf`;
  const docLabel = type === "proforma" ? "پیش‌فاکتور" : "صورتحساب";
  const handleShare = async () => {
    setSharing(true);
    try {
      const result = await sharePdf(pdfEp, pdfFn);
      if (result === 'share') showToast(`اشتراک‌گذاری ${docLabel} انجام شد`, "success");
      else if (result === 'copied') showToast(`لینک ${docLabel} کپی شد`, "info");
      else showToast(`${docLabel} در مرورگر باز شد`, "info");
    } catch(e) {
      showToast("خطا در اشتراک‌گذاری", "error");
    } finally { setSharing(false); }
  };
  return (
    <div className="pdf-actions-row" style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
      <Btn className="pdf-btn" label={loading?"...":`صدور ${docLabel}`} icon="file"
        color={type==="proforma"?"#3B82F6":C.success} onClick={load} disabled={loading} small />
      <Btn className="pdf-btn" label={sharing?"...":"اشتراک‌گذاری"} icon="trend"
        color={C.warning} onClick={handleShare} disabled={sharing} small />
      <Btn className="pdf-btn" label="دانلود" icon="download"
        color={C.textMuted} onClick={() => downloadPdf(pdfEp, pdfFn)} small />
    </div>
  );
}

function ProformaNotifyModal({ invoice, order, customer, onClose, showToast }) {
  const [sent, setSent] = React.useState(!!invoice.sent_at);
  const [sentVia, setSentVia] = React.useState(invoice.sent_channel || "");
  const [saving, setSaving] = React.useState(false);

  const phone = (customer && customer.phone) ? customer.phone : "";
  const cleanPhone = phone.replace(/\D/g, "").replace(/^0/, "98");
  const custName = (customer && customer.name) ? customer.name : "";
  const amount = cur(invoice.total || (order && order.total_amount) || 0);
  const validDays = invoice.valid_days || 7;
  const invNum = invoice.invoice_number || String(invoice.id);

  var now = new Date();
  var todayJ = g2j(now.getFullYear(), now.getMonth()+1, now.getDate());
  var todayStr = fa(todayJ[0]) + "/" + fa(String(todayJ[1]).padStart(2,"0")) + "/" + fa(String(todayJ[2]).padStart(2,"0"));

  var msgLines = [
    "مشتری گرامی " + custName + "،",
    "پیش‌فاکتور شماره " + invNum + " به مبلغ " + amount,
    "از شرکت آذرمهر صنعت (گروه محصولات غذایی عقرب) صادر گردید.",
    "تاریخ صدور: " + todayStr,
    "اعتبار پیش‌فاکتور: " + fa(validDays) + " روز",
    "لطفاً پس از بررسی، نتیجه را اعلام فرمایید.",
    "با تشکر — آذرمهر صنعت"
  ];
  var msg = msgLines.join("\n");

  var markSent = function(channel) {
    setSaving(true);
    api("PATCH", "crm_invoices?id=eq." + invoice.id, {
      sent_at: new Date().toISOString(),
      sent_channel: channel
    }).then(function() {
      setSent(true);
      setSentVia(channel);
      showToast("وضعیت ارسال ثبت شد");
    }).catch(function() {
      showToast("خطا در ثبت وضعیت","error");
    }).finally(function() {
      setSaving(false);
    });
  };

  var sendWhatsApp = function() {
    window.open("https://wa.me/" + cleanPhone + "?text=" + encodeURIComponent(msg), "_blank");
    if (!sent) markSent("whatsapp");
  };

  var copyMsg = function(channel) {
    navigator.clipboard.writeText(msg).then(function() {
      showToast("پیام کپی شد — در " + channel + " paste کنید");
      if (!sent) markSent(channel);
    }).catch(function() {
      showToast("خطا در کپی","error");
    });
  };

  return (
    <Modal title="اطلاع‌رسانی پیش‌فاکتور به مشتری" onClose={onClose} maxWidth={520}>
      <div style={{
        padding:"12px 16px", borderRadius:10, marginBottom:16,
        background: sent ? C.successDim : C.warningDim,
        border: "1px solid " + (sent ? C.success : C.warning) + "55",
        display:"flex", alignItems:"center", gap:12
      }}>
        <span style={{ fontSize:22 }}>{sent ? "✅" : "⏳"}</span>
        <div>
          <p style={{ fontSize:13, fontWeight:600, color: sent ? C.success : C.warning, marginBottom:3 }}>
            {sent ? ("ارسال شده از طریق " + sentVia) : "هنوز اطلاع‌رسانی نشده"}
          </p>
          <p style={{ fontSize:11, color:C.textMuted }}>
            {"پیش‌فاکتور شماره " + invNum + " — مبلغ " + amount}
          </p>
        </div>
      </div>

      {custName || phone ? (
        <div style={{ padding:"10px 14px", background:C.surfaceAlt, borderRadius:10, marginBottom:14, fontSize:13 }}>
          {custName && <p style={{ fontWeight:600, marginBottom:3 }}>{custName}</p>}
          {phone && <p style={{ color:C.textMuted, direction:"ltr", textAlign:"right" }}>{fa(phone)}</p>}
        </div>
      ) : null}

      <p style={{ fontSize:11, color:C.textMuted, marginBottom:8, fontWeight:600 }}>متن پیام آماده:</p>
      <div style={{
        padding:14, background:C.surfaceAlt, borderRadius:10, fontSize:12,
        lineHeight:1.9, color:C.text, whiteSpace:"pre-line",
        border:"1px solid " + C.border, marginBottom:16, direction:"rtl"
      }}>
        {msg}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
        {cleanPhone ? (
          <button onClick={sendWhatsApp} style={{
            padding:"12px 8px", borderRadius:10, border:"none", cursor:"pointer",
            background:"#25D366", color:"#fff", fontFamily:FF, fontSize:13, fontWeight:600,
            display:"flex", alignItems:"center", justifyContent:"center", gap:6
          }}>{"💬 واتساپ"}</button>
        ) : null}
        <button onClick={function(){ copyMsg("ایتا"); }} style={{
          padding:"12px 8px", borderRadius:10, border:"1.5px solid #2AABEE44", cursor:"pointer",
          background:"#2AABEE18", color:"#2AABEE", fontFamily:FF, fontSize:13, fontWeight:600,
          display:"flex", alignItems:"center", justifyContent:"center", gap:6
        }}>{"📱 کپی برای ایتا"}</button>
        <button onClick={function(){ copyMsg("پیامک"); }} style={{
          padding:"12px 8px", borderRadius:10, border:"1.5px solid " + C.border, cursor:"pointer",
          background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13, fontWeight:600,
          display:"flex", alignItems:"center", justifyContent:"center", gap:6
        }}>{"✉️ کپی برای پیامک"}</button>
        {!sent && (
          <button onClick={function(){ markSent("دستی"); }} disabled={saving} style={{
            padding:"12px 8px", borderRadius:10, border:"1.5px solid " + C.border, cursor:"pointer",
            background:"transparent", color:C.textMuted, fontFamily:FF, fontSize:12,
            display:"flex", alignItems:"center", justifyContent:"center", gap:6
          }}>{saving ? "..." : "✓ ثبت به‌عنوان ارسال‌شده"}</button>
        )}
      </div>
    </Modal>
  );
}

  );

function BarChartWidget({ labels, data, label="", color=C.primary }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current || typeof Chart === "undefined") return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:"bar",
      data: {
        labels,
        datasets:[{ label, data, backgroundColor:color+"88", borderColor:color, borderWidth:1, borderRadius:4 }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          y:{ ticks:{ color:C.textDim, font:{size:10} }, grid:{ color:C.border }, beginAtZero:true },
          x:{ ticks:{ color:C.textDim, font:{size:10} }, grid:{ display:false } }
        }
      }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [labels, data]);
  return <canvas ref={ref} style={{ width:"100%", height:"100%" }} />;
}

function DonutWidget({ labels, data, colors }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current || typeof Chart === "undefined") return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:"doughnut",
      data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:0 }] },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:"65%",
        plugins:{ legend:{ position:"bottom", labels:{ color:C.textMuted, font:{size:11}, padding:12 } } }
      }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  return <canvas ref={ref} style={{ width:"100%", height:"100%" }} />;
}

function Dashboard({ me, showToast, onNavigate }) {
  const [stats, setStats] = useState({ customers:0, orders:0, products:0, revenue:0, outstanding:0 });
  const [monthlyData, setMonthlyData] = useState({ labels:[], data:[] });
  const [statusData, setStatusData] = useState({ labels:[], data:[], colors:[] });
  const [recentOrders, setRecentOrders] = useState([]);
  const [claims, setClaims] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const [customers, orders, products, invoices, claimsData] = await Promise.all([
          api("GET","crm_customers?select=id"),
          api("GET","crm_orders?select=id,order_status,total_amount,created_at,customer_id,crm_customers(name)&order=created_at.desc"),
          api("GET","products?select=id"),
          api("GET","crm_invoices?select=total,issue_date,invoice_type"),
          api("GET","crm_guarantee_claims?select=id,status,customer_id,created_at&order=created_at.desc&limit=50").catch(()=>[]),
        ]);
        setClaims(claimsData||[]);

        const totalRev = (invoices||[]).filter(i=>i.invoice_type==="official").reduce((s,i)=>s+(i.total||0),0);
        const outstanding = (invoices||[]).filter(i=>i.invoice_type==="proforma").reduce((s,i)=>s+(i.total||0),0);

        setStats({ customers:(customers||[]).length, orders:(orders||[]).length, products:(products||[]).length, revenue:totalRev, outstanding });
        setRecentOrders((orders||[]).slice(0,5));

        // Monthly sales (last 6 months from invoices)
        const months = [];
        const mData = [];
        for (let i=5; i>=0; i--) {
          const d = new Date(); d.setMonth(d.getMonth()-i);
          const m = d.toLocaleString("fa-IR",{month:"short"});
          months.push(m);
          const sum = (invoices||[]).filter(inv => {
            const id = new Date(inv.issue_date);
            return id.getMonth()===d.getMonth() && id.getFullYear()===d.getFullYear();
          }).reduce((s,inv)=>s+(inv.total||0),0);
          mData.push(sum);
        }
        setMonthlyData({ labels:months, data:mData });

        // Order status donut
        const statusCounts = {};
        (orders||[]).forEach(o => { statusCounts[o.order_status]=(statusCounts[o.order_status]||0)+1; });
        const topStatuses = Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
        const palette=["#D4880E","#3B82F6","#10B981","#8B5CF6","#F59E0B","#EF4444"];
        setStatusData({
          labels: topStatuses.map(([k]) => ORDER_STATUS[k]?.label||k),
          data: topStatuses.map(([,v])=>v),
          colors: topStatuses.map((_,i)=>palette[i%palette.length]),
        });
      } catch(e) { showToast("خطا در بارگذاری داشبورد","error"); }
      finally { setLoading(false); }
    })();
  }, []);

  if (loading) return <Spinner />;

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>داشبورد</h2>
        <p style={{ fontSize:12, color:C.textDim }}>خوش آمدید، {me.name}</p>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:14, marginBottom:24 }}>
        <KPICard label="مشتریان عمده" value={fa(stats.customers)} icon="building" color={C.info}    onClick={() => onNavigate("crm")} />
        <KPICard label="کل سفارشات"   value={fa(stats.orders)}    icon="cart"     color={C.purple}  onClick={() => onNavigate("orders")} />
        <KPICard label="درآمد ثبت‌شده" value={shortCur(stats.revenue)} sub="از فاکتورهای رسمی" icon="wallet" color={C.success} onClick={() => onNavigate("financial")} />
        <KPICard label="در انتظار پرداخت" value={shortCur(stats.outstanding)} sub="پیش‌فاکتورهای صادرشده" icon="alert" color={C.warning} onClick={() => onNavigate("financial")} />
        <KPICard label="محصولات"       value={fa(stats.products)}  icon="package"  color={C.teal}    onClick={() => onNavigate("products")} />
        <KPICard label="مرجوعی در انتظار" value={fa(claims.filter(c=>c.status==="pending").length)} sub="نیاز به بررسی" icon="shield" color="#EF4444" onClick={() => onNavigate("guarantee")} />
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:16, marginBottom:20 }}>
        <div style={{...cardStyle, padding:20 }}>
          <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:16 }}>فروش ۶ ماه اخیر</p>
          <div style={{ height:200 }}>
            <BarChartWidget labels={monthlyData.labels} data={monthlyData.data} color={C.primary} />
          </div>
        </div>
        <div style={{...cardStyle, padding:20 }}>
          <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:16 }}>وضعیت سفارشات</p>
          <div style={{ height:200 }}>
            {statusData.data.length > 0
              ? <DonutWidget labels={statusData.labels} data={statusData.data} colors={statusData.colors} />
              : <Empty text="سفارشی ثبت نشده" icon="📊" />}
          </div>
        </div>
      </div>

      {/* ─── خلاصه گارانتی ─── */}
      {claims.length > 0 && (
        <div style={{...cardStyle, padding:20, marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <p style={{ fontSize:13, fontWeight:600, color:C.text }}>🛡️ درخواست‌های مرجوعی اخیر</p>
            <button onClick={() => onNavigate("guarantee")} style={{ background:"transparent", border:"none", color:C.primary, fontSize:12, cursor:"pointer", fontFamily:FF }}>مشاهده همه ←</button>
          </div>
          <div style={{ display:"grid", gap:8 }}>
            {claims.slice(0,5).map(function(cl) {
              var st = { pending:{label:"در انتظار",color:"#F59E0B"}, approved:{label:"تأیید",color:"#10B981"}, rejected:{label:"رد شده",color:"#EF4444"}, refunded:{label:"بازگشت داده شد",color:"#8B5CF6"} }[cl.status] || {label:cl.status,color:C.textMuted};
              return (
                <div key={cl.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", background:C.surfaceAlt, borderRadius:8, borderRight:"3px solid "+st.color }}>

/* ─── پیش‌فاکتورهای در انتظار ارسال ─── */
function ProformaPendingSection({ showToast }) {
  var [items, setItems] = React.useState([]);
  var [loading, setLoading] = React.useState(true);
  var [notifyItem, setNotifyItem] = React.useState(null);
  var [collapsed, setCollapsed] = React.useState(false);

  React.useEffect(function() {
    Promise.all([
      api("GET", "crm_invoices?invoice_type=eq.proforma&sent_at=is.null&order=created_at.desc&limit=20"),
      api("GET", "crm_orders?select=id,total_amount,order_status"),
      api("GET", "crm_customers?select=id,name,phone,city"),
    ]).then(function(results) {
      var invs = results[0] || [];
      var orders = results[1] || [];
      var custs = results[2] || [];
      var ordMap = {};
      orders.forEach(function(o){ ordMap[o.id] = o; });
      var custMap = {};
      custs.forEach(function(c){ custMap[c.id] = c; });
      var merged = invs.map(function(inv) {
        var ord = ordMap[inv.order_id] || {};
        var cust = custMap[inv.customer_id] || {};
        return { inv:inv, order:ord, customer:cust };
      });
      setItems(merged);
    }).catch(function(){}).finally(function(){ setLoading(false); });
  }, []);

  if (loading) return null;
  if (items.length === 0) return null;

  return (
    <div style={{
      marginBottom:20, border:"1px solid " + C.warning + "44",
      borderRadius:12, overflow:"hidden"
    }}>
      <div
        onClick={function(){ setCollapsed(function(p){ return !p; }); }}
        style={{
          padding:"12px 16px", background:C.warningDim,
          display:"flex", justifyContent:"space-between", alignItems:"center",
          cursor:"pointer"
        }}
      >
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:18 }}>📨</span>
          <div>
            <p style={{ fontSize:13, fontWeight:600, color:C.warning }}>پیش‌فاکتورهای در انتظار ارسال</p>
            <p style={{ fontSize:11, color:C.textMuted }}>{fa(items.length) + " پیش‌فاکتور ارسال نشده"}</p>
          </div>
        </div>
        <span style={{ color:C.warning, fontSize:16 }}>{collapsed ? "▼" : "▲"}</span>
      </div>
      {!collapsed && (
        <div style={{ padding:"0 0 8px" }}>
          {items.map(function(it, idx) {
            var inv = it.inv;
            var cust = it.customer;
            var ord = it.order;
            return (
              <div key={inv.id} style={{
                padding:"10px 16px",
                borderBottom: idx < items.length-1 ? "1px solid " + C.border : "none",
                display:"flex", justifyContent:"space-between", alignItems:"center", gap:10
              }}>
                <div style={{ flex:1 }}>
                  <p style={{ fontSize:13, fontWeight:600, marginBottom:2 }}>
                    {(cust && cust.name) ? cust.name : "مشتری نامشخص"}
                  </p>
                  <p style={{ fontSize:11, color:C.textMuted }}>
                    {"شماره: " + (inv.invoice_number || inv.id) + " | مبلغ: " + cur(inv.total || 0) + " | اعتبار: " + fa(inv.valid_days||7) + " روز"}
                  </p>
                  {cust && cust.phone && (
                    <p style={{ fontSize:11, color:C.textDim, direction:"ltr", textAlign:"right" }}>{fa(cust.phone)}</p>
                  )}
                </div>
                <Btn
                  label="اطلاع‌رسانی"
                  icon="trend"
                  small
                  color={C.warning}
                  onClick={function(){ setNotifyItem(it); }}
                />
              </div>
            );
          })}
        </div>
      )}
      {notifyItem && (
        <ProformaNotifyModal
          invoice={notifyItem.inv}
          order={notifyItem.order}
          customer={notifyItem.customer}
          onClose={function(){
            setNotifyItem(null);
            setItems(function(prev){ return prev.filter(function(x){ return x.inv.id !== notifyItem.inv.id; }); });
          }}
          showToast={showToast}
        />
      )}
    </div>
  );
}

function PaymentsPendingSection({ showToast }) {
  var [items, setItems] = React.useState([]);
  var [loading, setLoading] = React.useState(true);
  var [collapsed, setCollapsed] = React.useState(false);
  var [verifyingId, setVerifyingId] = React.useState(null);

  const loadPayments = React.useCallback(function() {
    setLoading(true);
    api("GET", "/api/crm-payments-admin")
      .then(function(res) { setItems((res && res.payments) || []); })
      .catch(function() { setItems([]); })
      .finally(function() { setLoading(false); });
  }, []);

  React.useEffect(function() {
    loadPayments();
  }, [loadPayments]);

  async function handleVerify(item, action) {
    const actionMap = {
      "approve": "verify",
      "reject": "reject"
    };
    const backendAction = actionMap[action] || action;
    let reason = null;
    if (action === "reject") {
      reason = prompt("لطفاً دلیل رد پرداخت را وارد کنید:");
      if (!reason || reason.trim() === "") {
        alert("دلیل رد الزامی است");
        return;
      }
    }
    const payload = {
      payment_id: item.id,
      action: backendAction,
      admin_notes: reason || null
    };
    try {
      const result = await api("POST", "/api/crm-payment-verify", payload);
      alert(result?.message || "عملیات با موفقیت انجام شد");
      loadPayments();
    } catch (err) {
      console.error(err);
      alert(err.message || "خطا در ارتباط با سرور");
    }
  }

  if (loading) return null;
  if (items.length === 0) return null;

  return (
    <div style={{ marginBottom:20, border:"1px solid "+C.info+"44", borderRadius:12, overflow:"hidden" }}>
      <div
        onClick={function(){ setCollapsed(function(p){ return !p; }); }}
        style={{ padding:"12px 16px", background:C.infoDim, display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}
      >
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:18 }}>💳</span>
          <div>
            <p style={{ fontSize:13, fontWeight:600, color:C.info }}>فیش‌های در انتظار بررسی</p>
            <p style={{ fontSize:11, color:C.textMuted }}>{fa(items.length) + " فیش پرداخت در انتظار"}</p>
          </div>
        </div>
        <span style={{ color:C.info, fontSize:16 }}>{collapsed ? "▼" : "▲"}</span>
      </div>
      {!collapsed && (
        <div style={{ padding:"0 0 8px" }}>
          {items.map(function(item, idx) {
            var busy = verifyingId === item.id;
            return (
              <div key={item.id} style={{
                padding:"12px 16px",
                borderBottom: idx < items.length-1 ? "1px solid "+C.border : "none",
                display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12
              }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:13, fontWeight:600, marginBottom:3, color:C.text }}>
                    {item.customer_name || "مشتری نامشخص"}
                    {item.customer_phone && (
                      <span style={{ fontSize:11, color:C.textDim, fontWeight:400, marginRight:8, direction:"ltr" }}>{fa(item.customer_phone)}</span>
                    )}
                  </p>
                  <p style={{ fontSize:13, fontWeight:700, color:C.success, marginBottom:3 }}>{cur(item.amount)}</p>
                  {item.note && (
                    <p style={{ fontSize:11, color:C.textMuted, marginBottom:2 }}>{item.note}</p>
                  )}
                  <p style={{ fontSize:10, color:C.textDim }}>
                    {item.created_at ? new Date(item.created_at).toLocaleString("fa-IR") : ""}
                  </p>
                </div>
                <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                  <Btn
                    label={busy ? "..." : "تایید"}
                    icon="check"
                    small
                    color={C.success}
                    disabled={busy}
                    onClick={function(){ handleVerify(item, "approve"); }}
                  />
                  <Btn
                    label={busy ? "..." : "رد"}
                    small
                    danger
                    disabled={busy}
                    onClick={function(){ handleVerify(item, "reject"); }}
                  />
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FinancialModule({ me, showToast }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [payModal, setPayModal] = useState(null);
  const [payAmount, setPayAmount] = useState("");
  const [payNote, setPayNote] = useState("");
  const [payMethod, setPayMethod] = useState("");
  const [saving, setSaving] = useState(false);
  const [finSearch, setFinSearch]     = useState("");
  const [finCity,   setFinCity]       = useState("all");
  const [finStatus, setFinStatus]     = useState("all"); // all | debt | credit | zero

  const load = async () => {
    setLoading(true);
    try {
      const [customers, invoices, payments] = await Promise.all([
        api("GET","crm_customers?select=id,name,phone,city,payment_terms"),
        api("GET","crm_invoices?select=customer_id,total,invoice_type"),
        api("GET","crm_payments?select=customer_id,amount").catch(() => []),
      ]);
      const map = {};
      (customers||[]).forEach(c => { map[c.id] = { ...c, invoiced:0, paid:0 }; });
      (invoices||[]).forEach(inv => {
        if (map[inv.customer_id]) map[inv.customer_id].invoiced += (inv.total||0);
      });
      (payments||[]).forEach(p => {
        if (map[p.customer_id]) map[p.customer_id].paid += (p.amount||0);
      });
      setRows(Object.values(map).map(r => ({ ...r, balance: r.invoiced - r.paid })).sort((a,b)=>b.balance-a.balance));
    } catch(e) { showToast("خطا در بارگذاری","error"); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const recordPayment = async () => {
    if (!payAmount || isNaN(+payAmount)) { showToast("مبلغ را وارد کنید","error"); return; }
    if (!payMethod || payMethod.trim() === "") { showToast("روش پرداخت را انتخاب کنید","error"); return; }
    setSaving(true);
    try {
      await api("POST","crm_payments",{
        customer_id: payModal.id,
        amount: +payAmount,
        payment_method: payMethod.trim(),
        note: payNote||null,
        payment_date: new Date().toISOString(),
        created_at: new Date().toISOString()
      });
      showToast("پرداخت ثبت شد");
      setPayModal(null); setPayAmount(""); setPayNote(""); setPayMethod("");
      load();
    } catch(e) { showToast("خطا در ثبت پرداخت","error"); }
    finally { setSaving(false); }
  };

  if (loading) return <Spinner />;

  var cities = [];
  rows.forEach(function(r){ if(r.city && cities.indexOf(r.city)===-1) cities.push(r.city); });
  cities.sort();

  var filteredRows = rows.filter(function(r) {
    if (finSearch && !r.name?.includes(finSearch) && !r.city?.includes(finSearch)) return false;
    if (finCity !== "all" && r.city !== finCity) return false;
    if (finStatus === "debt"   && r.balance <= 0) return false;
    if (finStatus === "credit" && r.balance >= 0) return false;
    if (finStatus === "zero"   && r.balance !== 0) return false;
    return true;
  });

  var exportFinCSV = function() {
    var header = ["مشتری","شهر","شرایط پرداخت","فاکتور شده","پرداخت شده","مانده","وضعیت"];
    var dataRows = filteredRows.map(function(r) {
      var st = r.balance > 0 ? "بدهکار" : r.balance < 0 ? "اضافه‌پرداخت" : "تسویه";
      return [r.name, r.city||"", r.payment_terms||"", r.invoiced, r.paid, r.balance, st];
    });
    var csv = "\uFEFF" + [header].concat(dataRows).map(function(row){
      return row.map(function(v){ return '"'+String(v).split('"').join('""')+'"'; }).join(",");
    }).join("\n");
    var blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href=url; a.download="گزارش-مالی.csv"; a.click();
    URL.revokeObjectURL(url);
    showToast("فایل CSV دانلود شد");
  };

  const totalOut    = filteredRows.reduce(function(s,r){ return s+(r.balance>0?r.balance:0); }, 0);
  const totalCredit = filteredRows.reduce(function(s,r){ return s+(r.balance<0?Math.abs(r.balance):0); }, 0);

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* ─── هدر ─── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>مدیریت مالی</h2>
          <p style={{ fontSize:12, color:C.textDim }}>مانده حساب مشتریان</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn label="خروجی CSV" icon="download" small outline onClick={exportFinCSV} />
          <div style={{ background:C.warningDim, border:"1px solid "+C.warning+"33", borderRadius:10, padding:"10px 16px", textAlign:"center" }}>
            <p style={{ fontSize:11, color:C.warning, marginBottom:2 }}>جمع مطالبات</p>
            <p style={{ fontSize:16, fontWeight:700, color:C.warning }}>{shortCur(totalOut)}</p>
          </div>
        </div>
      </div>

      {/* ─── کارت‌های خلاصه ─── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:10, marginBottom:16 }}>
        <div style={{ background:C.surface, border:"1px solid "+C.border, borderRadius:10, padding:"10px 14px" }}>
          <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>فیلترشده</p>
          <p style={{ fontSize:18, fontWeight:700, color:C.primary }}>{fa(filteredRows.length)} مشتری</p>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border, borderRadius:10, padding:"10px 14px" }}>
          <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>مطالبات</p>
          <p style={{ fontSize:15, fontWeight:700, color:C.danger }}>{shortCur(totalOut)}</p>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border, borderRadius:10, padding:"10px 14px" }}>
          <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>اضافه‌پرداخت</p>
          <p style={{ fontSize:15, fontWeight:700, color:C.success }}>{shortCur(totalCredit)}</p>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border, borderRadius:10, padding:"10px 14px" }}>
          <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>بدهکاران</p>
          <p style={{ fontSize:18, fontWeight:700, color:C.warning }}>{fa(filteredRows.filter(function(r){return r.balance>0;}).length)}</p>
        </div>
      </div>

      <ProformaPendingSection showToast={showToast} />
      <PaymentsPendingSection showToast={showToast} />

      {/* ─── فیلترها ─── */}
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
        <div style={{ position:"relative", flex:1, minWidth:180 }}>
          <Ic name="search" size={14} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
          <input style={{ ...iStyle, paddingRight:32 }} value={finSearch} onChange={function(e){setFinSearch(e.target.value);}} placeholder="جستجو نام یا شهر..." />
        </div>
        <select style={{ ...iStyle, width:"auto", cursor:"pointer" }} value={finCity} onChange={function(e){setFinCity(e.target.value);}}>
          <option value="all">همه شهرها</option>
          {cities.map(function(c){ return <option key={c} value={c}>{c}</option>; })}
        </select>
        <select style={{ ...iStyle, width:"auto", cursor:"pointer" }} value={finStatus} onChange={function(e){setFinStatus(e.target.value);}}>
          <option value="all">همه وضعیت‌ها</option>
          <option value="debt">بدهکار</option>
          <option value="credit">اضافه‌پرداخت</option>
          <option value="zero">تسویه‌شده</option>
        </select>
      </div>

      {filteredRows.length === 0 ? <Empty text="مشتری‌ای ثبت نشده" /> : (
        <div style={{ display:"grid", gap:10 }}>
          {filteredRows.map(r => {
            const debt = r.balance > 0;
            const pct = r.invoiced > 0 ? Math.min(100, Math.round((r.paid/r.invoiced)*100)) : 100;
            return (
              <div key={r.id} style={{
                padding:18, ...cardStyle,
                display:"flex", justifyContent:"space-between", alignItems:"center", gap:16
              }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                    <p style={{ fontSize:14, fontWeight:600, color:C.text }}>{r.name}</p>
                    {debt && r.balance > 0 && (
                      <span style={{ fontSize:10, fontWeight:600, padding:"2px 7px", borderRadius:5, background:C.dangerDim, color:C.danger }}>بدهکار</span>
                    )}
                  </div>
                  <div style={{ display:"flex", gap:16, fontSize:12, color:C.textMuted, marginBottom:8 }}>
                    <span>فاکتور: <b style={{ color:C.text }}>{shortCur(r.invoiced)}</b></span>
                    <span>پرداخت: <b style={{ color:C.success }}>{shortCur(r.paid)}</b></span>
                    <span>مانده: <b style={{ color: debt ? C.danger : C.success }}>{shortCur(Math.abs(r.balance))}</b></span>
                  </div>
                  <div style={{ background:C.border, borderRadius:4, height:4, overflow:"hidden" }}>
                    <div style={{ width:`${pct}%`, height:"100%", background: pct===100?C.success:C.primary, borderRadius:4, transition:"width 0.5s" }} />
                  </div>
                </div>
                <Btn label="ثبت پرداخت" icon="check" small onClick={() => { setPayModal(r); setPayMethod(""); }} />
              </div>
            );
          })}
        </div>
      )}

      {payModal && (
        <Modal title={`ثبت پرداخت — ${payModal.name}`} onClose={() => { setPayModal(null); setPayMethod(""); }} maxWidth={420}>
          <div style={{ marginBottom:10, padding:12, background:C.surfaceAlt, borderRadius:8, fontSize:12 }}>
            <span style={{ color:C.textMuted }}>مانده: </span>
            <span style={{ color: payModal.balance>0?C.danger:C.success, fontWeight:600 }}>{cur(payModal.balance)}</span>
          </div>
          <Fld label="مبلغ پرداختی (ریال)">
            <input style={iStyle} type="number" value={payAmount} onChange={e=>setPayAmount(e.target.value)} placeholder="مثال: 5000000" />
          </Fld>
          <div className="mb-3">
            <label className="form-label">روش پرداخت <span className="text-danger">*</span></label>
            <select className="form-select" value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
              <option value="">-- انتخاب کنید --</option>
              <option value="نقدی">نقدی</option>
              <option value="کارت به کارت">کارت به کارت</option>
              <option value="حواله بانکی">حواله بانکی</option>
              <option value="دستگاه POS">دستگاه POS</option>
              <option value="چک">چک</option>
            </select>
          </div>
          <Fld label="توضیحات (اختیاری)">
            <textarea style={{ ...iStyle, resize:"none" }} rows={2} value={payNote} onChange={e=>setPayNote(e.target.value)} />
          </Fld>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn label="انصراف" onClick={() => { setPayModal(null); setPayMethod(""); }} outline />
            <Btn label={saving?"در حال ذخیره...":"ثبت پرداخت"} icon="check" onClick={recordPayment} disabled={saving} />
          </div>
        </Modal>
      )}
    </div>
  );
}

function CustomerForm({ customer, onSave, onCancel, showToast }) {

        {inp("inquiry_threshold","آستانه استعلام (کارتن)",{type:"number"})}
      </div>

      <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:14, marginTop:6 }}>

          مشتری دارای اعتبار است (پرداخت بعد از ارسال)
        </label>
        {form.credit_allowed && (
          <Fld label="مهلت اعتبار (روز)">
            <input style={{ ...iStyle, maxWidth:180 }} type="number" min={1} max={180}
              value={form.credit_days||30} onChange={e=>upd("credit_days",parseInt(e.target.value)||30)} />

        )}
      </div>
      <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:14, marginTop:6 }}>
        <p style={{ fontSize:11, color:C.textMuted, marginBottom:10, fontWeight:600 }}>دسترسی پورتال مشتری</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          {inp("portal_username","نام کاربری پورتال")} {inp("portal_password","رمز پورتال",{type:"text"})}
        </div>
        <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13, color:C.text }}>
          <input type="checkbox" checked={form.portal_active||false} onChange={e=>upd("portal_active",e.target.checked)} />
          دسترسی پورتال فعال باشد
        </label>
      </div>
      <Fld label="وضعیت مشتری">
        <select style={{ ...iStyle, cursor:"pointer" }} value={form.customer_status||"active"} onChange={e=>upd("customer_status",e.target.value)}>
          <option value="active">فعال</option>
          <option value="new">جدید (نیاز به تأیید)</option>
          <option value="suspended">تعلیق</option>
        </select>
      </Fld>
      <Fld label="یادداشت داخلی">
        <textarea style={{ ...iStyle, resize:"none" }} rows={2} value={form.internal_note||""} onChange={e=>upd("internal_note",e.target.value)} />
      </Fld>
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:8 }}>
        <Btn label="انصراف" onClick={onCancel} outline />
        <Btn label={saving?"در حال ذخیره...":"ذخیره"} icon="check" onClick={save} disabled={saving} />
      </div>
    </Modal>
  );
}

async function convertToProject(ord) {
  const token = localStorage.getItem('adminToken');
  const BASE = 'https://azarmehr-backend-main.vercel.app/api';
  // 1. Create project
  const pr = await fetch(`${BASE}/projects`, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify({
      order_id: String(ord.id),
      title: `پردازش سفارش ${ord.customer_name||'#'+ord.id}`,
      description: ord.note||`مبلغ: ${Number(ord.total_amount||0).toLocaleString()} ریال`,
      manager_id: WORKFLOW_USERS.bozorgmehr,
    })
  });
  if (!pr.ok) throw new Error('خطا در ساخت پروژه');
  const proj = await pr.json();
  // 2. Create 8 tasks
  for (const t of B2B_TASKS) {
    await fetch(`${BASE}/project-tasks`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify({
        project_id: proj.id,
        title: t.title,
        description: t.desc,
        assigned_to: WORKFLOW_USERS[t.user],
        priority: t.pri,
      })
    });
  }
  // 3. Notify team via backend API
  const msg = `📋 پروژه جدید: سفارش ${ord.customer_name||'#'+ord.id}\n💰 ${Number(ord.total_amount||0).toLocaleString('fa-IR')} ریال\n📦 ۸ وظیفه assign شد`;
  await api("POST", "notifications", [WORKFLOW_USERS.bozorgmehr,WORKFLOW_USERS.karimloo,WORKFLOW_USERS.ardestani].map(uid=>({user_id:uid,message:msg,read:false})));
  return proj.id;
}

function OrderDetail({ order, customer, me, showToast, onUpdate, onClose }) {
  const [items, setItems]         = useState([]);
  const [log, setLog]             = useState([]);
  const [loading, setLoading]     = useState(true);
  const [trackCode, setTrackCode] = useState(order.tracking_code||"");
  const [note, setNote]           = useState("");
  const [orderType, setOrderType] = useState(order.order_type||"stock");
  const [payMethod, setPayMethod] = useState(order.payment_method||"cash");
  const [checkNum, setCheckNum]   = useState("");
  const [checkBank, setCheckBank] = useState("");
  const [checkDate, setCheckDate] = useState("");
  const [saving, setSaving]       = useState(false);
  const [showPayModal, setShowPayModal] = useState(false);
  const [payNotes, setPayNotes]         = useState("");
  const [payVerifying, setPayVerifying] = useState(false);

  const verifyPayment = async () => {
    setPayVerifying(true);
    try {
      await api("POST", "/api/crm-payment-verify", {
        order_id: order.id,
        admin_notes: payNotes.trim() || null
      });
      showToast("پرداخت تأیید شد");
      setShowPayModal(false);
      onUpdate(); onClose();
    } catch(e) {
      showToast("خطا در تأیید پرداخت", "error");
    } finally {
      setPayVerifying(false);
    }
  };

  const isAdmin = me?.system_role==="super_admin" || me?.system_role==="admin";
  const creditAllowed = customer?.credit_allowed === true;

  useEffect(() => {
    (async () => {
      try {
        // 1) Try the unified order-detail endpoint first (returns normalized items + fallback)
        let finalItems = [];
        try {
          const detail = await api("GET", `crm_order_detail?id=eq.${order.id}`);
          if (detail && detail.items && detail.items.length > 0) {
            finalItems = detail.items.map(normalizeItemRow).filter(Boolean);
          }
        } catch(_) { /* fall through */ }

        // 2) Fallback: fetch from crm_order_items directly
        if (finalItems.length === 0) {
          const its = await api("GET", `crm_order_items?order_id=eq.${order.id}`);
          if (its && its.length > 0) {
            finalItems = its.map(normalizeItemRow).filter(Boolean);
          }
        }

        // 3) Last resort: parse from order notes/description
        if (finalItems.length === 0) {
          finalItems = parseFallbackItemsFromNotes(order);
        }

        setItems(finalItems);

        // Fetch status log
        try {
          const logs = await api("GET", `crm_order_status_log?order_id=eq.${order.id}&order=created_at.asc`);
          setLog(logs||[]);
        } catch(_) { setLog([]); }
      } catch(e) { showToast("خطا","error"); }
      finally { setLoading(false); }
    })();
  },[]);

  /* ── چرخه هوشمند بر اساس نوع سفارش و اعتبار مشتری ── */
  const getNextAction = (status, type, credit, custStatus) => {
    const isNew = custStatus === "new";
    const STOCK = {
      registered:         isNew
        ? { label:"ارجاع به تأیید مشتری جدید",              next:"customer_approval", assignedTo:"کریملو" }
        : { label:"شروع بررسی موجودی",                       next:"stock_check" },
      customer_approval:  { label:"تأیید مشتری — شروع بررسی موجودی", next:"stock_check" },
      stock_check:        { label:"صدور پیش‌فاکتور",          next:"proforma_issued" },
      proforma_issued:    credit
        ? { label:"تأیید — آماده ارسال (اعتباری)",           next:"ready_to_ship" }
        : { label:"ثبت درخواست پرداخت",                      next:"pending_payment" },
      payment_confirmed:  { label:"آماده ارسال",               next:"ready_to_ship" },
      ready_to_ship:      { label:"ارجاع به تأیید خروج کالا", next:"exit_approval", assignedTo:"سراج‌الدینی", sla:60 },
      exit_approval:      { label:"تأیید خروج و ثبت ارسال",   next:"shipped" },
      shipped:            { label:"تأیید تحویل",               next:"delivered" },
    };
    const CUSTOM = {
      registered:         isNew
        ? { label:"ارجاع به تأیید مشتری جدید",              next:"customer_approval", assignedTo:"کریملو" }
        : { label:"شروع بررسی",                              next:"stock_check" },
      customer_approval:  { label:"تأیید مشتری — شروع بررسی", next:"stock_check" },
      stock_check:        { label:"صدور پیش‌فاکتور",          next:"proforma_issued" },
      proforma_issued:    { label:"ارجاع به انعقاد قرارداد",  next:"contract_pending" },
      contract_pending:   { label:"تأیید امضای قرارداد",      next:"contract_signed" },
      contract_signed:    { label:"ارجاع به واحد تولید",      next:"in_production" },
      in_production:      credit
        ? { label:"پایان تولید — ارسال (اعتباری)",           next:"ready_to_ship" }
        : { label:"پایان تولید — درخواست پرداخت",            next:"pending_payment" },
      payment_confirmed:  { label:"آماده ارسال",               next:"ready_to_ship" },
      ready_to_ship:      { label:"ارجاع به تأیید خروج کالا", next:"exit_approval", assignedTo:"سراج‌الدینی", sla:60 },
      exit_approval:      { label:"تأیید خروج و ثبت ارسال",   next:"shipped" },
      shipped:            { label:"تأیید تحویل",               next:"delivered" },
    };
    return (type==="custom" ? CUSTOM : STOCK)[status];
  };

  const act = getNextAction(order.order_status, orderType, creditAllowed, customer?.customer_status);

  const changeStatus = async (next) => {
    if (next==="shipped" && !trackCode) { showToast("کد رهگیری را وارد کنید","error"); return; }
    if (next==="payment_confirmed" && payMethod==="check" && !checkNum) { showToast("شماره چک را وارد کنید","error"); return; }
    setSaving(true);
    try {
      const patch = { order_status:next, updated_at:new Date().toISOString(), order_type:orderType };
      if (next==="shipped") patch.tracking_code = trackCode;
      if (next==="payment_confirmed") {
        patch.payment_method = payMethod;
        if (payMethod==="check") { patch.check_number=checkNum; patch.check_bank=checkBank; patch.check_due_date=checkDate; }
      }
      await api("PATCH",`crm_orders?id=eq.${order.id}`, patch);
      await api("POST","crm_order_status_log",{
        order_id:order.id, from_status:order.order_status, to_status:next,
        changed_by:me.id, note:note||null, created_at:new Date().toISOString()
      });

      // — If proforma is issued, also create invoice record in crm_invoices table
      if (next === "proforma_issued") {
        try {
          await api("POST", "crm-proforma-issue", { order_id: order.id });
        } catch(e) { console.warn("Proforma issue warning:", e.message); }
        try {
          await api("POST", "crm_invoices", {
            order_id: order.id,
            invoice_type: "proforma",
            total: order.total_amount || 0,
            status: "issued",
            invoice_number: `PF-${order.order_number || order.id}`
          });
        } catch(e) { console.warn("Invoice record creation warning:", e.message); }
      }
      showToast("وضعیت بروز شد"); onUpdate(); onClose();
    } catch(e) { showToast("خطا","error"); }
    finally { setSaving(false); }
  };

  if (loading) return <Modal title="جزئیات سفارش" onClose={onClose}><Spinner /></Modal>;

  /* نرخ تخفیف بر اساس حجم */
  const totalQty = items.reduce((s,i)=>s+Number(i.qty||i.quantity||0),0);
  const discount = getTierDiscount(totalQty);
  const tier = PRICE_TIERS.find(t => totalQty >= t.min && totalQty <= t.max);

  return (
    <Modal title={`سفارش #${fa(order.id)}`} onClose={onClose} maxWidth={860}>
      {/* Header info */}
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ flex:1, minWidth:180, padding:14, background:C.surfaceAlt, borderRadius:10 }}>
          <p style={{ fontSize:11, color:C.textMuted, marginBottom:5, fontWeight:600 }}>مشتری</p>
          <p style={{ fontSize:14, fontWeight:600, marginBottom:3 }}>{customer?.name||"—"}</p>
          <div style={{ display:"flex", gap:10, fontSize:11, color:C.textMuted }}>
            {customer?.phone && <span>📞 {fa(customer.phone)}</span>}
            {creditAllowed && <span style={{ color:C.success }}>✓ اعتباری</span>}
          </div>
        </div>
        <div style={{ padding:14, background:C.surfaceAlt, borderRadius:10 }}>
          <p style={{ fontSize:11, color:C.textMuted, marginBottom:5, fontWeight:600 }}>وضعیت</p>
          <Tag status={order.order_status} />
          {order.order_status==="exit_approval" && (() => {
            const entered = log.find(l=>l.to_status==="exit_approval");
            if (!entered) return null;
            const elapsedMin = Math.floor((Date.now()-new Date(entered.created_at))/60000);
            const remaining = 60 - elapsedMin;
            const over = remaining < 0;
            return (
              <div style={{ marginTop:6, padding:"3px 8px", borderRadius:5, fontSize:11, fontWeight:600,
                background: over?"#EF444420":"#F9731620",
                color: over?"#EF4444":"#F97316" }}>
                {over ? `⚠ ${fa(Math.abs(remaining))} دقیقه تأخیر` : `⏱ SLA: ${fa(remaining)} دقیقه مانده`}
              </div>
            );
          })()}
          {order.order_status==="customer_approval" && (
            <div style={{ marginTop:6, padding:"3px 8px", borderRadius:5, fontSize:11, fontWeight:600,
              background:"#EC489920", color:"#EC4899" }}>
              👤 مسئول: کریملو
            </div>
          )}
        </div>
        {order.order_status === "pending_payment" && (
          <div style={{ padding:14, background:C.successDim, borderRadius:10, display:"flex", alignItems:"center" }}>
            <button onClick={() => setShowPayModal(true)} style={{
              padding:"10px 18px", borderRadius:8, border:"none",
              background:C.success, color:"#fff", cursor:"pointer",
              fontFamily:FF, fontSize:13, fontWeight:600
            }}>تأیید پرداخت</button>
          </div>
        )}
        <div style={{ padding:14, background:C.surfaceAlt, borderRadius:10 }}>
          <p style={{ fontSize:11, color:C.textMuted, marginBottom:5, fontWeight:600 }}>نوع سفارش</p>
          {isAdmin && order.order_status === "registered" ? (
            <div style={{ display:"flex", gap:6 }}>
              {[["stock","موجودی انبار"],["custom","سفارشی/تولیدی"]].map(([v,l]) => (
                <button key={v} onClick={() => setOrderType(v)} style={{
                  padding:"4px 10px", borderRadius:6, border:`1.5px solid ${orderType===v?C.primary:C.border}`,
                  background:orderType===v?C.primaryDim:"transparent", color:orderType===v?C.primary:C.textMuted,
                  cursor:"pointer", fontFamily:FF, fontSize:11
                }}>{l}</button>
              ))}
            </div>
          ) : (
            <span style={{ fontSize:13, fontWeight:600, color:orderType==="custom"?C.purple:C.teal }}>
              {orderType==="custom"?"سفارشی / تولیدی":"موجودی انبار"}
            </span>
          )}
        </div>
        <div style={{ padding:14, background:C.primaryDim, borderRadius:10 }}>
          <p style={{ fontSize:11, color:C.textMuted, marginBottom:5, fontWeight:600 }}>مبلغ کل</p>
          <p style={{ fontSize:15, fontWeight:700, color:C.primary }}>{cur(order.total_amount)}</p>
          {discount > 0 && <p style={{ fontSize:10, color:C.success }}>تخفیف حجمی {fa(discount)}٪ اعمال شد</p>}
        </div>
      </div>

      {/* تخفیف حجمی */}
      {totalQty > 0 && (

function CRMModule({ me, showToast }) {
  const [customers, setCustomers] = useState([]);
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("customers");
  const [showForm, setShowForm] = useState(false);
  const [editCust, setEditCust] = useState(null);
  const [detailOrder, setDetailOrder] = useState(null);
  const [search, setSearch] = useState("");
  const [cTypeFilter, setCTypeFilter] = useState("all");
  const isSA = me?.system_role==="super_admin" || [1,2].includes(me?.id);

  const load = async () => {
    setLoading(true);
    try {
      const [c,o] = await Promise.all([
        api("GET","crm_customers?order=created_at.desc"),
        api("GET","crm_orders?order=created_at.desc")
      ]);
      setCustomers(c||[]); setOrders(o||[]);
    } catch(e) { showToast("خطا","error"); }
    finally { setLoading(false); }
  };
  useEffect(() => {
    load();
    // Poll crm_orders every 10s for freshness.
    const iv = setInterval(() => {
      api("GET","crm_orders?order=created_at.desc").then(o => { if(o) setOrders(o); }).catch(()=>{});
    }, 10000);
    return () => { clearInterval(iv); };
  },[]);

  const del = async (id) => {
    if (!confirm("حذف این مشتری؟")) return;
    await api("DELETE",`crm_customers?id=eq.${id}`); showToast("حذف شد"); load();
  };

  const filteredC = customers.filter(c =>
    (cTypeFilter === 'all' || c.customer_type === cTypeFilter) &&
    (!search || c.name?.includes(search) || c.phone?.includes(search) || c.city?.includes(search))
  );
  const filteredO = orders.filter(o => !search || String(o.id).includes(search));

  if (loading) return <Spinner />;

  const gradeLabel = g => ({ standard:"معمولی", silver:"نقره‌ای", gold:"طلایی", vip:"VIP" }[g]||g);
  const gradeColor = g => ({ standard:C.textMuted, silver:"#9CA3AF", gold:"#F59E0B", vip:"#8B5CF6" }[g]||C.textMuted);
  const custStatusLabel = s => ({ active:"فعال", new:"جدید", suspended:"تعلیق" }[s]||s);
  const custStatusColor = s => ({ active:"#10B981", new:"#EC4899", suspended:"#EF4444" }[s]||C.textMuted);

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>مشتریان</h2>
          <p style={{ fontSize:12, color:C.textDim }}>{fa(customers.length)} مشتری — {fa(orders.length)} سفارش</p>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <div style={{ display:"flex", gap:0, background:C.surfaceAlt, borderRadius:8, border:`1px solid ${C.border}`, overflow:"hidden" }}>
            {[["customers","مشتریان"],["orders","سفارشات"]].map(([k,l]) => (
              <button key={k} onClick={() => setView(k)} style={{
                padding:"7px 14px", border:"none", fontFamily:FF, fontSize:12, cursor:"pointer",
                background: view===k ? C.primary : "transparent",
                color: view===k ? "#fff" : C.textMuted
              }}>{l}</button>
            ))}
          </div>
          {view==="customers" && <Btn label="مشتری جدید" icon="plus" onClick={() => { setEditCust(null); setShowForm(true); }} />}
          {view==="orders" && <Btn label="بارگذاری مجدد" icon="refresh" onClick={load} />}
        </div>
      </div>

      <div style={{ position:"relative", marginBottom:14 }}>
        <Ic name="search" size={15} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
        <input style={{ ...iStyle, paddingRight:34 }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="جستجو..." />
      </div>

      {view==="customers" && (
        <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
          {[['all','همه'],['wholesale','عمده‌فروش'],['retail','خرده‌فروش']].map(([k,l]) => (
            <div key={k} onClick={() => setCTypeFilter(k)}
              style={{ padding:"5px 14px", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600,
                background:cTypeFilter===k?C.primary:C.surfaceAlt, color:cTypeFilter===k?"#111":C.textMuted }}>
              {l}
            </div>
          ))}
        </div>
      )}

      {view==="customers" ? (
        <div style={{ display:"grid", gap:10 }}>
          {filteredC.length===0 ? <Empty /> : filteredC.map(c => (
            <div key={c.id} style={{
              padding:16, ...cardStyle,
              display:"flex", justifyContent:"space-between", alignItems:"center", gap:12
            }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5, flexWrap:"wrap" }}>
                  <p style={{ fontSize:14, fontWeight:600, color:C.text }}>{c.name}</p>
                  <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:gradeColor(c.grade)+"20", color:gradeColor(c.grade), fontWeight:600 }}>{gradeLabel(c.grade)}</span>
                  {c.customer_type && (
                    <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:c.customer_type==='retail'?C.successDim:C.warningDim, color:c.customer_type==='retail'?C.success:C.warning, fontWeight:600 }}>
                      {c.customer_type === 'retail' ? 'خرده‌فروش' : 'عمده‌فروش'}
                    </span>
                  )}
                  {c.customer_status && c.customer_status!=="active" && (
                    <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:custStatusColor(c.customer_status)+"20", color:custStatusColor(c.customer_status), fontWeight:600 }}>{custStatusLabel(c.customer_status)}</span>
                  )}
                  {c.portal_active && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:C.infoDim, color:C.info, fontWeight:600 }}>پورتال</span>}
                </div>
                <p style={{ fontSize:12, color:C.textMuted }}>
                  {c.phone ? fa(c.phone) : "—"} {c.city && `• ${c.city}`} {c.payment_terms && `• ${c.payment_terms}`}
                </p>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <Btn label="ویرایش" icon="edit" small outline onClick={() => { setEditCust(c); setShowForm(true); }} />
                {isSA && <Btn label="حذف" icon="trash" small danger onClick={() => del(c.id)} />}
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ display:"grid", gap:10 }}>
          {filteredO.length===0 ? <Empty /> : filteredO.map(o => {
            const cust = customers.find(c => c.id===o.customer_id);
            return (
              <div key={o.id} style={{
                padding:16, ...cardStyle, cursor:"pointer"
              }} onClick={() => setDetailOrder({ order:o, customer:cust })}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:12, color:C.textDim }}>#{fa(o.id)}</span>
                    <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{cust?.name||"—"}</span>
                  </div>
                  <Tag status={o.order_status} />
                </div>
                <div style={{ display:"flex", gap:16, fontSize:12, color:C.textMuted }}>
                  <span>مبلغ: <b style={{ color:C.primary }}>{shortCur(o.total_amount)}</b></span>
                  <span>{new Date(o.created_at).toLocaleDateString("fa-IR")}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {showForm && <CustomerForm customer={editCust} onSave={() => { setShowForm(false); load(); }} onCancel={() => setShowForm(false)} showToast={showToast} />}
      {detailOrder && <OrderDetail order={detailOrder.order} customer={detailOrder.customer} me={me} showToast={showToast} onUpdate={load} onClose={() => setDetailOrder(null)} />}
    </div>
  );
}
