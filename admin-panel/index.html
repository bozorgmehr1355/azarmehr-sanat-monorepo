          <div>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>شرکت آذرمهر صنعت</div>
            <div style={{ fontSize:10, color:C.textDim }}>گروه محصولات غذایی عقرب</div>
          </div>
        </div>
      </div>
      <nav style={{ flex:1, padding:"12px 8px", overflowY:"auto" }}>
        {NAV.map(section => (
          <div key={section.section} style={{ marginBottom:16 }}>
            <div style={{ fontSize:10, color:C.textMuted, fontWeight:700, padding:"0 8px 6px", letterSpacing:1 }}>{section.section}</div>
            {section.items.map(item => {
              const locked = item.saOnly && !isSA;
              const active = tab===item.key;
              return (
                <button key={item.key} onClick={() => !locked && handleNav(item.key)} style={{
                  display:"flex", alignItems:"center", gap:10, width:"100%", padding:"9px 12px",
                  borderRadius:10, border:"none", cursor:locked?"not-allowed":"pointer", fontFamily:FF,
                  fontSize:13, marginBottom:2, textAlign:"right",
                  background:active?C.primaryDim:"transparent",
                  color:locked?C.textMuted:active?C.primary:C.textDim,
                  transition:"all 0.15s"
                }}>
                  <Ic name={item.icon} size={16} color={locked?C.textMuted:active?C.primary:C.textDim} />
                  <span style={{ flex:1 }}>{item.label}</span>
                  {locked && <Ic name="lock" size={12} color={C.textMuted} />}
                </button>
              );
            })}
          </div>
        ))}
      </nav>
      <div style={{ padding:"12px 16px", borderTop:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
          <div style={{ width:32, height:32, borderRadius:"50%", background:C.primaryDim, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:C.primary }}>{me?.name?.charAt(0)||"A"}</div>
          <div style={{ flex:1, overflow:"hidden" }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{me?.name}</div>
            <div style={{ fontSize:10, color:C.textDim }}>{me?.system_role==="super_admin"?"مدیر ارشد":me?.system_role==="admin"?"ادمین":"مشاهده‌گر"}</div>
          </div>
        </div>
        <button onClick={(e) => { e.stopPropagation(); onChangePassword(); }} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", padding:"8px 10px", borderRadius:8, border:`1px solid ${C.border}`, cursor:"pointer", fontFamily:FF, fontSize:12, background:"transparent", color:C.textDim, marginBottom:6 }}>
          <Ic name="lock" size={14} color={C.textDim} />
          تغییر رمز
        </button>
        <button onClick={onLogout} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", padding:"8px 10px", borderRadius:8, border:`1px solid ${C.border}`, cursor:"pointer", fontFamily:FF, fontSize:12, background:"transparent", color:C.textDim }}>
          <Ic name="logout" size={14} color={C.textDim} />
          خروج از حساب
        </button>
      </div>
    </aside>
  );
}

/* ═══════════════════════════════════════ CANONICAL UI COMPONENTS ══════════════════════ */
function Card({ children, style, onClick }) {
  return React.createElement('div', {
    onClick: onClick,
    style: Object.assign({ background:C.surface, borderRadius:RD.md, border:'1px solid '+C.border, padding:SP.lg }, style||{}),
  }, children);
}

function EmptyState({ icon, title, subtitle }) {
  return React.createElement('div', {style:{textAlign:'center', padding:SP.xxxl+'px '+SP.lg+'px'}},
    title ? React.createElement('p', {style:{fontSize:FZ.base, color:C.textMuted, marginBottom:4}}, title) : null,
    subtitle ? React.createElement('p', {style:{fontSize:FZ.xs, color:C.textDim}}, subtitle) : null,
  );
}

function Badge({ label, variant }) {
  var mp = { success:C.success, warning:C.warning, danger:C.danger, info:C.info, primary:C.primary, default:C.textMuted };
  var c = mp[variant] || mp.default;
  return React.createElement('span', {style:{fontSize:FZ.xs, padding:'2px 7px', borderRadius:4, background:c+'22', color:c, whiteSpace:'nowrap', fontWeight:500}}, label);
}

/* ═══════════════════════════════════════ TOAST + APP ════════════════════════════════ */
function ToastContainer({ toasts }) {
  return (
    <div style={{ position:"fixed", top:16, left:16, zIndex:9999, display:"flex", flexDirection:"column", gap:8, pointerEvents:"none" }}>
      {toasts.map(t => (
        <div key={t.id} style={{ padding:"10px 16px", borderRadius:10, fontSize:13, fontFamily:FF,
          background:t.type==="error"?C.danger:t.type==="warning"?C.warning:C.success,
          color:"#fff", boxShadow:"0 4px 16px #0006", animation:"fadeUp 0.3s ease", minWidth:200 }}>{t.msg}</div>
      ))}
    </div>
  );
}

function App() {
  const [me, setMe]           = useState(null);
  const [tab, setTab]         = useState("dashboard");
  const [toasts, setToasts]   = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [changePwdOpen, setChangePwdOpen] = useState(false);
  const [changePwdForm, setChangePwdForm] = useState({ currentPassword:"", newPassword:"", confirmPassword:"" });
  const [changePwdLoading, setChangePwdLoading] = useState(false);
  const [changePwdError, setChangePwdError] = useState("");
  const [changePwdSuccess, setChangePwdSuccess] = useState("");
  const winW = useWindowWidth();
  const isMobile = winW < 900;

  const showToast = (msg, type="success") => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), 3500);
  };
  const logout = () => { setMe(null); setTab("dashboard"); setSidebarOpen(false); localStorage.removeItem("adminToken"); };
  const openChangePassword = () => {
    setChangePwdForm({ currentPassword:"", newPassword:"", confirmPassword:"" });
    setChangePwdError("");
    setChangePwdSuccess("");
    setChangePwdLoading(false);
    setSidebarOpen(false);
    setChangePwdOpen(true);
  };
  const closeChangePassword = () => {
    setChangePwdOpen(false);
    setChangePwdForm({ currentPassword:"", newPassword:"", confirmPassword:"" });
    setChangePwdError("");
    setChangePwdSuccess("");
    setChangePwdLoading(false);
  };
  const submitChangePassword = async () => {
    const f = changePwdForm;
    if (!f.currentPassword || !f.newPassword || !f.confirmPassword) {
      setChangePwdError("لطفاً همه فیلدها را پر کنید");
      return;
    }
    if (f.newPassword.length < 6) {
      setChangePwdError("رمز عبور جدید حداقل ۶ کاراکتر باید باشد");
      return;
    }
    if (f.newPassword !== f.confirmPassword) {
      setChangePwdError("تکرار رمز با رمز جدید مطابقت ندارد");
      return;
    }
    setChangePwdError("");
    setChangePwdSuccess("");
    setChangePwdLoading(true);
    try {
      const token = localStorage.getItem("adminToken");
      const res = await fetch("https://azarmehr-backend-main.vercel.app/api/users/reset-password", {
        method:"POST",
        headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`},
        body:JSON.stringify({ currentPassword:f.currentPassword, newPassword:f.newPassword })
      });
      const data = await res.json();
      if (res.ok) {
        setChangePwdSuccess("رمز عبور با موفقیت تغییر کرد");
        setChangePwdForm({ currentPassword:"", newPassword:"", confirmPassword:"" });
      } else {
        setChangePwdError(data.error || "تغییر رمز انجام نشد");
      }
    } catch(e) {
      setChangePwdError("تغییر رمز انجام نشد");
    } finally {
      setChangePwdLoading(false);
    }
  };

  if (!me) return <LoginScreen onLogin={setMe} />;
  if (me.type==="customer") return <CustomerPortal me={me} onLogout={logout} />;

  const modules = {
    dashboard: <Dashboard  me={me} showToast={showToast} onNavigate={setTab} />,
    financial: <FinancialModule me={me} showToast={showToast} />,
    crm:       <CRMModule  me={me} showToast={showToast} />,
    scorpion:  <ScorpionModule  showToast={showToast} />,
    orders:    <OrdersModule    me={me} showToast={showToast} />,
    opsboard:  <OrderOpsBoard   me={me} showToast={showToast} />,
    products:  <ProductsModule  me={me} showToast={showToast} />,
    rules:     <RulesModule     me={me} showToast={showToast} />,
    marketing: <MarketingModule   me={me} showToast={showToast} />,
    whatsapp:  <WhatsAppBroadcast me={me} showToast={showToast} />,
    inbox:     <WhatsAppInbox me={me} showToast={showToast} />,
    leads:     <LeadsInbox me={me} showToast={showToast} />,
    ["customer-timeline"]: <CustomerTimeline me={me} showToast={showToast} />,
    reports:   <ReportsModule     me={me} showToast={showToast} />,
    guarantee: <GuaranteeModule me={me} showToast={showToast} />,
    support: <SupportTicketsModule me={me} showToast={showToast} />,
    ["portal-registrations"]: <PortalRegistrationRequests me={me} showToast={showToast} />,
    access:    <AccessModule    me={me} showToast={showToast} />,
    settings:  <SettingsPanel   me={me} showToast={showToast} />,
    ["org-chart"]: <OrgChartEditor me={me} showToast={showToast} />,
  };

  return (
    <div style={{ display:"flex", position:"fixed", inset:0, background:C.bg, fontFamily:FF, direction:"rtl" }}>
      {isMobile && sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)}
             style={{ position:"fixed", inset:0, background:"#000a", zIndex:150 }} />
      )}
      <Sidebar tab={tab} setTab={setTab} me={me} onLogout={logout} onChangePassword={openChangePassword}
               isMobile={isMobile} open={sidebarOpen} onClose={() => setSidebarOpen(false)} />
      <main style={{ flex:1, padding:isMobile?12:24, paddingBottom:isMobile?70:24, overflowY:"auto", overflowX:"hidden", minWidth:0 }}>
        {isMobile && (
          <div style={{ display:"flex", alignItems:"center", marginBottom:14, paddingBottom:12, borderBottom:`1px solid ${C.border}` }}>
            <button onClick={() => setSidebarOpen(true)}
                    style={{ background:"transparent", border:"none", cursor:"pointer", padding:6, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:8, width:34, height:34 }}>
              <Ic name="menu" size={22} color={C.text} style={{ marginTop:3 }} />
            </button>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", width:26, height:26, marginLeft:6 }}>
              <svg viewBox="0 0 1597.09 1256.73" style={{ width:26, height:26, display:"block" }} xmlns="http://www.w3.org/2000/svg">
                <path fill="#D1D3D4" d="M32.12,800.55c5.51,37.78,23.61,71.79,52.02,101.42c24.63,25.68,57.02,48.03,95.7,66.58c124.95,59.95,315.53,80.27,521.98,45.1c161.02-27.41,303.14-83.72,406.19-153.93c15.45-10.53,4.94-37.08-12.43-31.46c-67.51,21.84-142.36,40.31-221.71,53.83c-302.01,51.45-562.33,13.23-608.42-84.92c-0.42-0.91-0.82-1.81-1.2-2.72c-2.55-5.95-4.31-12.13-5.23-18.53c-16.65-113.64,231.63-250.37,554.57-305.36c110.39-18.8,215.21-25.62,306.08-21.88c-111.74-43.28-245.77-68.52-389.88-68.52c-104.25,0-203.22,13.21-292.3,36.91C183.05,499.71,10.79,654.94,32.12,800.55"/>
                <path fill="#D1D3D4" d="M471.02,1137.2c111.72,43.28,245.7,68.48,389.77,68.48c104.42,0,203.56-13.23,292.74-37.02c254.21-82.7,426.22-237.85,404.88-383.38c-5.51-37.75-23.61-71.79-52.02-101.38c-24.61-25.68-57-48.05-95.66-66.62c-124.97-59.95-315.51-80.28-522-45.1c-160.99,27.43-303.14,83.72-406.17,153.95c-15.45,10.51-4.96,37.06,12.41,31.44c67.53-21.84,142.38-40.29,221.73-53.81c302-51.45,562.33-13.21,608.44,84.9c0.4,0.91,0.78,1.81,1.18,2.72c2.53,5.97,4.3,12.16,5.23,18.53c16.65,113.64-231.63,250.37-554.57,305.38C666.63,1134.1,561.83,1140.91,471.02,1137.2"/>
                <path fill="#FDB913" d="M958.52,180.31c0,78.1-63.33,141.43-141.43,141.43s-141.43-63.33-141.43-141.43S738.99,38.88,817.09,38.88C895.19,38.88,958.52,102.21,958.52,180.31"/>
              </svg>
            </div>
            <span style={{ fontSize:10, fontWeight:700, color:C.text, lineHeight:"34px", marginLeft:10, marginTop:7 }}>شرکت آذرمهر صنعت</span>
          </div>
        )}
        {modules[tab] || modules.dashboard}
      </main>
      {isMobile && (
        <div style={{
          position:"fixed", bottom:0, left:0, right:0, zIndex:100,
          background:C.surface, borderTop:`1px solid ${C.border}`,
          display:"flex", justifyContent:"space-around", alignItems:"center",
          padding:"6px 0", paddingBottom:"calc(6px + env(safe-area-inset-bottom, 0px))",
          fontFamily:FF, fontSize:10,
        }}>
          {[
            { tab:"dashboard", icon:"dashboard", label:"داشبورد" },
            { tab:"orders",    icon:"cart",      label:"سفارشات" },
            { tab:"crm",       icon:"building",  label:"مشتریان" },
            { tab:"financial", icon:"wallet",    label:"مالی" },
            { tab:"products",  icon:"package",   label:"محصولات" },
          ].map(({tab:t, icon, label}) => (
            <button key={t} onClick={() => { setTab(t); setSidebarOpen(false); }}
              style={{
                display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                background:"transparent", border:"none", cursor:"pointer",
                padding:"4px 8px", borderRadius:8, minWidth:56,
                color: tab===t ? C.primary : C.textDim,
                transition:"0.12s",
              }}>
              <Ic name={icon} size={18} color={tab===t ? C.primary : C.textDim} />
              <span style={{ fontWeight: tab===t ? 600 : 400, fontSize:10 }}>{label}</span>
            </button>
          ))}
        </div>
      )}
      <ToastContainer toasts={toasts} />
      {changePwdOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", background:"#000a" }} onClick={closeChangePassword}>
          <div style={{ background:C.surface, borderRadius:20, padding:28, width:"100%", maxWidth:400, border:`1px solid ${C.border}`, boxShadow:"0 12px 48px #0008", margin:16 }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:20, color:C.text, textAlign:"center" }}>تغییر رمز عبور</div>
            {changePwdError && (
              <div style={{ background:C.danger+"22", border:`1px solid ${C.danger}44`, borderRadius:10, padding:"10px 14px", fontSize:13, color:C.danger, marginBottom:14 }}>{changePwdError}</div>
            )}
            {changePwdSuccess && (
              <div style={{ background:C.success+"22", border:`1px solid ${C.success}44`, borderRadius:10, padding:"10px 14px", fontSize:13, color:C.success, marginBottom:14 }}>{changePwdSuccess}</div>
            )}
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, color:C.textMuted, marginBottom:5 }}>رمز فعلی</div>
              <input type="password" value={changePwdForm.currentPassword} onChange={e => setChangePwdForm(f=>({...f,currentPassword:e.target.value}))} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:FF }} />
            </div>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, color:C.textMuted, marginBottom:5 }}>رمز جدید</div>
              <input type="password" value={changePwdForm.newPassword} onChange={e => setChangePwdForm(f=>({...f,newPassword:e.target.value}))} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:FF }} />
            </div>
            <div style={{ marginBottom:22 }}>
              <div style={{ fontSize:12, color:C.textMuted, marginBottom:5 }}>تکرار رمز جدید</div>
              <input type="password" value={changePwdForm.confirmPassword} onChange={e => setChangePwdForm(f=>({...f,confirmPassword:e.target.value}))} style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:FF }} />
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={submitChangePassword} disabled={changePwdLoading} style={{ flex:1, padding:"12px", borderRadius:12, border:"none", background:C.primary, color:"#111", fontWeight:700, cursor:changePwdLoading?"not-allowed":"pointer", fontFamily:FF, fontSize:14, opacity:changePwdLoading?0.7:1 }}>
                {changePwdLoading ? "در حال ثبت..." : "ثبت"}
              </button>
              <button onClick={closeChangePassword} disabled={changePwdLoading} style={{ flex:1, padding:"12px", borderRadius:12, border:`1px solid ${C.border}`, background:"transparent", color:C.textDim, fontWeight:600, cursor:"pointer", fontFamily:FF, fontSize:14 }}>
                انصراف
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>
</body>
</html>
