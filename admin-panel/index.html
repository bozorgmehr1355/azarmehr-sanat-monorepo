  const [form, setForm] = useState(null);
  const [search, setSearch] = useState("");
  const [filterChannel, setFilterChannel] = useState("all");
  const [filterType,    setFilterType]    = useState("all");
  const [mktDateFrom,   setMktDateFrom]   = useState("");
  const [mktDateTo,     setMktDateTo]     = useState("");
  const [saving, setSaving] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [custs, comms] = await Promise.all([
        api("GET","crm_customers?select=id,name,phone,whatsapp,eitaa_id,city,grade&order=name.asc"),
        api("GET","crm_communications?order=created_at.desc&limit=100").catch(() => []),
      ]);
      setCustomers(custs||[]);
      setLogs(comms||[]);
    } catch(e) { showToast("خطا در بارگذاری","error"); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const saveLog = async () => {
    if (!form.customer_id || !form.channel || !form.comm_type) {
      showToast("مشتری، کانال و نوع تماس الزامی است","error"); return;
    }
    setSaving(true);
    try {
      await api("POST","crm_communications",{
        ...form, created_by: me.id, created_at: new Date().toISOString()
      });
      showToast("ثبت شد"); setForm(null); load();
    } catch(e) { showToast("جدول crm_communications باید در Supabase ساخته شود","error"); }
    finally { setSaving(false); }
  };

  const gradeColor = g => ({ standard:C.textMuted, silver:"#9CA3AF", gold:"#F59E0B", vip:"#8B5CF6" }[g]||C.textMuted);
  const chColor = k => COMM_CHANNELS.find(c=>c.key===k)?.color || C.textMuted;
  const chLabel = k => COMM_CHANNELS.find(c=>c.key===k)?.label || k;
  const typeLabel = k => COMM_TYPES.find(t=>t.key===k)?.label || k;

  const filteredLogs = logs.filter(function(l) {
    if (filterChannel !== "all" && l.channel !== filterChannel) return false;
    if (filterType !== "all" && l.comm_type !== filterType) return false;
    if (mktDateFrom) {
      try {
        var p=mktDateFrom.split("-").map(Number); var gFrom=j2g(p[0],p[1],p[2]);
        if (new Date(l.created_at) < new Date(gFrom[0],gFrom[1]-1,gFrom[2])) return false;
      } catch(e){}
    }
    if (mktDateTo) {
      try {
        var p2=mktDateTo.split("-").map(Number); var gTo=j2g(p2[0],p2[1],p2[2]);
        var end=new Date(gTo[0],gTo[1]-1,gTo[2]); end.setDate(end.getDate()+1);
        if (new Date(l.created_at) >= end) return false;
      } catch(e){}
    }
    if (search) {
      var cust = customers.find(function(c){return c.id===l.customer_id;});
      if (!cust?.name?.includes(search) && !(l.note||"").includes(search)) return false;
    }
    return true;
  });

  const filteredCusts = customers.filter(c =>
    !search || c.name?.includes(search) || c.phone?.includes(search) || c.city?.includes(search)
  );

  // Stats
  const channelStats = COMM_CHANNELS.map(ch => ({
    ...ch, count: logs.filter(l=>l.channel===ch.key).length
  })).sort((a,b)=>b.count-a.count);
  const totalLogs = logs.length;
  const thisMonth = logs.filter(l => {
    const d = new Date(l.created_at);
    const now = new Date();
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).length;

  const exportCommsCSV = function() {
    var header = ["مشتری","شهر","درجه","کانال","نوع تماس","یادداشت","اقدام بعدی","تاریخ یادآوری","تاریخ ثبت"];
    var dataRows = filteredLogs.map(function(l) {
      var c = customers.find(function(x) { return x.id === l.customer_id; });
      var gradeMap = { standard:"معمولی", silver:"نقره‌ای", gold:"طلایی", vip:"VIP" };
      var chLbl = COMM_CHANNELS.find(function(x){return x.key===l.channel;});
      var tpLbl = COMM_TYPES.find(function(x){return x.key===l.comm_type;});
      return [
        c ? c.name : "",
        c ? (c.city || "") : "",
        c ? (gradeMap[c.grade] || c.grade || "") : "",
        chLbl ? chLbl.label : (l.channel || ""),
        tpLbl ? tpLbl.label : (l.comm_type || ""),
        l.note || "",
        l.next_action || "",
        l.next_date ? new Date(l.next_date).toLocaleDateString("fa-IR") : "",
        l.created_at ? new Date(l.created_at).toLocaleDateString("fa-IR") : ""
      ];
    });
    var rows = [header].concat(dataRows);
    var csv = "\uFEFF" + rows.map(function(r) {
      return r.map(function(v){ return '"' + String(v).split('"').join('""') + '"'; }).join(",");
    }).join("\n");
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "تماس-مشتریان.csv"; a.click();
    URL.revokeObjectURL(url);
    showToast("فایل CSV دانلود شد");
  };

  if (loading) return <Spinner />;

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>ارتباط با مشتری</h2>
          <p style={{ fontSize:12, color:C.textDim }}>پیگیری، کمپین و تاریخچه تماس‌ها</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn label="خروجی CSV" icon="download" small outline onClick={exportCommsCSV} />
          <Btn label="ثبت تماس جدید" icon="plus" onClick={() => setForm({ customer_id:"", channel:"whatsapp", comm_type:"followup", result:"", next_action:"", next_date:"", note:"" })} />
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:0, background:C.surfaceAlt, borderRadius:10, border:`1px solid ${C.border}`, overflow:"hidden", marginBottom:18, width:"fit-content" }}>
        {[["log","تاریخچه تماس‌ها"],["customers","لیست مشتریان"],["stats","آمار بازاریابی"]].map(([k,l]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            padding:"8px 16px", border:"none", fontFamily:FF, fontSize:12, cursor:"pointer",
            background: tab===k ? C.primary : "transparent", color: tab===k ? "#fff" : C.textMuted
          }}>{l}</button>
        ))}
      </div>

      {/* ── TAB: LOG ── */}
      {tab==="log" && (
        <>
          <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ position:"relative", flex:1, minWidth:180 }}>
              <Ic name="search" size={15} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
              <input style={{ ...iStyle, paddingRight:34 }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="جستجو در تماس‌ها..." />
            </div>
            <select style={{ ...iStyle, width:"auto", cursor:"pointer" }} value={filterChannel} onChange={e=>setFilterChannel(e.target.value)}>
              <option value="all">همه کانال‌ها</option>
              {COMM_CHANNELS.map(ch => <option key={ch.key} value={ch.key}>{ch.label}</option>)}
            </select>
            <select style={{ ...iStyle, width:"auto", cursor:"pointer" }} value={filterType||"all"} onChange={e=>setFilterType(e.target.value)}>
              <option value="all">همه انواع</option>
              {COMM_TYPES.map(t => <option key={t.key} value={t.key}>{t.label}</option>)}
            </select>
            <div style={{ minWidth:150 }}>
              <JalaliPicker value={mktDateFrom} onChange={setMktDateFrom} placeholder="از تاریخ" />
            </div>
            <div style={{ minWidth:150 }}>
              <JalaliPicker value={mktDateTo} onChange={setMktDateTo} placeholder="تا تاریخ" />
            </div>
            {(mktDateFrom||mktDateTo) && (
              <button onClick={()=>{setMktDateFrom("");setMktDateTo("");}} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, padding:"7px 10px", cursor:"pointer", fontSize:11, fontFamily:FF }}>✕ پاک</button>
            )}
            <span style={{ fontSize:11, color:C.textDim, whiteSpace:"nowrap" }}>{fa(filteredLogs.length)} تماس</span>
          </div>

          <div style={{ display:"grid", gap:10 }}>
            {filteredLogs.length===0 ? <Empty text="تماسی ثبت نشده" icon="📞" /> : filteredLogs.map((l,i) => {
              const cust = customers.find(c=>c.id===l.customer_id);
              const cc = chColor(l.channel);
              return (
                <div key={i} style={{
                  padding:16, background:C.surface, borderRadius:12,
                  border:`1px solid ${C.border}`, borderRight:`3px solid ${cc}`
                }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <p style={{ fontSize:14, fontWeight:600, color:C.text }}>{cust?.name||"—"}</p>
                      <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:cc+"20", color:cc, fontWeight:600 }}>{chLabel(l.channel)}</span>
                      <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:C.surfaceAlt, color:C.textMuted }}>{typeLabel(l.comm_type)}</span>
                    </div>
                    <span style={{ fontSize:11, color:C.textDim }}>{l.created_at ? new Date(l.created_at).toLocaleDateString("fa-IR") : "—"}</span>
                  </div>
                  {l.note && <p style={{ fontSize:12, color:C.textMuted, marginBottom:l.next_action?6:0 }}>{l.note}</p>}
                  {l.next_action && (
                    <p style={{ fontSize:11, padding:"5px 10px", background:C.warningDim, borderRadius:6, color:C.warning }}>
                      اقدام بعدی: {l.next_action} {l.next_date && `— ${new Date(l.next_date).toLocaleDateString("fa-IR")}`}
                    </p>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── TAB: CUSTOMERS ── */}
      {tab==="customers" && (
        <>
          <div style={{ position:"relative", marginBottom:14 }}>
            <Ic name="search" size={15} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
            <input style={{ ...iStyle, paddingRight:34 }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="جستجوی مشتری..." />
          </div>
          <div style={{ display:"grid", gap:10 }}>
            {filteredCusts.length===0 ? <Empty /> : filteredCusts.map(c => {
              const custLogs = logs.filter(l=>l.customer_id===c.id);
              const lastLog = custLogs[0];
              const daysSince = lastLog ? Math.floor((Date.now()-new Date(lastLog.created_at))/86400000) : null;
              const urgent = daysSince===null || daysSince > 30;
              return (
                <div key={c.id} style={{
                  padding:16, background:C.surface, borderRadius:12,
                  border:`1px solid ${C.border}`, borderRight:`3px solid ${urgent ? C.warning : C.success}`,
                  display:"flex", justifyContent:"space-between", alignItems:"center"
                }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5 }}>
                      <p style={{ fontSize:14, fontWeight:600, color:C.text }}>{c.name}</p>
                      <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:gradeColor(c.grade)+"20", color:gradeColor(c.grade), fontWeight:600 }}>
                        {{ standard:"معمولی", silver:"نقره‌ای", gold:"طلایی", vip:"VIP" }[c.grade]||c.grade}
                      </span>
                      {urgent && <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:C.warningDim, color:C.warning, fontWeight:600 }}>نیاز به پیگیری</span>}
                    </div>
                    <div style={{ fontSize:12, color:C.textMuted, display:"flex", gap:12 }}>
                      {c.phone && <span>📞 {fa(c.phone)}</span>}
                      {c.whatsapp && <span>💬 {fa(c.whatsapp)}</span>}
                      {c.city && <span>📍 {c.city}</span>}
                      {daysSince!==null && <span style={{ color: daysSince>30?C.warning:C.success }}>آخرین تماس: {fa(daysSince)} روز پیش</span>}
                      {daysSince===null && <span style={{ color:C.danger }}>بدون تماس</span>}
                    </div>
                  </div>
                  <Btn label="ثبت تماس" icon="plus" small onClick={() =>
                    setForm({ customer_id:c.id, channel:"whatsapp", comm_type:"followup", result:"", next_action:"", next_date:"", note:"" })
                  } />
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── TAB: STATS ── */}
      {tab==="stats" && (
        <div style={{ display:"grid", gap:16 }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:12 }}>
            <KPICard label="کل تماس‌ها" value={fa(totalLogs)} icon="trend" color={C.primary} />
            <KPICard label="این ماه" value={fa(thisMonth)} icon="chart" color={C.info} />
            <KPICard label="مشتریان فعال" value={fa(customers.length)} icon="users" color={C.success} />
            <KPICard label="نیاز به پیگیری" value={fa(customers.filter(c=>{
              const last = logs.find(l=>l.customer_id===c.id);
              return !last || (Date.now()-new Date(last.created_at))/86400000 > 30;
            }).length)} icon="alert" color={C.warning} />
          </div>

          <div style={{ padding:20, ...cardStyle }}>
            <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:14 }}>تماس‌ها به تفکیک کانال</p>
            <div style={{ display:"grid", gap:8 }}>
              {channelStats.map(ch => (
                <div key={ch.key} style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ fontSize:13, color:C.text, width:80 }}>{ch.label}</span>
                  <div style={{ flex:1, background:C.border, borderRadius:4, height:8, overflow:"hidden" }}>
                    <div style={{ width: totalLogs > 0 ? `${(ch.count/totalLogs)*100}%` : "0%", height:"100%", background:ch.color, borderRadius:4, transition:"width 0.5s" }} />
                  </div>
                  <span style={{ fontSize:12, color:C.textMuted, width:40, textAlign:"left" }}>{fa(ch.count)}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ padding:20, ...cardStyle }}>
            <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:14 }}>پرتکرارترین مشتریان</p>
            <div style={{ display:"grid", gap:8 }}>
              {customers.map(c => ({ ...c, cnt: logs.filter(l=>l.customer_id===c.id).length }))
                .filter(c=>c.cnt>0).sort((a,b)=>b.cnt-a.cnt).slice(0,8).map((c,i) => (
                <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", background:C.surfaceAlt, borderRadius:8 }}>
                  <span style={{ fontSize:13, color:C.text }}>{c.name}</span>
                  <span style={{ fontSize:12, padding:"2px 9px", borderRadius:5, background:C.primaryDim, color:C.primary, fontWeight:600 }}>{fa(c.cnt)} تماس</span>
                </div>
              ))}
              {!logs.length && <Empty text="هنوز تماسی ثبت نشده" icon="📊" />}
            </div>
          </div>
        </div>
      )}

      {/* ── FORM MODAL ── */}
      {form && (
        <Modal title="ثبت تماس / پیگیری" onClose={() => setForm(null)} maxWidth={500}>
          <Fld label="مشتری *">
            <select style={{ ...iStyle, cursor:"pointer" }} value={form.customer_id} onChange={e=>setForm(f=>({...f,customer_id:e.target.value}))}>
              <option value="">انتخاب کنید...</option>
              {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </Fld>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Fld label="کانال ارتباطی *">
              <select style={{ ...iStyle, cursor:"pointer" }} value={form.channel} onChange={e=>setForm(f=>({...f,channel:e.target.value}))}>
                {COMM_CHANNELS.map(ch => <option key={ch.key} value={ch.key}>{ch.label}</option>)}
              </select>
            </Fld>
            <Fld label="نوع ارتباط *">
              <select style={{ ...iStyle, cursor:"pointer" }} value={form.comm_type} onChange={e=>setForm(f=>({...f,comm_type:e.target.value}))}>
                {COMM_TYPES.map(t => <option key={t.key} value={t.key}>{t.label}</option>)}
              </select>
            </Fld>
          </div>
          <Fld label="نتیجه / خلاصه مکالمه">
            <textarea style={{ ...iStyle, resize:"none" }} rows={3} value={form.note||""} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="چه اتفاقی افتاد، مشتری چه گفت..." />
          </Fld>
          <Fld label="اقدام بعدی">
            <input style={iStyle} value={form.next_action||""} onChange={e=>setForm(f=>({...f,next_action:e.target.value}))} placeholder="مثال: ارسال نمونه، تماس مجدد..." />
          </Fld>
          <Fld label="تاریخ یادآوری">
            <JalaliPicker value={form.next_date||""} onChange={v=>setForm(f=>({...f,next_date:v}))} placeholder="انتخاب تاریخ یادآوری" />
          </Fld>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn label="انصراف" onClick={() => setForm(null)} outline />
            <Btn label={saving?"در حال ذخیره...":"ثبت تماس"} icon="check" onClick={saveLog} disabled={saving} />
          </div>
        </Modal>
      )}
    </div>
  );
}


/* mini helper */
function OrderSummaryCards({ filtered }) {
  const totalRev  = filtered.reduce((s,o)=>s+(o.total_amount||0),0);
  const pending   = filtered.filter(o=>["pending_payment","contract_pending","stock_check"].includes(o.order_status)).length;
  const delivered = filtered.filter(o=>o.order_status==="delivered").length;
  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:10, marginBottom:14 }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px" }}>
        <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>فیلترشده</p>
        <p style={{ fontSize:18, fontWeight:700, color:C.primary }}>{fa(filtered.length)}</p>
      </div>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px" }}>
        <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>مجموع مبلغ</p>
        <p style={{ fontSize:15, fontWeight:700, color:C.success }}>{shortCur(totalRev)}</p>
      </div>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px" }}>
        <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>در انتظار</p>
        <p style={{ fontSize:18, fontWeight:700, color:C.warning }}>{fa(pending)}</p>
      </div>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px" }}>
        <p style={{ fontSize:10, color:C.textDim, marginBottom:4 }}>تحویل‌داده‌شده</p>
        <p style={{ fontSize:18, fontWeight:700, color:C.success }}>{fa(delivered)}</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════ ORDERS MODULE ══════════════════════════════ */
function OrdersModule({ me, showToast }) {
  const [orders, setOrders]     = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [newOrder, setNewOrder] = useState(false);
  const [search, setSearch]     = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [ordDateFrom, setOrdDateFrom]   = useState("");
  const [ordDateTo,   setOrdDateTo]     = useState("");

  const load = async () => {
    setLoading(true);
    try {
      const [ords, custs] = await Promise.all([
        api("GET","crm_orders?order=created_at.desc"),
        api("GET","crm_customers?select=id,name,phone,credit_allowed")
      ]);
      setOrders(ords||[]); setCustomers(custs||[]);
    } catch(e) { showToast("خطا در بارگذاری","error"); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    load();
    const iv = setInterval(() => {
      api("GET","crm_orders?order=created_at.desc").then(o => { if(o) setOrders(o); }).catch(()=>{});
    }, 10000);
    return () => clearInterval(iv);
  }, []);

  const custMap = Object.fromEntries((customers||[]).map(c=>[c.id,c]));

  const exportOrdersCSV = () => {
    var header = ["شماره","مشتری","تلفن","نوع","مبلغ","وضعیت","تاریخ ثبت"];
    var dataRows = filtered.map(function(o) {
      var c = custMap[o.customer_id];
      return [
        o.id,
        c ? c.name : "",
        c ? c.phone : "",
        o.order_type === "custom" ? "سفارشی" : "انبار",
        o.total_amount || 0,
        ORDER_STATUS[o.order_status] ? ORDER_STATUS[o.order_status].label : (o.order_status || ""),
        new Date(o.created_at).toLocaleDateString("fa-IR")
      ];
    });
    var rows = [header].concat(dataRows);
    var csv = "\uFEFF" + rows.map(function(r) {
      return r.map(function(v) { return '"' + String(v).split('"').join('""') + '"'; }).join(",");
    }).join("\n");
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "سفارشات.csv"; a.click();
    URL.revokeObjectURL(url);
    showToast("فایل CSV دانلود شد");
  };

  const filtered = orders.filter(function(o) {
    var cust = custMap[o.customer_id];
    if (search && !cust?.name?.includes(search) && !String(o.id).includes(search)) return false;
    if (statusFilter !== "all" && o.order_status !== statusFilter) return false;
    if (ordDateFrom) {
      try { var p=ordDateFrom.split("-").map(Number); var g=j2g(p[0],p[1],p[2]); if(new Date(o.created_at)<new Date(g[0],g[1]-1,g[2])) return false; } catch(e){}
    }
    if (ordDateTo) {
      try { var p2=ordDateTo.split("-").map(Number); var g2=j2g(p2[0],p2[1],p2[2]); var e2=new Date(g2[0],g2[1]-1,g2[2]); e2.setDate(e2.getDate()+1); if(new Date(o.created_at)>=e2) return false; } catch(e){}
    }
    return true;
  });

  const selectedCust = selected ? custMap[selected.customer_id] : null;

  if (loading) return <Spinner />;

  if (selected) return (
    <OrderDetail
      order={selected} customer={selectedCust} me={me} showToast={showToast}
      onUpdate={load} onClose={() => setSelected(null)}
    />
  );

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* ─── هدر + دکمه‌ها ─── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>مدیریت سفارشات</h2>
          <p style={{ fontSize:12, color:C.textDim }}>{fa(orders.length)} سفارش کل</p>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <Btn label="بارگذاری مجدد" icon="refresh" small outline onClick={load} />
          <Btn label="خروجی CSV" icon="download" small outline onClick={exportOrdersCSV} />
          <Btn label="ثبت سفارش جدید" icon="plus" onClick={() => setNewOrder(true)} />
        </div>
      </div>

      {/* ─── کارت‌های خلاصه ─── */}
      <OrderSummaryCards filtered={filtered} />

      {/* ─── فیلترها ─── */}
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <Ic name="search" size={14} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />

function NewOrderModal({ customers, showToast, onClose, onSaved }) {
  const [products, setProducts] = useState([]);
  const [saving, setSaving]     = useState(false);
  const [form, setForm]         = useState({
    customer_id:"", order_type:"stock", sales_channel:"wholesale", note:"", delivery_address:""
  });
  const [items, setItems] = useState([{ product_id:"", product_name:"", qty:1, unit_price:0 }]);

  useEffect(function() {
    api("GET","products?order=name.asc").then(function(p){ setProducts(p||[]); }).catch(function(){});
  }, []);

  var prodMap = {};
  products.forEach(function(p){ prodMap[p.id] = p; });

  var totalAmount = items.reduce(function(s,it){
    return s + (Number(it.qty)||0) * (Number(it.unit_price)||0);
  }, 0);

  function addItem() {
    setItems(function(prev){ return prev.concat([{ product_id:"", product_name:"", qty:1, unit_price:0 }]); });
  }
  function removeItem(idx) {
    setItems(function(prev){ return prev.filter(function(_,i){ return i!==idx; }); });
  }
  function updateItem(idx, key, val) {
    setItems(function(prev){
      return prev.map(function(it,i){
        if (i !== idx) return it;
        var updated = Object.assign({}, it);
        updated[key] = val;
        if (key === "product_id") {
          var p = prodMap[val];
          if (p) { updated.product_name = p.name; updated.unit_price = p.base_price || 0; }
        }
        return updated;
      });
    });
  }

  var save = async function() {
    if (!form.customer_id) { showToast("مشتری را انتخاب کنید","error"); return; }
    var validItems = items.filter(function(it){ return it.product_id && Number(it.qty)>0; });
    if (!validItems.length) { showToast("حداقل یک محصول اضافه کنید","error"); return; }
    setSaving(true);
    try {
      var order = await api("POST","crm_orders",{
        customer_id: Number(form.customer_id),
        order_type: form.order_type,
        sales_channel: form.sales_channel,
        source_app: "admin-panel",
        order_status: "registered",
        total_amount: totalAmount,
        note: form.note || null,
        delivery_address: form.delivery_address || null,
        created_at: new Date().toISOString()
      });
      if (order && order.id) {
        for (var i=0; i<validItems.length; i++) {
          var it = validItems[i];
          await api("POST","crm_order_items",{
            order_id: order.id,
            product_id: Number(it.product_id),
            product_name: it.product_name,
            qty: Number(it.qty),
            unit_price: Number(it.unit_price),
            total: Number(it.qty)*Number(it.unit_price)
          });
        }

        // ── اعمال تخفیف پله‌ای روی کل سبد ──
        try {
          var repriceResult = await api("POST","reprice_order",{ p_order_id: order.id });
          if (repriceResult && repriceResult.data && repriceResult.data.total_qty > 0) {
            console.log("[Reprice] Basket repriced:", repriceResult.data);
          }
        } catch (repriceErr) {
          console.warn("[Reprice] Repricing failed (non-fatal):", repriceErr.message);
        }
      }
      showToast("سفارش ثبت شد");
      onSaved();
    } catch(e) { showToast("خطا در ثبت سفارش","error"); }
    finally { setSaving(false); }
  };

  return (
    <Modal title="ثبت سفارش جدید" onClose={onClose} maxWidth={600}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <Fld label="مشتری *">
          <select style={{ ...iStyle, cursor:"pointer" }} value={form.customer_id} onChange={function(e){setForm(function(f){return Object.assign({},f,{customer_id:e.target.value});});}}>
            <option value="">انتخاب کنید...</option>
            {customers.map(function(c){ return <option key={c.id} value={c.id}>{c.name}</option>; })}
          </select>
        </Fld>
        <Fld label="نوع سفارش">
          <select style={{ ...iStyle, cursor:"pointer" }} value={form.order_type} onChange={function(e){setForm(function(f){return Object.assign({},f,{order_type:e.target.value});});}}>
            <option value="stock">از انبار</option>
            <option value="custom">سفارشی / تولید</option>
          </select>
        </Fld>
        <Fld label="کانال فروش">
          <select style={{ ...iStyle, cursor:"pointer" }} value={form.sales_channel} onChange={function(e){setForm(function(f){return Object.assign({},f,{sales_channel:e.target.value});});}}>
            <option value="wholesale">عمده</option>
            <option value="retail">خرد</option>
          </select>
        </Fld>
        <Fld label="آدرس تحویل">
          <input style={iStyle} value={form.delivery_address||""} onChange={function(e){setForm(function(f){return Object.assign({},f,{delivery_address:e.target.value});});}} placeholder="آدرس تحویل سفارش..." />
        </Fld>
      </div>

      <div style={{ marginBottom:6, marginTop:4 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <p style={{ fontSize:12, fontWeight:700, color:C.textMuted }}>اقلام سفارش</p>
          <Btn label="افزودن قلم" icon="plus" small outline onClick={addItem} />
        </div>
        <div style={{ display:"grid", gap:8 }}>
          {items.map(function(it, idx) {
            return (
              <div key={idx} style={{ display:"grid", gridTemplateColumns:"2fr 80px 120px auto", gap:8, alignItems:"center", background:C.surfaceAlt, borderRadius:8, padding:"8px 10px" }}>
                <select style={{ ...iStyle, fontSize:12 }} value={it.product_id} onChange={function(e){ updateItem(idx,"product_id",e.target.value); }}>
                  <option value="">انتخاب محصول...</option>
                  {products.map(function(p){ return <option key={p.id} value={p.id}>{p.name}</option>; })}
                </select>
                <input type="number" style={{ ...iStyle, fontSize:12 }} value={it.qty} onChange={function(e){ updateItem(idx,"qty",e.target.value); }} placeholder="تعداد" min="1" />
                <input type="number" style={{ ...iStyle, fontSize:12 }} value={it.unit_price} onChange={function(e){ updateItem(idx,"unit_price",e.target.value); }} placeholder="قیمت واحد" />
                {items.length > 1 && (
                  <button onClick={function(){ removeItem(idx); }} style={{ background:"transparent", border:"none", cursor:"pointer", color:C.danger, fontSize:16, padding:"0 4px" }}>✕</button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ background:C.primaryDim, borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <span style={{ fontSize:12, color:C.textMuted }}>مجموع سفارش</span>
        <span style={{ fontSize:16, fontWeight:700, color:C.primary }}>{shortCur(totalAmount)}</span>
      </div>

      <Fld label="توضیحات">
        <textarea style={{ ...iStyle, resize:"none" }} rows={2} value={form.note||""} onChange={function(e){setForm(function(f){return Object.assign({},f,{note:e.target.value});});}} placeholder="توضیحات اضافه..." />
      </Fld>

      <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:4 }}>
        <Btn label="انصراف" onClick={onClose} outline />
        <Btn label={saving?"در حال ثبت...":"ثبت سفارش"} icon="check" onClick={save} disabled={saving} />
      </div>
    </Modal>
  );
}

    if (val===null || val===undefined) return "—";
    return shortCur(val);

    if (stock===null || stock===undefined) return "—";
    const num = Number(stock);

    if (num <= 10) return <span style={{ color:C.warning }}>{fa(num)} — محدود</span>;
    return <span style={{ color:C.success }}>{fa(num)}</span>;

        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>📦 مدیریت محصولات</h2>
          <p style={{ fontSize:12, color:C.textDim }}>{fa(products.length)} محصول — قیمت‌ها به ریال</p>

      {editingProduct && (
        <ProductEditModal product={editingProduct} onClose={() => setEditingProduct(null)} onSaved={handleSaved} showToast={showToast} />
      )}

  );
}

function ProductEditModal({ product, onClose, onSaved, showToast }) {
  const [form, setForm] = useState({ ...product });
  const [saving, setSaving] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const fileInputRef = useRef(null);

  const handleUploadClick = () => { fileInputRef.current?.click(); };

  const handleFileSelect = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    // Validate type
    const allowed = ['image/jpeg','image/png','image/webp','image/gif','image/svg+xml'];
    if (!allowed.includes(file.type)) {
      showToast("فرمت فایل مجاز نیست (jpg, png, webp, gif, svg)", "error");
      return;
    }
    // Validate size (max 2MB)
    if (file.size > 2 * 1024 * 1024) {
      showToast("حجم فایل باید کمتر از ۲ مگابایت باشد", "error");
      return;
    }
    setUploading(true);
    try {
      // Read file as base64
      const reader = new FileReader();
      const base64 = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      // Upload via API
      const result = await api("POST", "upload-product-image", {
        image: base64,
        filename: file.name,
      });
      if (result?.url) {
        handleChange("image_url", result.url);
        showToast("عکس با موفقیت آپلود شد ✅");
      } else {
        showToast("خطا در آپلود عکس", "error");
      }
    } catch (err) {
      showToast(err.message || "خطا در آپلود عکس", "error");
    } finally {
      setUploading(false);
      // Reset file input so same file can be re-selected
      if (fileInputRef.current) fileInputRef.current.value = "";
    }
  };

  const handleChange = (field, value) => { setForm(p => ({ ...p, [field]: value })); };

  const handleSave = async () => {
    setSaving(true);
    setError("");
    const payload = {
      name: form.name,
      description: form.description || "",
      category: form.category || "",
      packaging: form.packaging || "",
      package_size: form.package_size || "",
      quantity_in_carton: Number(form.quantity_in_carton) || 0,
      stock: Number(form.stock) || 0,
      guarantee_days: Number(form.guarantee_days) || 0,
      has_guarantee: !!form.has_guarantee,
      active: form.active !== false,
      image_url: form.image_url || "",
      base_price: Number(form.base_price) || 0,
      price_standard: Number(form.price_standard) || 0,
      price_silver: Number(form.price_silver) || 0,
      price_gold: Number(form.price_gold) || 0,
      price_vip: Number(form.price_vip) || 0,
    };
    try {
      await api("PATCH", `products?id=eq.${product.id}`, payload);
      showToast("محصول بروز شد");
      if (onSaved) onSaved();
      onClose();
    } catch (e) {
      setError(e.message || "خطا در ذخیره");
    } finally {
      setSaving(false);
    }
  };

  const F = ({ label, field, type="text", isPrice }) => (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      <label style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>{label}</label>
      <input type={type} value={form[field] ?? ""} onChange={e=>handleChange(field, e.target.value)}
        style={isPrice ? { ...iStyle, color:C.primary, fontWeight:600 } : iStyle} />
    </div>
  );

  return (
    <Modal title={"✏️ ویرایش: " + product.name} onClose={onClose} maxWidth={780}>
      {error && (
        <div style={{ background:C.danger+"22", border:`1px solid ${C.danger}44`, borderRadius:8, padding:"10px 14px", marginBottom:16, color:C.danger, fontSize:13, textAlign:"center" }}>{error}</div>
      )}
      <h4 style={{ fontSize:14, color:C.primary, marginBottom:12, fontWeight:600 }}>📋 مشخصات اصلی</h4>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16 }}>
        <F label="کد محصول" field="code" />
        <F label="نام محصول" field="name" />
        <F label="دسته‌بندی" field="category" />
        <F label="بسته‌بندی" field="packaging" />
        <F label="اندازه بسته" field="package_size" />
        <F label="تعداد در کارتن" field="quantity_in_carton" type="number" />
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          <label style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>تصویر محصول</label>
          <div style={{ display:"flex", gap:4 }}>
            <input type="text" value={form.image_url ?? ""} onChange={e=>handleChange("image_url", e.target.value)} placeholder="URL یا آپلود کن" style={{ ...iStyle, flex:1, direction:"ltr", textAlign:"left" }} />
            <input type="file" ref={fileInputRef} accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml" style={{ display:"none" }} onChange={handleFileSelect} />
            <button onClick={handleUploadClick} disabled={uploading} style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", gap:4, padding:"8px 12px", borderRadius:8, border:`1px solid ${C.primary}44`, background:C.primaryDim, color:C.primary, fontSize:12, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap", fontFamily:FF, opacity:uploading?0.6:1 }}>
              {uploading ? "..." : "📁 آپلود"}
            </button>
          </div>
        </div>
      </div>
      {form.image_url && (
        <div style={{ marginBottom:16, textAlign:"center" }}>
          <img src={form.image_url} alt="پیش‌نمایش" style={{ maxWidth:200, maxHeight:150, borderRadius:8, border:`1px solid ${C.border}`, objectFit:"contain" }} onError={e => { e.target.style.display="none" }} />
        </div>
      )}
      <h4 style={{ fontSize:14, color:C.primary, marginBottom:12, fontWeight:600 }}>📊 موجودی و گارانتی</h4>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16 }}>
        <F label="موجودی" field="stock" type="number" />
        <F label="گارانتی (روز)" field="guarantee_days" type="number" />
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          <label style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>گارانتی دارد</label>
          <select value={form.has_guarantee?"true":"false"} onChange={e=>handleChange("has_guarantee", e.target.value==="true")} style={iStyle}>
            <option value="true">بله</option>
            <option value="false">خیر</option>
          </select>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          <label style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>فعال</label>
          <select value={form.active!==false?"true":"false"} onChange={e=>handleChange("active", e.target.value==="true")} style={iStyle}>
            <option value="true">فعال</option>
            <option value="false">غیرفعال</option>
          </select>
        </div>
      </div>
      <h4 style={{ fontSize:14, color:C.primary, marginBottom:12, fontWeight:600 }}>💰 قیمت‌ها (ریال)</h4>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16 }}>
        <F label="قیمت پایه" field="base_price" type="number" isPrice />
        <F label="🟢 معمولی (Standard)" field="price_standard" type="number" isPrice />
        <F label="🔵 نقره‌ای (Silver)" field="price_silver" type="number" isPrice />
        <F label="🟡 طلایی (Gold)" field="price_gold" type="number" isPrice />
        <F label="🟣 ویژه (VIP)" field="price_vip" type="number" isPrice />
      </div>
      <h4 style={{ fontSize:14, color:C.primary, marginBottom:12, fontWeight:600 }}>📝 توضیحات</h4>

    finally { setLoading(false); }

  const handleToggleStatus = async (rule) => {

      await api("PATCH", `whatsapp-rules?id=eq.${rule.id}`, { status: newStatus });

function RuleEditModal({ rule, onClose, onSaved, showToast }) {
  const [form, setForm] = useState({
    condition_type: rule?.condition_type || "",
    condition_value: JSON.stringify(rule?.condition_value || {}, null, 2),
    status: rule?.status || "active",
    priority: rule?.priority ?? 0,
    description: rule?.description || "",
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [jsonValid, setJsonValid] = useState(true);

  const handleChange = (field, value) => {
    setForm(p => ({ ...p, [field]: value }));
    if (field === "condition_value") {
      try { JSON.parse(value); setJsonValid(true); } catch(e) { setJsonValid(false); }
    }
  };

  const handleSave = async () => {
    let parsedValue;
    try { parsedValue = JSON.parse(form.condition_value); }
    catch (e) { setError("JSON نامعتبر: " + e.message); return; }
    setSaving(true);
    setError("");
    const payload = {
      condition_type: form.condition_type,
      condition_value: parsedValue,
      status: form.status,
      priority: Number(form.priority) || 0,
      description: form.description,
    };
    try {
      if (rule?.id) {
        await api("PATCH", `whatsapp-rules?id=eq.${rule.id}`, payload);
        showToast("قانون بروز شد");
      } else {
        await api("POST", "whatsapp-rules", { ...payload, created_at: new Date().toISOString() });
        showToast("قانون ایجاد شد");
      }
      if (onSaved) onSaved();
      onClose();
    } catch (e) {
      setError(e.message || "خطا در ذخیره");
    } finally {
      setSaving(false);
    }
  };

  const Fld2 = ({ label, children }) => (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      <label style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>{label}</label>

  return (
    <Modal title={rule?"✏️ ویرایش قانون":"➕ قانون جدید"} onClose={onClose} maxWidth={680}>

      )}

        <Fld2 label="نوع قانون">
          <select value={form.condition_type} onChange={e=>handleChange("condition_type",e.target.value)} style={iStyle}>
            <option value="">انتخاب کنید...</option>
            <option value="pricing_logic">💰 قیمت‌گذاری (pricing_logic)</option>
            <option value="stock_check">📊 بررسی موجودی (stock_check)</option>
            <option value="greeting">👋 خوش‌آمدگویی (greeting)</option>
            <option value="fallback">🔄 پیش‌فرض (fallback)</option>
          </select>
        </Fld2>
        <Fld2 label="اولویت">
          <input type="number" value={form.priority} onChange={e=>handleChange("priority", +e.target.value)} style={iStyle} />
        </Fld2>
        <Fld2 label="وضعیت">
          <select value={form.status} onChange={e=>handleChange("status",e.target.value)} style={iStyle}>
            <option value="active">✅ فعال</option>
            <option value="inactive">❌ غیرفعال</option>
          </select>
        </Fld2>
        <Fld2 label="شناسه">
          <div style={{ ...iStyle, opacity:0.6, cursor:"default", display:"flex", alignItems:"center" }}>
            {rule?.id || "جدید (اتوماتیک)"}
          </div>
        </Fld2>
      </div>
      <Fld2 label="توضیحات">
        <input type="text" value={form.description} onChange={e=>handleChange("description",e.target.value)} style={iStyle} placeholder="توضیح کوتاه برای مدیر سیستم..." />
      </Fld2>
      <div style={{ marginTop:16 }}>
        <Fld2 label={<span>مقدار شرط (JSON) {!jsonValid && <span style={{color:C.danger,fontSize:11}}>⚠️ JSON نامعتبر</span>}</span>}>
          <textarea value={form.condition_value} onChange={e=>handleChange("condition_value",e.target.value)}
            style={{ ...iStyle, fontFamily:"monospace", minHeight:120, lineHeight:1.6, resize:"vertical", borderColor: jsonValid ? C.border : C.danger, width:"100%", boxSizing:"border-box" }} rows={6} />

      {form.condition_type === "pricing_logic" && (

          <strong style={{ color:C.primary }}>📖 راهنما — ساختار pricing_logic:</strong>
          <pre style={{ marginTop:6, fontFamily:"monospace", fontSize:11 }}>
{`{
  "grade_mapping": {
    "standard": "price_standard",
    "silver": "price_silver",
    "gold": "price_gold",
    "vip": "price_vip"
  },
  "default_grade": "standard",
  "fallback_field": "base_price",
  "show_stock": true,
  "show_packaging": true
}`}
          </pre>
        </div>
      )}
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:24 }}>
        <Btn label="انصراف" onClick={onClose} outline />

/* ═══════════════════════════════════════ ACCESS MODULE ══════════════════════════════ */
const ROLE_LABEL = { super_admin:"مدیر ارشد", admin:"ادمین", viewer:"مشاهده‌گر" };
const ROLE_COLOR = { super_admin:C.primary,    admin:C.info,   viewer:C.textDim     };
const EMPTY_ADMIN = { name:"", username:"", password:"", role:"admin", active:true };

function AccessModule({ me, showToast }) {
  const [admins, setAdmins]   = useState([]);
  const [form, setForm]       = useState(null);   // null | object
  const [editId, setEditId]   = useState(null);
  const [saving, setSaving]   = useState(false);
  const [showPw, setShowPw]   = useState(false);
  const isSA = me?.system_role === "super_admin";

  /* ── بارگذاری کاربران از سرور ── */
  useEffect(() => {
    api("GET","crm-admin-users").then(d => { if (d) setAdmins(d); }).catch(() => {});
  }, []);

  /* ── ذخیره / آپدیت ── */
  const save = async () => {
    if (!form.name || !form.username) { showToast("نام و نام‌کاربری الزامی است","error"); return; }
    if (!editId && !form.password)    { showToast("رمز عبور الزامی است","error"); return; }
    setSaving(true);
    try {
      /* تلاش برای ذخیره در Supabase */
      if (editId) {
        await api("PATCH",`crm_admin_users?id=eq.${editId}`, form);
      } else {
        await api("POST","crm_admin_users", { ...form, created_at: new Date().toISOString() });
      }
    showToast(editId ? "بروز شد" : "کاربر اضافه شد");
    api("GET","crm-admin-users").then(d => { if (d) setAdmins(d); }).catch(() => {});
  } catch(e) {
    /* fallback: فقط local state */
      if (editId) {
        setAdmins(a => a.map(u => u.id===editId ? { ...u, ...form } : u));
      } else {
        setAdmins(a => [...a, { ...form, id: Date.now() }]);
      }
      showToast(editId ? "بروز شد (محلی)" : "اضافه شد (محلی)");
    }
    setForm(null); setEditId(null); setSaving(false);
  };

  const remove = async (id) => {
    if (!confirm("این کاربر حذف شود؟")) return;
    try {
      await api("DELETE", `crm-admin-users?id=eq.${id}`);
      setAdmins(a => a.filter(u => u.id !== id));
      showToast("حذف شد");
    } catch(e) {
      showToast("خطا در حذف کاربر", "error");
    }
  };

  const toggleActive = async (id) => {
    const user = admins.find(u => u.id === id);
    const newActive = user?.active === false;
    try {
      const r = await api("PATCH", `crm-admin-users?id=eq.${id}`, { active: newActive });
      if (r) {
        setAdmins(a => a.map(u => u.id===id ? { ...u, active: r.active } : u));
        showToast(newActive ? "فعال شد" : "غیرفعال شد");
      }
    } catch(e) {
      showToast("خطا در تغییر وضعیت", "error");
    }
  };

  /* ── تغییر نقش از طریق سرور ── */
  const handleRoleChange = async (userId, newRole) => {
    // به‌روزرسانی آنی UI
    setAdmins(arr => arr.map(u => u.id === userId ? { ...u, role: newRole } : u));
    try {
      await api("PATCH", `crm-admin-users?id=eq.${userId}`, { role: newRole });
      showToast("نقش کاربر بروز شد");
    } catch(e) {
      showToast("خطا در تغییر نقش", "error");
      // برگشت به وضعیت سرور
      api("GET","crm-admin-users").then(d => { if (d) setAdmins(d); }).catch(() => {});
    }
  };

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>کنترل دسترسی</h2>
          <p style={{ fontSize:12, color:C.textDim }}>مدیریت کاربران و سطح دسترسی پنل مدیریت</p>
        </div>
        {isSA && (
          <Btn label="کاربر جدید" icon="plus" onClick={() => { setForm({...EMPTY_ADMIN}); setEditId(null); }} />
        )}
      </div>

      {/* آمار نقش‌ها */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:24 }}>
        {[["super_admin","مدیر ارشد",C.primary],["admin","ادمین",C.info],["viewer","مشاهده‌گر",C.textDim]].map(([role,label,color])=>(
          <div key={role} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:16 }}>
            <div style={{ fontSize:11, color:C.textDim, marginBottom:6 }}>{label}</div>
            <div style={{ fontSize:28, fontWeight:700, color }}>{fa(admins.filter(a=>a.role===role).length)}</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>نفر</div>
          </div>
        ))}
      </div>

      {/* لیست کاربران */}
      <div style={{...cardStyle, overflow:"hidden", marginBottom:24 }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center" }}>
          <h3 style={{ fontSize:14, fontWeight:700, color:C.text, flex:1 }}>کاربران پنل مدیریت</h3>
        </div>
        {admins.map((a,i) => {
          const inactive = a.active === false;
          return (
            <div key={a.id} style={{
              display:"flex", alignItems:"center", gap:12, padding:"13px 18px",
              borderBottom: i<admins.length-1?`1px solid ${C.border}`:"none",
              background: a.id===me?.id ? C.primaryDim : i%2===0?C.surface:C.surfaceAlt,
              opacity: inactive ? 0.5 : 1
            }}>
              <div style={{ width:38, height:38, borderRadius:"50%", background:ROLE_COLOR[a.role]+"22",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:700,
                color:ROLE_COLOR[a.role], flexShrink:0 }}>
                {a.name.charAt(0)}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600, color:C.text, display:"flex", alignItems:"center", gap:6 }}>
                  {a.name}
                  {a.id===me?.id && <span style={{ fontSize:10, color:C.primary, background:C.primaryDim, padding:"1px 6px", borderRadius:4 }}>شما</span>}
                  {inactive && <span style={{ fontSize:10, color:C.danger, background:C.dangerDim, padding:"1px 6px", borderRadius:4 }}>غیرفعال</span>}
                </div>
                <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>@{a.username}</div>
              </div>

              {/* نقش — قابل تغییر توسط super_admin */}
              {isSA && a.id !== me?.id ? (
                <select value={a.role} onChange={e => handleRoleChange(a.id, e.target.value)}
                  style={{ ...iStyle, width:120, padding:"4px 8px", fontSize:12, cursor:"pointer" }}>
                  <option value="super_admin">مدیر ارشد</option>
                  <option value="admin">ادمین</option>
                  <option value="viewer">مشاهده‌گر</option>
                </select>
              ) : (
                <span style={{ fontSize:11, fontWeight:600, padding:"4px 10px", borderRadius:6,
                  background:ROLE_COLOR[a.role]+"22", color:ROLE_COLOR[a.role], whiteSpace:"nowrap" }}>
                  {ROLE_LABEL[a.role]}
                </span>
              )}

              {isSA && a.id !== me?.id && (
                <div style={{ display:"flex", gap:6 }}>
                  <Btn label="ویرایش" icon="edit" small outline onClick={() => { setForm({...a}); setEditId(a.id); }} />
                  <Btn label={inactive?"فعال":"غیرفعال"} small outline onClick={() => toggleActive(a.id)} />
                  <Btn label="حذف" icon="trash" small danger onClick={() => remove(a.id)} />
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ماتریس دسترسی */}
      <div style={{ ...cardStyle, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:14, fontWeight:700, color:C.text }}>ماتریس دسترسی</h3>
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                <th style={{ padding:"10px 16px", textAlign:"right", color:C.textDim, minWidth:160 }}>ماژول</th>
                {[["مدیر ارشد",C.primary],["ادمین",C.info],["مشاهده‌گر",C.textDim]].map(([r,c])=>(
                  <th key={r} style={{ padding:"10px 20px", color:c, textAlign:"center", fontWeight:600 }}>{r}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                ["داشبورد","✓ کامل","✓ کامل","✓ کامل"],
                ["مالی و حسابداری","✓ کامل","✓ کامل","👁 فقط مشاهده"],
                ["عمده‌فروشی (B2B)","✓ کامل","✓ کامل","👁 فقط مشاهده"],
                ["خرده‌فروشی","✓ کامل","✓ کامل","👁 فقط مشاهده"],
                ["مدیریت سفارشات","✓ کامل","✓ کامل","👁 فقط مشاهده"],
                ["محصولات","✓ کامل","✓ کامل","— دسترسی ندارد"],
                ["ارتباط با مشتری","✓ کامل","✓ کامل","— دسترسی ندارد"],
                ["کنترل دسترسی","✓ کامل","— دسترسی ندارد","— دسترسی ندارد"],
              ].map(([mod,sa,ad,vi],i)=>(
                <tr key={i} style={{ borderBottom:`1px solid ${C.border}`, background:i%2===0?C.surface:C.surfaceAlt }}>
                  <td style={{ padding:"11px 16px", color:C.text, fontWeight:500 }}>{mod}</td>
                  {[sa,ad,vi].map((cell,j)=>{
                    const isOk = cell.startsWith("✓");
                    const isView = cell.startsWith("👁");
                    return (
                      <td key={j} style={{ padding:"11px 20px", textAlign:"center" }}>
                        <span style={{ fontSize:11, fontWeight:600, padding:"3px 8px", borderRadius:5,
                          background: isOk?C.successDim:isView?C.infoDim:C.surfaceAlt,
                          color: isOk?C.success:isView?C.info:C.textMuted }}>
                          {cell}
                        </span>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* فرم افزودن / ویرایش */}
      {form && (
        <Modal title={editId?"ویرایش کاربر":"کاربر جدید"} onClose={() => { setForm(null); setEditId(null); }} maxWidth={460}>
          <Fld label="نام کامل *">
            <input style={iStyle} value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
          </Fld>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Fld label="نام کاربری *">
              <input style={iStyle} value={form.username||""} onChange={e=>setForm(f=>({...f,username:e.target.value}))} autoComplete="off" />
            </Fld>
            <Fld label={editId?"رمز جدید (خالی = بدون تغییر)":"رمز عبور *"}>
              <div style={{ position:"relative" }}>
                <input style={{ ...iStyle, paddingLeft:34 }} type={showPw?"text":"password"} value={form.password||""} onChange={e=>setForm(f=>({...f,password:e.target.value}))} autoComplete="new-password" />
                <button onClick={()=>setShowPw(v=>!v)} style={{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:C.textDim, fontSize:13 }}>{showPw?"🙈":"👁"}</button>
              </div>
            </Fld>
          </div>
          <Fld label="نقش / سطح دسترسی">
            <select style={{ ...iStyle, cursor:"pointer" }} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              <option value="super_admin">مدیر ارشد — دسترسی کامل</option>
              <option value="admin">ادمین — بدون کنترل دسترسی</option>
              <option value="viewer">مشاهده‌گر — فقط خواندن</option>
            </select>
          </Fld>
          <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, cursor:"pointer", color:C.text, marginTop:4 }}>
            <input type="checkbox" checked={form.active!==false} onChange={e=>setForm(f=>({...f,active:e.target.checked}))} />
            کاربر فعال باشد
          </label>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:16 }}>
            <Btn label="انصراف" outline onClick={() => { setForm(null); setEditId(null); }} />
            <Btn label={saving?"...":"ذخیره"} icon="check" onClick={save} disabled={saving} />
          </div>
        </Modal>
      )}
    </div>
  );
}

function AdminLogin({ onLogin }) {
  const [un, setUn] = useState(""); const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [err, setErr] = useState(""); const [loading, setLoading] = useState(false);
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showIOSPrompt, setShowIOSPrompt] = useState(false);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !navigator.standalone;
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); };
    window.addEventListener("beforeinstallprompt", handler);
    if (isIOS) setShowIOSPrompt(true);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);
  const login = async () => {
    setLoading(true); setErr("");
    try {
      const res = await fetch("https://azarmehr-backend-main.vercel.app/api/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ username:un, password:pw })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem("adminToken", data.token);
        onLogin({ ...data.user, type:"admin" });
      } else {
        setErr("نام کاربری یا رمز عبور نادرست است");

      setErr("خطا در اتصال به سرور");

function PortalLogin({ onLogin, onBack }) {
  const [un, setUn] = useState(""); const [pw, setPw] = useState("");
  const [err, setErr] = useState(""); const [loading, setLoading] = useState(false);
  const login = async () => {
    setLoading(true); setErr("");
    try {
      const res = await fetch("https://azarmehr-backend-main.vercel.app/api/portal-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: un, password: pw })
      });
      if (res.ok) {
        const data = await res.json();
        onLogin({ ...data, type: "customer" });
      } else {
        setErr("نام کاربری یا رمز عبور پرتال نادرست است");
      }
    } catch(e) { setErr("نام کاربری یا رمز عبور پرتال نادرست است"); }
    finally { setLoading(false); }
  };
  return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:FF, direction:"rtl" }}>
      <div style={{ width:380, padding:36, background:C.surface, borderRadius:20, border:`1px solid ${C.border}`, boxShadow:"0 20px 60px #0008" }}>
        <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", color:C.textDim, fontSize:12, marginBottom:20, fontFamily:FF }}>← بازگشت</button>
        <div style={{ textAlign:"center", marginBottom:28 }}>
