/* ═══════════════════════════════════════ CUSTOMER PORTAL ════════════════════════════ */
function CustomerPortal({ me, onLogout }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expandedId, setExpandedId] = useState(null);
  const [itemsCache, setItemsCache] = useState({});
  const [itemsLoading, setItemsLoading] = useState(false);
  useEffect(() => {
    (async () => {
      try { setOrders((await api("GET",`crm_orders?customer_id=eq.${me.id}&order=created_at.desc`))||[]); }
      catch {} finally { setLoading(false); }
    })();
  },[]);
  async function toggleOrder(orderId) {
    if (expandedId === orderId) { setExpandedId(null); return; }
    setExpandedId(orderId);
    if (!itemsCache[orderId]) {
      setItemsLoading(true);
      try {
        const items = (await api("GET",`crm_order_items?order_id=eq.${orderId}`)) || [];
        setItemsCache(prev => ({ ...prev, [orderId]: items }));
      } catch(e) { setItemsCache(prev => ({ ...prev, [orderId]: [] })); }
      finally { setItemsLoading(false); }
    }
  }
  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:FF, direction:"rtl", padding:24 }}>
      <div style={{ maxWidth:760, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div>
            <h1 style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:2 }}>خوش آمدید، {me.name}</h1>
            <p style={{ fontSize:12, color:C.textDim }}>پورتال مشتریان گروه محصولات غذایی عقرب</p>
          </div>
          <Btn label="خروج" outline onClick={onLogout} />
        </div>
        {loading ? <Spinner /> : (
          <div style={{ ...cardStyle, overflow:"hidden" }}>
            <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}` }}>
              <h3 style={{ fontSize:14, fontWeight:700, color:C.text }}>سفارشات من ({fa(orders.length)})</h3>
            </div>
            {orders.length===0 ? <Empty text="سفارشی ثبت نشده" icon="📦" /> : orders.map((o,i) => (
              <React.Fragment key={o.id}>
              <div style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 18px", borderBottom:i<orders.length-1?`1px solid ${C.border}`:"none", background:i%2===0?C.surface:C.surfaceAlt, cursor:"pointer" }} onClick={() => toggleOrder(o.id)}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>سفارش #{fa(o.id)}</div>
                  <div style={{ fontSize:11, color:C.textDim }}>{new Date(o.created_at).toLocaleDateString("fa-IR")}</div>
                </div>
                <div style={{ fontSize:13, fontWeight:600, color:C.primary }}>{cur(o.total_amount)}</div>
                <Tag status={o.order_status} />
                <span style={{ fontSize:11, color:C.textDim }}>{expandedId===o.id ? "▼" : "◀"}</span>
              </div>
              {expandedId===o.id && (
                <div style={{ padding:"10px 18px 14px 18px", background:C.surfaceAlt, borderBottom:i<orders.length-1?`1px solid ${C.border}`:"none", direction:"rtl" }}>
                  {itemsLoading && !itemsCache[o.id] ? (
                    <Spinner />
                  ) : itemsCache[o.id] && itemsCache[o.id].length > 0 ? (
                    <table style={{ width:"100%", fontSize:12, borderCollapse:"collapse" }}>
                      <thead>
                        <tr style={{ color:C.textDim, borderBottom:`1px solid ${C.border}` }}>
                          <th style={{ padding:"4px 6px", textAlign:"right" }}>محصول</th>
                          <th style={{ padding:"4px 6px", textAlign:"center" }}>تعداد</th>
                          <th style={{ padding:"4px 6px", textAlign:"left" }}>قیمت واحد</th>
                          <th style={{ padding:"4px 6px", textAlign:"left" }}>جمع</th>
                        </tr>
                      </thead>
                      <tbody>
                        {(itemsCache[o.id]||[]).map(it => (
                          <tr key={it.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                            <td style={{ padding:"4px 6px", textAlign:"right", color:C.text }}>{it.product_name || "—"}</td>
                            <td style={{ padding:"4px 6px", textAlign:"center", color:C.text }}>{fa(it.quantity ?? it.qty ?? "—")}</td>
                            <td style={{ padding:"4px 6px", textAlign:"left", color:C.text }}>{cur(it.unit_price)}</td>
                            <td style={{ padding:"4px 6px", textAlign:"left", color:C.primary, fontWeight:600 }}>{cur(it.line_total ?? it.total ?? ((it.quantity ?? it.qty ?? 0) * (it.unit_price ?? 0)))}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  ) : (
                    <div style={{ fontSize:12, color:C.textDim, textAlign:"center", padding:8 }}>قلمی ثبت نشده</div>
                  )}
                </div>
              )}
              </React.Fragment>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════ REPORTS MODULE ═════════════════════════════ */
function ReportsModule({ me, showToast }) {
  const [dateFrom,    setDateFrom]    = useState("");
  const [dateTo,      setDateTo]      = useState("");
  const [productFilter, setProductFilter] = useState("all");
  const [cityFilter,  setCityFilter]  = useState("all");
  const [statusFilter,setStatusFilter]= useState("all");
  const [orders,      setOrders]      = useState([]);
  const [customers,   setCustomers]   = useState([]);
  const [products,    setProducts]    = useState([]);
  const [orderItems,  setOrderItems]  = useState([]);
  const [loading,     setLoading]     = useState(true);

  const load = async () => {
    setLoading(true);
    try {
      const [ords, custs, prods] = await Promise.all([
        api("GET","crm_orders?order=created_at.desc"),
        api("GET","crm_customers?select=id,name,phone,city"),
        api("GET","products?select=id,name"),
      ]);
      setOrders(ords||[]); setCustomers(custs||[]); setProducts(prods||[]);
      if ((ords||[]).length > 0) {
        const items = await api("GET","crm_order_items?select=order_id,product_id,product_name,qty,unit_price").catch(()=>[]);
        setOrderItems(items||[]);
      }
    } catch(e) { showToast("خطا در بارگذاری گزارش","error"); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const custMap = Object.fromEntries((customers||[]).map(c=>[c.id,c]));
  const itemsByOrder = {};
  (orderItems||[]).forEach(it => {
    if (!itemsByOrder[it.order_id]) itemsByOrder[it.order_id] = [];
    itemsByOrder[it.order_id].push(it);
  });
  const cities = [...new Set((customers||[]).map(c=>c.city).filter(Boolean))].sort();

  const filtered = (orders||[]).filter(o => {
    const cust = custMap[o.customer_id];
    const oDate = new Date(o.created_at);
    if (dateFrom) {
      try { const [jy,jm,jd]=dateFrom.split('-').map(Number); const [gy,gm,gd]=j2g(jy,jm,jd); if(oDate<new Date(gy,gm-1,gd)) return false; } catch{}
    }
    if (dateTo) {
      try { const [jy,jm,jd]=dateTo.split('-').map(Number); const [gy,gm,gd]=j2g(jy,jm,jd); const e=new Date(gy,gm-1,gd); e.setDate(e.getDate()+1); if(oDate>=e) return false; } catch{}
    }
    if (cityFilter!=="all" && cust?.city!==cityFilter) return false;
    if (statusFilter!=="all" && o.order_status!==statusFilter) return false;
    if (productFilter!=="all") {
      const items = itemsByOrder[o.id]||[];
      if (!items.some(it=>String(it.product_id)===productFilter)) return false;
    }
    return true;
  });

  const totalRevenue = filtered.reduce((s,o)=>s+(o.total_amount||0),0);
  const avgOrder     = filtered.length ? Math.round(totalRevenue/filtered.length) : 0;
  const uniqueCusts  = new Set(filtered.map(o=>o.customer_id)).size;

  const exportCSV = () => {
    const rows = [
      ["شماره","مشتری","شهر","تلفن","محصولات","مبلغ کل","وضعیت","تاریخ"],
      ...filtered.map(o => {
        const c = custMap[o.customer_id];
        const its = (itemsByOrder[o.id]||[]).map(it=>`${it.product_name||'—'} x${it.qty}`).join(' | ');
        return [
          o.id, c?.name||'—', c?.city||'—', c?.phone||'—',
          its||'—', o.total_amount||0,
          ORDER_STATUS[o.order_status]?.label||o.order_status||'—',
          new Date(o.created_at).toLocaleDateString("fa-IR")
        ];
      })
    ];
    const bom = '\uFEFF';
    const csv = bom + rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='گزارش-سفارشات.csv'; a.click();
    URL.revokeObjectURL(url);
    showToast("فایل CSV دانلود شد");
  };

  const clearFilters = () => { setDateFrom(""); setDateTo(""); setCityFilter("all"); setProductFilter("all"); setStatusFilter("all"); };

  if (loading) return <Spinner />;

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>گزارشات</h2>
          <p style={{ fontSize:12, color:C.textDim }}>{fa(filtered.length)} سفارش فیلترشده از {fa(orders.length)} کل</p>
        </div>
        <Btn label="خروجی CSV" icon="download" onClick={exportCSV} />
      </div>

      {/* ─── فیلترها ─── */}
      <div style={{ ...cardStyle, padding:16, marginBottom:16 }}>
        <p style={{ fontSize:12, fontWeight:700, color:C.textMuted, marginBottom:12 }}>🔍 فیلترها</p>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, alignItems:"end" }}>
          <div>
            <label style={{ fontSize:11, color:C.textDim, display:"block", marginBottom:4 }}>از تاریخ</label>
            <JalaliPicker value={dateFrom} onChange={setDateFrom} placeholder="از تاریخ" />
          </div>
          <div>
            <label style={{ fontSize:11, color:C.textDim, display:"block", marginBottom:4 }}>تا تاریخ</label>
            <JalaliPicker value={dateTo} onChange={setDateTo} placeholder="تا تاریخ" />
          </div>
          <div>
            <label style={{ fontSize:11, color:C.textDim, display:"block", marginBottom:4 }}>شهر</label>
            <select style={iStyle} value={cityFilter} onChange={e=>setCityFilter(e.target.value)}>
              <option value="all">همه شهرها</option>
              {cities.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize:11, color:C.textDim, display:"block", marginBottom:4 }}>محصول</label>
            <select style={iStyle} value={productFilter} onChange={e=>setProductFilter(e.target.value)}>
              <option value="all">همه محصولات</option>
              {(products||[]).map(p=><option key={p.id} value={String(p.id)}>{p.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize:11, color:C.textDim, display:"block", marginBottom:4 }}>وضعیت</label>
            <select style={iStyle} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
              <option value="all">همه وضعیت‌ها</option>
              {Object.entries(ORDER_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div>
            <Btn label="پاک کردن" outline small onClick={clearFilters} />
          </div>
        </div>
      </div>

      {/* ─── کارت‌های خلاصه ─── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:12, marginBottom:16 }}>
        <KPICard label="تعداد سفارشات"  value={fa(filtered.length)}   icon="cart"     color={C.primary}  />
        <KPICard label="مجموع فروش"     value={shortCur(totalRevenue)} icon="wallet"   color={C.success}  />
        <KPICard label="میانگین سفارش"  value={shortCur(avgOrder)}     icon="trend"    color={C.info}     />
        <KPICard label="مشتریان یکتا"   value={fa(uniqueCusts)}        icon="building" color={C.purple}   />
      </div>

      {/* ─── جدول ─── */}
      <div style={{ ...cardStyle, overflow:"auto" }}>
        <div style={{ minWidth:800 }}>
          <div style={{ display:"grid", gridTemplateColumns:"60px 1fr 90px 100px 1fr 120px 130px 100px", borderBottom:`1px solid ${C.border}` }}>
            {["#","مشتری","شهر","تلفن","محصولات","مبلغ","وضعیت","تاریخ"].map((h,i)=>(
              <div key={i} style={{ padding:"10px 12px", fontSize:11, color:C.textDim, fontWeight:700 }}>{h}</div>
            ))}
          </div>
          {filtered.length===0 ? <Empty text="داده‌ای با این فیلترها یافت نشد" icon="📊" /> : filtered.map((o,idx)=>{
            const cust = custMap[o.customer_id];
            const items = (itemsByOrder[o.id]||[]);
            const dateStr = new Date(o.created_at).toLocaleDateString("fa-IR");
            return (
              <div key={o.id} style={{ display:"grid", gridTemplateColumns:"60px 1fr 90px 100px 1fr 120px 130px 100px", borderBottom:`1px solid ${C.border}`, background:idx%2===0?"transparent":C.surfaceAlt }}>
                <div style={{ padding:"10px 12px", fontSize:12, color:C.text }}>{fa(o.id)}</div>
                <div style={{ padding:"10px 12px", fontSize:13, fontWeight:600, color:C.text }}>{cust?.name||'—'}</div>
                <div style={{ padding:"10px 12px", fontSize:12, color:C.textMuted }}>{cust?.city||'—'}</div>
                <div style={{ padding:"10px 12px", fontSize:12, color:C.textMuted, direction:"ltr", textAlign:"right" }}>{cust?.phone||'—'}</div>
                <div style={{ padding:"10px 12px", fontSize:11, color:C.textMuted, lineHeight:1.6 }}>
                  {items.length>0 ? items.map((it,ii)=>(
                    <span key={ii} style={{ display:"inline-block", background:C.surfaceAlt, borderRadius:4, padding:"1px 6px", marginLeft:4, marginBottom:2, fontSize:10, color:C.text }}>
                      {it.product_name||'—'} ×{fa(it.qty)}
                    </span>
                  )) : <span style={{ color:C.textDim }}>—</span>}
                </div>
                <div style={{ padding:"10px 12px", fontSize:13, color:C.primary, fontWeight:600 }}>{shortCur(o.total_amount)}</div>
                <div style={{ padding:"10px 12px" }}><Tag status={o.order_status} /></div>
                <div style={{ padding:"10px 12px", fontSize:11, color:C.textMuted }}>{dateStr}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════ GUARANTEE MODULE ═══════════════════════════ */
const CLAIM_STATUS = {
  pending:  { label:"در انتظار بررسی", color:"#F59E0B" },
  approved: { label:"تأیید شده",       color:"#10B981" },
  rejected: { label:"رد شده",          color:"#EF4444" },
  refunded: { label:"مبلغ بازگشت داده شد", color:"#8B5CF6" },
};

const CLAIM_REASONS = [
  { key:"quality",  label:"کیفیت نامناسب" },
  { key:"wrong",    label:"محصول اشتباه ارسال شد" },
  { key:"damaged",  label:"آسیب‌دیدگی در حمل" },
  { key:"expire",   label:"تاریخ انقضا" },
  { key:"other",    label:"سایر" },
];

function GuaranteeModule({ me, showToast }) {
  const [claims,       setClaims]       = useState([]);
  const [warrantyReqs, setWarrantyReqs] = useState([]);
  const [tab,          setTab]          = useState("public");
  const [customers,    setCustomers]    = useState([]);
  const [orders,       setOrders]       = useState([]);
  const [products,     setProducts]     = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [form,         setForm]         = useState(null);
  const [saving,       setSaving]       = useState(false);
  const [stFilter,     setStFilter]     = useState("all");
  const [search,       setSearch]       = useState("");
  const [wSearch,      setWSearch]      = useState("");
  const [wStatus,      setWStatus]      = useState("all");
  const [wDetail,      setWDetail]      = useState(null);
  const [clDetail,     setClDetail]     = useState(null);
  const [wNote,        setWNote]        = useState("");
  const [wTrack,       setWTrack]       = useState("");
  const [aNote,        setANote]        = useState("");
  const [wSaving,      setWSaving]      = useState(false);
  const [clSaving,     setClSaving]     = useState(false);
  const [wErr,         setWErr]         = useState("");
  const [clErr,        setClErr]        = useState("");
  const [loadErr,      setLoadErr]      = useState("");
  const [refreshing,   setRefreshing]   = useState(false);
  useEffect(function(){
    if (wDetail)  { setWNote(wDetail.admin_note||"");  setWTrack(wDetail.tracking_code||""); }
  }, [wDetail]);
  useEffect(function(){
    if (clDetail) { setANote(clDetail.admin_note||""); }
  }, [clDetail]);

  var load = async function() {
    setLoading(true);
    setLoadErr("");
    try {
      var res = await Promise.all([
        api("GET","crm_guarantee_claims?order=created_at.desc").catch(function(){return [];}),
        api("GET","crm_customers?select=id,name,phone,city"),
        api("GET","crm_orders?select=id,customer_id,created_at,order_status&order=created_at.desc"),
        api("GET","products?select=id,name,has_guarantee,guarantee_days&order=name.asc"),
        api("GET","warranty_returns?order=created_at.desc")
          .then(function(r){ return Array.isArray(r) ? r : []; })
          .catch(function(){return [];}),
      ]);
      setClaims(res[0]||[]);
      setCustomers(res[1]||[]);
      setOrders(res[2]||[]);
      setProducts(res[3]||[]);
      setWarrantyReqs(res[4]||[]);
    } catch(e) {
      setLoadErr("خطا در بارگذاری اطلاعات: "+(e.message||""));
      showToast("خطا در بارگذاری","error");
    }
    finally { setLoading(false); setRefreshing(false); }
  };

  useEffect(function(){ load(); }, []);

  var custMap = {};
  customers.forEach(function(c){ custMap[c.id]=c; });
  var prodMap = {};
  products.forEach(function(p){ prodMap[p.id]=p; });

  var saveClaim = async function() {
    if (!form.customer_id) { showToast("مشتری را انتخاب کنید","error"); return; }
    if (!form.product_id)  { showToast("محصول را انتخاب کنید","error"); return; }
    if (!form.reason)      { showToast("علت مرجوعی را وارد کنید","error"); return; }
    setSaving(true);
    try {
      var payload = {
        customer_id: Number(form.customer_id),
        order_id:    form.order_id ? Number(form.order_id) : null,
        product_id:  Number(form.product_id),
        reason:      form.reason,
        description: form.notes||null,
        status:      "pending",
      };
      await api("POST","crm_guarantee_claims", payload);
      showToast("درخواست مرجوعی ثبت شد");
      setForm(null); load();
    } catch(e) { showToast("خطا در ثبت","error"); }
    finally { setSaving(false); }
  };

  var updateClaim = async function(id, updates, setBusy) {
    if (setBusy) setBusy(true);
    try {
      await api("PATCH","crm_guarantee_claims?id=eq."+id, updates);
      var label = (updates.status ? CLAIM_STATUS[updates.status]?.label : null) || "بروزرسانی";
      showToast(label+" شد");
      await load();
    } catch(e) { showToast("خطا: "+(e.message||""),"error"); }
    finally { if (setBusy) setBusy(false); }
  };

  var exportCSV = function() {
    var header = ["شماره","مشتری","شهر","محصول","علت","مبلغ بازگشت","وضعیت","تاریخ ثبت"];
    var dataRows = filtered.map(function(cl) {
      var c = custMap[cl.customer_id]; var p = prodMap[cl.product_id];
      return [
        cl.id, c?c.name:"", c?c.city||"":"", p?p.name:"",
        CLAIM_REASONS.find(function(r){return r.key===cl.reason;})||{label:cl.reason||""},
        cl.refund_amount||0,
        CLAIM_STATUS[cl.status]?CLAIM_STATUS[cl.status].label:(cl.status||""),
        cl.created_at?new Date(cl.created_at).toLocaleDateString("fa-IR"):""
      ].map(function(v){return typeof v==="object"?v.label:v;});
    });
    var csv = "\uFEFF" + [header].concat(dataRows).map(function(r){
      return r.map(function(v){ return '"'+String(v).split('"').join('""')+'"'; }).join(",");
    }).join("\n");
    var blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href=url; a.download="گارانتی-مرجوعی.csv"; a.click();
    URL.revokeObjectURL(url);
    showToast("فایل CSV دانلود شد");
  };

  /* بررسی در مدت گارانتی */
  var inWarranty = function(cl) {
    var p = prodMap[cl.product_id];
    if (!p || !p.has_guarantee || !cl.delivery_date) return null;
    var days = p.guarantee_days || 30;
    var elapsed = (Date.now() - new Date(cl.delivery_date)) / 86400000;
    return elapsed <= days;
  };

  var filtered = claims.filter(function(cl) {
    if (stFilter!=="all" && cl.status!==stFilter) return false;
    if (search) {
      var c=custMap[cl.customer_id]; var p=prodMap[cl.product_id];
      if (!(c&&c.name&&c.name.includes(search)) && !(p&&p.name&&p.name.includes(search))) return false;
    }
    return true;
  });

  var custOrders = form ? orders.filter(function(o){ return String(o.customer_id)===String(form.customer_id); }) : [];

  var wFiltered = (warrantyReqs||[]).filter(function(r) {
    if (wStatus !== "all" && r.status !== wStatus) return false;
    if (wSearch) {
      var s = wSearch.toLowerCase();
      return (r.customer_name||"").includes(s) || (r.customer_phone||"").includes(s) || (r.product_code||"").includes(s) || (r.customer_address||"").includes(s);
    }
    return true;
  });

  var updateWarrantyStatus = async function(id, status, extra, setBusy) {
    if (setBusy) setBusy(true);
    try {
      await api("PATCH","warranty_returns?id=eq."+id, Object.assign({ status:status }, extra||{}));
      showToast("وضعیت به «"+(WARRANTY_STATUS_MAP[status]||{}).label||status+"» تغییر کرد");
      await load();
    } catch(e) { showToast("خطا در بروزرسانی وضعیت: "+(e.message||""),"error"); }
    finally { if (setBusy) setBusy(false); }
  };

  var WARRANTY_STATUS_MAP = {
    pending:  { label:"در انتظار", color:"#F59E0B" },
    reviewing:{ label:"در بررسی", color:"#3B82F6" },
    approved: { label:"تأیید", color:"#10B981" },
    rejected: { label:"رد شده", color:"#EF4444" },
    done:     { label:"انجام شد", color:"#8B5CF6" },
  };

  if (loading) return (
    <div style={{ animation:"fadeUp 0.3s ease", textAlign:"center", padding:40 }}>
      <Spinner />
      <p style={{ marginTop:12, fontSize:13, color:C.textMuted }}>در حال بارگذاری...</p>
    </div>
  );

  if (loadErr) return (
    <div style={{ animation:"fadeUp 0.3s ease", textAlign:"center", padding:40 }}>
      <div style={{ background:C.dangerDim, border:"1px solid "+C.danger, borderRadius:12, padding:24, maxWidth:400, margin:"0 auto" }}>
        <p style={{ fontSize:14, color:C.danger, marginBottom:8, fontWeight:600 }}>⚠️ خطا در بارگذاری</p>
        <p style={{ fontSize:12, color:C.textMuted, marginBottom:16 }}>{loadErr}</p>
        <Btn label="تلاش مجدد" icon="refresh" onClick={load} />
      </div>
    </div>
  );

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* هدر */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>مرجوعی و گارانتی</h2>
          <p style={{ fontSize:12, color:C.textDim }}>مدیریت درخواست‌های بازگشت وجه</p>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {loadErr && <Btn label="تلاش مجدد" icon="refresh" small danger onClick={load} />}
          <Btn label={refreshing?"...":"بروزرسانی"} icon="refresh" small outline onClick={function(){setRefreshing(true); load();}} disabled={refreshing||loading} />
          <Btn label="خروجی CSV" icon="download" small outline onClick={exportCSV} />
          {tab==="internal" && <Btn label="درخواست جدید" icon="plus" onClick={function(){setForm({customer_id:"",order_id:"",product_id:"",reason:"",claim_date:"",delivery_date:"",refund_amount:0,notes:""});}} />}
        </div>
      </div>

      {/* تب‌ها */}
      <div style={{ display:"flex", gap:4, marginBottom:16, background:C.surfaceAlt, borderRadius:10, padding:4 }}>
        <button onClick={function(){setTab("public");}} style={{ flex:1, padding:"8px 12px", borderRadius:7, border:"none", background:tab==="public"?C.surface:"transparent", color:tab==="public"?C.text:C.textDim, fontFamily:FF, fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.2s" }}>
          {"🌐 گارانتی عمومی ("+fa(warrantyReqs.length)+")"}
        </button>
        <button onClick={function(){setTab("internal");}} style={{ flex:1, padding:"8px 12px", borderRadius:7, border:"none", background:tab==="internal"?C.surface:"transparent", color:tab==="internal"?C.text:C.textDim, fontFamily:FF, fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.2s" }}>
          {"🏢 مرجوعی داخلی ("+fa(claims.length)+")"}
        </button>
      </div>

      {/* ───── تب گارانتی عمومی ───── */}
      {tab==="public" && (
        <div>
          <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"center", flexWrap:"wrap" }}>
            <input style={{ ...iStyle, flex:1, minWidth:180 }} value={wSearch} onChange={function(e){setWSearch(e.target.value);}} placeholder="جستجو نام، موبایل یا آدرس..." />
            <select style={{ ...iStyle, width:"auto" }} value={wStatus} onChange={function(e){setWStatus(e.target.value);}}>
              <option value="all">همه وضعیت‌ها</option>
              <option value="pending">در انتظار بررسی</option>
              <option value="reviewing">در حال بررسی</option>
              <option value="approved">تأیید شده</option>
              <option value="rejected">رد شده</option>
              <option value="done">انجام شد</option>
            </select>
            <span style={{ fontSize:11, color:C.textDim, whiteSpace:"nowrap" }}>{fa(wFiltered.length)} درخواست</span>
          </div>
          {wFiltered.length===0 ? <Empty text="درخواست گارانتی‌ای ثبت نشده" icon="🛡️" /> : (
            <div style={{ display:"grid", gap:10 }}>
              {wFiltered.map(function(r) {
                var st = {pending:{label:"در انتظار",color:"#F59E0B"},reviewing:{label:"در بررسی",color:"#3B82F6"},approved:{label:"تأیید",color:"#10B981"},rejected:{label:"رد شده",color:"#EF4444"},done:{label:"انجام شد",color:"#8B5CF6"}}[r.status]||{label:r.status,color:C.textDim};
                var productLabel = r.product_name || r.product_code || "—";
                var phoneLabel = r.customer_phone || "—";
                var addressLabel = r.customer_address || "—";
                var postalLabel = r.postal_code || "—";
                var reasonLabel = r.reason || "—";
                var dateLabel = r.created_at ? new Date(r.created_at).toLocaleDateString("fa-IR") : "—";
                return (
                  <div key={r.id} onClick={function(){setWDetail(r);}} style={{ background:C.surface, borderRadius:12, border:"1px solid "+C.border, borderRight:"3px solid "+st.color, padding:16, cursor:"pointer", transition:"box-shadow 0.15s" }}
                    onMouseEnter={function(e){e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)";}}
                    onMouseLeave={function(e){e.currentTarget.style.boxShadow="none";}}>
                    {/* سطر اول: شماره + نام + وضعیت + تاریخ */}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, gap:8 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                        <span style={{ fontSize:12, color:C.textDim }}>{"#"+fa(r.id)}</span>
                        <span style={{ fontSize:14, fontWeight:700, color:C.text }}>{r.customer_name || "—"}</span>
                        <span style={{ fontSize:11, padding:"2px 8px", borderRadius:5, background:st.color+"20", color:st.color, fontWeight:600 }}>{st.label}</span>
                      </div>
                      <span style={{ fontSize:11, color:C.textDim, whiteSpace:"nowrap" }}>{"🗓️ "+dateLabel}</span>
                    </div>
                    {/* سطر دوم: موبایل + محصول + آدرس */}
                    <div style={{ display:"flex", gap:16, fontSize:12, color:C.textDim, marginBottom:6, flexWrap:"wrap" }}>
                      <span>{"📱 "+phoneLabel}</span>
                      <span>{"📦 "+productLabel}</span>
                      {r.customer_address ? <span>{"📍 "+addressLabel}</span> : null}
                    </div>
                    {/* سطر سوم: کد پستی (اگر موجود باشد) */}
                    {r.postal_code ? <div style={{ fontSize:12, color:C.textDim, marginBottom:6 }}>{"📮 کد پستی: "+postalLabel}</div> : null}
                    {/* علت */}
                    <div style={{ fontSize:13, color:C.text, background:C.surfaceAlt, borderRadius:8, padding:"8px 12px", marginBottom:8 }}>
                      <span style={{ fontWeight:600, color:C.textDim, fontSize:11 }}>علت: </span>{reasonLabel}
                    </div>
                    {r.admin_note && <p style={{ fontSize:12, color:C.primary, marginBottom:8 }}>یادداشت: {r.admin_note}</p>}
                    {r.tracking_code && <p style={{ fontSize:12, color:C.textDim, marginBottom:8 }}>کد رهگیری: {r.tracking_code}</p>}
                    {/* دکمه‌های وضعیت */}
                    {r.status==="pending" && (
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn label="تأیید" small disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"approved",{},setWSaving);}} />
                        <Btn label="در بررسی" small outline disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"reviewing",{},setWSaving);}} />
                        <Btn label="رد کردن" small danger disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"rejected",{},setWSaving);}} />
                      </div>
                    )}
                    {r.status==="reviewing" && (
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn label="تأیید نهایی" small disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"approved",{},setWSaving);}} />
                        <Btn label="رد کردن" small danger disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"rejected",{},setWSaving);}} />
                      </div>
                    )}
                    {r.status==="approved" && (
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn label="انجام شد" small icon="check" disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"done",{},setWSaving);}} />
                        <Btn label="رد کردن" small danger disabled={wSaving} onClick={function(e){e.stopPropagation(); updateWarrantyStatus(r.id,"rejected",{},setWSaving);}} />
                      </div>
                    )}
                    {r.status==="done" && (
                      <span style={{ fontSize:12, color:C.textDim }}>این درخواست انجام شده است</span>
                    )}
                    {r.status==="rejected" && (
                      <span style={{ fontSize:12, color:"#EF4444" }}>این درخواست رد شده است</span>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ───── تب مرجوعی داخلی ───── */}
      {tab==="internal" && (<div>

      {/* کارت‌های خلاصه */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:10, marginBottom:16 }}>
        {Object.entries(CLAIM_STATUS).map(function(entry) {
          var k=entry[0]; var v=entry[1];
          var cnt = claims.filter(function(c){return c.status===k;}).length;
          return (
            <div key={k} onClick={function(){setStFilter(k===stFilter?"all":k);}} style={{ background:stFilter===k?v.color+"22":C.surface, border:"1px solid "+(stFilter===k?v.color:C.border), borderRadius:10, padding:"10px 14px", cursor:"pointer", transition:"all 0.2s" }}>
              <p style={{ fontSize:10, color:stFilter===k?v.color:C.textDim, marginBottom:4 }}>{v.label}</p>
              <p style={{ fontSize:20, fontWeight:700, color:stFilter===k?v.color:C.text }}>{fa(cnt)}</p>
            </div>
          );
        })}
      </div>

      {/* فیلتر */}
      <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"center" }}>
        <div style={{ position:"relative", flex:1 }}>
          <Ic name="search" size={14} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
          <input style={{ ...iStyle, paddingRight:32 }} value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="جستجو نام مشتری یا محصول..." />
        </div>
        <select style={{ ...iStyle, width:"auto" }} value={stFilter} onChange={function(e){setStFilter(e.target.value);}}>
          <option value="all">همه وضعیت‌ها</option>
          {Object.entries(CLAIM_STATUS).map(function(en){ return <option key={en[0]} value={en[0]}>{en[1].label}</option>; })}
        </select>
        <span style={{ fontSize:11, color:C.textDim, whiteSpace:"nowrap" }}>{fa(filtered.length)} درخواست</span>
      </div>

      {/* لیست */}
      {filtered.length===0 ? <Empty text="درخواستی ثبت نشده" icon="🛡️" /> : (
        <div style={{ display:"grid", gap:10 }}>
          {filtered.map(function(cl) {
            var c=custMap[cl.customer_id]; var p=prodMap[cl.product_id];
            var st=CLAIM_STATUS[cl.status]||{label:cl.status,color:C.textMuted};
            var wr=inWarranty(cl);
            return (
              <div key={cl.id} onClick={function(){setClDetail(cl);}} style={{ background:C.surface, borderRadius:12, border:"1px solid "+C.border, borderRight:"3px solid "+st.color, padding:16, cursor:"pointer", transition:"box-shadow 0.15s" }}
                onMouseEnter={function(e){e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)";}}
                onMouseLeave={function(e){e.currentTarget.style.boxShadow="none";}}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span style={{ fontSize:12, color:C.textMuted }}>#{fa(cl.id)}</span>
                    <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{c?c.name:"—"}</span>
                    <span style={{ fontSize:11, padding:"2px 7px", borderRadius:4, background:C.surfaceAlt, color:C.textMuted }}>{p?p.name:"—"}</span>
                    <span style={{ fontSize:11, padding:"2px 7px", borderRadius:4, background:st.color+"20", color:st.color, fontWeight:600 }}>{st.label}</span>
                    {wr===true  && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:C.successDim, color:C.success, fontWeight:600 }}>✓ در مدت گارانتی</span>}
                    {wr===false && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:C.dangerDim, color:C.danger, fontWeight:600 }}>✕ خارج از گارانتی</span>}
                  </div>
                  <span style={{ fontSize:11, color:C.textDim }}>{cl.created_at?new Date(cl.created_at).toLocaleDateString("fa-IR"):""}</span>
                </div>
                <div style={{ display:"flex", gap:16, fontSize:12, color:C.textMuted, marginBottom:cl.description||cl.notes?8:0 }}>
                  {cl.reason && <span>علت: <b style={{color:C.text}}>{(CLAIM_REASONS.find(function(r){return r.key===cl.reason;})||{label:cl.reason}).label}</b></span>}
                  {c && c.city && <span>📍 {c.city}</span>}
                </div>
                {(cl.description||cl.notes) && <p style={{ fontSize:12, color:C.textDim, marginBottom:6 }}>{cl.description||cl.notes}</p>}
                {cl.admin_note && <p style={{ fontSize:11, color:C.primary, marginBottom:6 }}>یادداشت ادمین: {cl.admin_note}</p>}
                {cl.status==="pending" && me?.role!=="viewer" && (
                  <div style={{ display:"flex", gap:8, marginTop:10 }}>
                    <Btn label="تأیید"    small disabled={clSaving} onClick={function(e){e.stopPropagation(); updateClaim(cl.id,{status:"approved"},setClSaving);}} />
                    <Btn label="رد کردن"  small danger disabled={clSaving} onClick={function(e){e.stopPropagation(); updateClaim(cl.id,{status:"rejected"},setClSaving);}} />
                  </div>
                )}
                {cl.status==="approved" && me?.role!=="viewer" && (
                  <div style={{ marginTop:10 }}>
                    <Btn label="ثبت بازگشت وجه" small icon="check" disabled={clSaving} onClick={function(e){e.stopPropagation(); updateClaim(cl.id,{status:"refunded"},setClSaving);}} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      </div>)}

      {/* مودال ثبت درخواست */}
      {form && (
        <Modal title="ثبت درخواست مرجوعی" onClose={function(){setForm(null);}} maxWidth={520}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Fld label="مشتری *">
              <select style={{ ...iStyle, cursor:"pointer" }} value={form.customer_id} onChange={function(e){setForm(function(f){return Object.assign({},f,{customer_id:e.target.value,order_id:""});});}}>
                <option value="">انتخاب کنید...</option>
                {customers.map(function(c){ return <option key={c.id} value={c.id}>{c.name}</option>; })}
              </select>
            </Fld>
            <Fld label="سفارش مرتبط (اختیاری)">
              <select style={{ ...iStyle, cursor:"pointer" }} value={form.order_id} onChange={function(e){setForm(function(f){return Object.assign({},f,{order_id:e.target.value});});}}>
                <option value="">بدون سفارش</option>
                {custOrders.map(function(o){ return <option key={o.id} value={o.id}>سفارش #{o.id} — {new Date(o.created_at).toLocaleDateString("fa-IR")}</option>; })}
              </select>
            </Fld>
          </div>
          <Fld label="محصول *">
            <select style={{ ...iStyle, cursor:"pointer" }} value={form.product_id} onChange={function(e){setForm(function(f){return Object.assign({},f,{product_id:e.target.value});});}}>
              <option value="">انتخاب محصول...</option>
              {products.map(function(p){ return (
                <option key={p.id} value={p.id}>{p.name}{p.has_guarantee?" 🛡️ ("+fa(p.guarantee_days||30)+" روز گارانتی)":""}</option>
              ); })}
            </select>
          </Fld>
          <Fld label="علت مرجوعی *">
            <select style={{ ...iStyle, cursor:"pointer" }} value={form.reason} onChange={function(e){setForm(function(f){return Object.assign({},f,{reason:e.target.value});});}}>
              <option value="">انتخاب کنید...</option>
              {CLAIM_REASONS.map(function(r){ return <option key={r.key} value={r.key}>{r.label}</option>; })}
            </select>
          </Fld>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Fld label="تاریخ تحویل محصول">
              <JalaliPicker value={form.delivery_date||""} onChange={function(v){setForm(function(f){return Object.assign({},f,{delivery_date:v});});}} placeholder="تاریخ تحویل" />
            </Fld>
            <Fld label="مبلغ بازگشت (ریال)">
              <input style={iStyle} type="number" value={form.refund_amount||0} onChange={function(e){setForm(function(f){return Object.assign({},f,{refund_amount:+e.target.value});});}} />
            </Fld>
          </div>
          <Fld label="توضیحات">
            <textarea style={{ ...iStyle, resize:"none" }} rows={2} value={form.notes||""} onChange={function(e){setForm(function(f){return Object.assign({},f,{notes:e.target.value});});}} placeholder="شرح مشکل..." />
          </Fld>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn label="انصراف" onClick={function(){setForm(null);}} outline />
            <Btn label={saving?"در حال ثبت...":"ثبت درخواست"} icon="check" onClick={saveClaim} disabled={saving} />
          </div>
        </Modal>
      )}

      {/* ── مودال جزئیات گارانتی عمومی ── */}
      {wDetail && (function(){
        var r=wDetail;
        var st=WARRANTY_STATUS_MAP[r.status]||{label:r.status,color:C.textDim};
        var hasChanges = wNote!==(r.admin_note||"") || wTrack!==(r.tracking_code||"");
        var wDetailClose = function() {
          if (wSaving) return;
          if (hasChanges && !confirm("تغییرات ذخیره نشده‌اند. خارج می‌شوید؟")) return;
          setWDetail(null);
        };
        return (
          <Modal title={"جزئیات درخواست گارانتی #"+fa(r.id)} onClose={wDetailClose} maxWidth={480}>
            <div style={{ display:"grid", gap:12 }}>
              {/* وضعیت و اطلاعات */}
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <span style={{ fontSize:11, padding:"3px 10px", borderRadius:5, background:st.color+"20", color:st.color, fontWeight:700 }}>{st.label}</span>
                {r.tracking_code && <span style={{ fontSize:11, padding:"3px 10px", borderRadius:5, background:C.surfaceAlt, color:C.textDim }}>📮 {r.tracking_code}</span>}
              </div>
              <div style={{ fontSize:13, color:C.textMuted }}>
                <span>نام: <b style={{color:C.text}}>{r.customer_name||"—"}</b></span>
                <span style={{ margin:"0 10px" }}>•</span>
                <span>موبایل: <b style={{color:C.text}}>{r.customer_phone||"—"}</b></span>
              </div>
              <div style={{ fontSize:13, color:C.textMuted }}>
                محصول: <b style={{color:C.text}}>{r.product_name||r.product_code||"—"}</b>
              </div>
              {r.customer_address && <div style={{ fontSize:13, color:C.textMuted }}>آدرس: <b style={{color:C.text}}>{r.customer_address}</b></div>}
              {r.postal_code && <div style={{ fontSize:13, color:C.textMuted }}>کد پستی: <b style={{color:C.text}}>{r.postal_code}</b></div>}
              <div style={{ background:C.surfaceAlt, borderRadius:8, padding:12, fontSize:13 }}>
                <span style={{fontWeight:600,color:C.textDim,fontSize:11}}>علت: </span>{r.reason||"—"}
              </div>
              <Fld label={hasChanges?"📝 یادداشت ادمین (تغییر کرده)":"یادداشت ادمین"}>
                <textarea style={{...iStyle,resize:"none"}} rows={3} value={wNote} onChange={function(e){setWNote(e.target.value);}} placeholder="یادداشت داخلی..." />
              </Fld>
              <Fld label="کد رهگیری پستی">

/* ═══════════════════════════════════════ SUPPORT TICKETS ═══════════════════════════════ */
function SupportTicketsModule({ me, showToast }) {
  const [tickets,    setTickets]    = useState([]);
  const [customers,  setCustomers]  = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [loadErr,    setLoadErr]    = useState("");
  const [refreshing, setRefreshing] = useState(false);
  const [detail,     setDetail]     = useState(null);    // open ticket detail modal
  const [stFilter,   setStFilter]   = useState("all");
  const [search,     setSearch]     = useState("");

  // detail modal editing
  const [dStatus,    setDStatus]    = useState("");
  const [dNotes,     setDNotes]     = useState("");
  const [dSaving,    setDSaving]    = useState(false);
  const [dErr,       setDErr]       = useState("");

  const load = async function() {
    setLoading(true);
    setLoadErr("");
    try {
      var [tix, custs] = await Promise.all([
        api("GET","support-tickets?order=created_at.desc").catch(function(){ return []; }),
        api("GET","crm_customers?select=id,name,phone,city").catch(function(){ return []; }),
      ]);
      setTickets(Array.isArray(tix) ? tix : []);
      setCustomers(Array.isArray(custs) ? custs : []);
    } catch(e) {
      setLoadErr("خطا در بارگذاری: "+(e.message||""));
      showToast("خطا در بارگذاری تیکت‌ها","error");
    }
    finally { setLoading(false); setRefreshing(false); }
  };

  useEffect(function(){ load(); }, []);

  var custMap = {};
  customers.forEach(function(c){ custMap[c.id]=c; });

  /* sync detail editing state when ticket opens */
  useEffect(function(){
    if (detail) { setDStatus(detail.status||""); setDNotes(detail.admin_notes||""); setDErr(""); }
  }, [detail]);

  var filtered = tickets.filter(function(t) {
    if (stFilter!=="all" && t.status!==stFilter) return false;
    if (search) {
      var s=search.toLowerCase();
      var c=custMap[t.customer_id];
      if (!String(t.id).includes(s) && !(c&&c.name&&c.name.includes(s)) && !t.subject.toLowerCase().includes(s)) return false;
    }
    return true;
  });

  var STATUS_MAP = {
    open:        { label:"باز",         color:"#3B82F6" },
    in_progress: { label:"در حال بررسی", color:"#F59E0B" },
    resolved:    { label:"حل شده",      color:"#10B981" },
    closed:      { label:"بسته شده",    color:"#6B7280" },
  };

  var CATEGORY_LABELS = {
    order_tracking: 'پیگیری سفارش',
    order_question: 'سوال ثبت سفارش',
    warranty: 'گارانتی/مرجوعی',
    payment: 'مشکل پرداخت',
    other: 'سایر',
  };

  /* ── Save detail modal changes ── */
  var saveDetail = async function() {
    if (dSaving) return;
    var t=detail; if (!t) return;
    var payload={};
    if (dStatus !== (t.status||"")) payload.status=dStatus;
    if (dNotes  !== (t.admin_notes||"")) payload.admin_notes=dNotes;
    if (Object.keys(payload).length===0) { showToast("هیچ تغییری اعمال نشده","error"); return; }

    setDSaving(true); setDErr("");
    try {
      var updated = await api("PATCH","support-tickets?id=eq."+t.id, payload);
      /* update local */
      setTickets(function(prev){ return prev.map(function(x){ return x.id===t.id ? Object.assign({},x,payload,{updated_at:new Date().toISOString()}) : x; }); });
      setDetail(function(d){ return d&&d.id===t.id ? Object.assign({},d,payload) : d; });
      showToast("✅ تیکت بروزرسانی شد");
      setDetail(null);
    } catch(e) {
      setDErr("خطا: "+(e.message||""));
      showToast("❌ خطا در بروزرسانی","error");
    }
    finally { setDSaving(false); }
  };

  if (loading) return (
    <div style={{ animation:"fadeUp 0.3s ease", textAlign:"center", padding:40 }}>
      <Spinner />
      <p style={{ marginTop:12, fontSize:13, color:C.textMuted }}>در حال بارگذاری تیکت‌ها...</p>
    </div>
  );

  if (loadErr) return (
    <div style={{ animation:"fadeUp 0.3s ease", textAlign:"center", padding:40 }}>
      <div style={{ background:C.dangerDim, border:"1px solid "+C.danger, borderRadius:12, padding:24, maxWidth:400, margin:"0 auto" }}>
        <p style={{ fontSize:14, color:C.danger, marginBottom:8, fontWeight:600 }}>⚠️ خطا در بارگذاری</p>
        <p style={{ fontSize:12, color:C.textMuted, marginBottom:16 }}>{loadErr}</p>
        <Btn label="تلاش مجدد" icon="refresh" onClick={load} />
      </div>
    </div>
  );

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:2 }}>تیکت‌های پشتیبانی</h2>
          <p style={{ fontSize:12, color:C.textDim }}>مدیریت درخواست‌های پشتیبانی مشتریان</p>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {loadErr && <Btn label="تلاش مجدد" icon="refresh" small danger onClick={load} />}
          <Btn label={refreshing?"...":"بروزرسانی"} icon="refresh" small outline onClick={function(){setRefreshing(true); load();}} disabled={refreshing||loading} />
          <span style={{ fontSize:11, color:C.textDim }}>{fa(filtered.length)} تیکت</span>
        </div>
      </div>

      {/* Summary cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))", gap:8, marginBottom:14 }}>
        {[['all','همه'],['open','باز'],['in_progress','در حال بررسی'],['resolved','حل شده'],['closed','بسته شده']].map(function(en){
          var k=en[0]; var l=en[1]; var st=STATUS_MAP[k];
          var cnt=k==='all'?tickets.length:tickets.filter(function(t){return t.status===k;}).length;
          return (
            <div key={k} onClick={function(){setStFilter(k);}} style={{ background:stFilter===k?(st?st.color+"22":C.primary+"22"):C.surface, border:"1px solid "+(stFilter===k?(st?st.color:C.primary):C.border), borderRadius:10, padding:"8px 12px", cursor:"pointer", transition:"all 0.2s" }}>
              <p style={{ fontSize:10, color:stFilter===k?(st?st.color:C.primary):C.textDim, marginBottom:2 }}>{l}</p>
              <p style={{ fontSize:18, fontWeight:700, color:stFilter===k?(st?st.color:C.primary):C.text }}>{fa(cnt)}</p>
            </div>
          );
        })}
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:180 }}>
          <Ic name="search" size={14} color={C.textDim} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)" }} />
          <input style={{ ...iStyle, paddingRight:32 }} value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="جستجو شناسه، مشتری یا موضوع..." />
        </div>
        <select style={{ ...iStyle, width:"auto" }} value={stFilter} onChange={function(e){setStFilter(e.target.value);}}>
          <option value="all">همه وضعیت‌ها</option>
          {Object.entries(STATUS_MAP).map(function(en){ return <option key={en[0]} value={en[0]}>{en[1].label}</option>; })}
        </select>
      </div>

      {/* Ticket list */}
      {filtered.length===0 ? <Empty text="تیکتی یافت نشد" icon="🎫" /> : (
        <div style={{ display:"grid", gap:10 }}>
          {filtered.map(function(t){
            var c=custMap[t.customer_id];
            var st=STATUS_MAP[t.status]||{label:t.status,color:C.textMuted};
            var catLabel=CATEGORY_LABELS[t.category]||t.category;
            return (
              <div key={t.id} onClick={function(){setDetail(t);}} style={{ background:C.surface, borderRadius:12, border:"1px solid "+C.border, borderRight:"3px solid "+st.color, padding:16, cursor:"pointer", transition:"box-shadow 0.15s" }}
                onMouseEnter={function(e){e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)";}}
                onMouseLeave={function(e){e.currentTarget.style.boxShadow="none";}}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8, gap:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span style={{ fontSize:12, color:C.textDim }}>{"#"+fa(t.id)}</span>
                    <span style={{ fontSize:14, fontWeight:700, color:C.text }}>{t.subject}</span>
                    <span style={{ fontSize:11, padding:"2px 8px", borderRadius:5, background:st.color+"20", color:st.color, fontWeight:600 }}>{st.label}</span>
                    <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:C.surfaceAlt, color:C.textMuted }}>{catLabel}</span>
                  </div>
                  <span style={{ fontSize:11, color:C.textDim, whiteSpace:"nowrap" }}>{t.created_at?new Date(t.created_at).toLocaleDateString("fa-IR"):""}</span>
                </div>
                <div style={{ display:"flex", gap:16, fontSize:12, color:C.textMuted, flexWrap:"wrap" }}>
                  <span>👤 {c?c.name:"کاربر #"+fa(t.customer_id)}</span>
                  {c?.phone && <span>📱 {c.phone}</span>}
                  {t.order_id && <span>🛒 سفارش #{fa(t.order_id)}</span>}
                </div>
                <div style={{ fontSize:12, color:C.textDim, marginTop:6, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.message}</div>
                {t.admin_notes && <p style={{ fontSize:11, color:C.primary, marginTop:4 }}>📌 {t.admin_notes}</p>}
              </div>
            );
          })}
        </div>
      )}

      {/* ── Ticket Detail Modal ── */}
      {detail && (function(){
        var t=detail;
        var c=custMap[t.customer_id];
        var st=STATUS_MAP[t.status]||{label:t.status,color:C.textMuted};
        var catLabel=CATEGORY_LABELS[t.category]||t.category;
        var hasChanges = dStatus!==(t.status||"") || dNotes!==(t.admin_notes||"");
        var closeModal = function() {
          if (dSaving) return;
          if (hasChanges && !confirm("تغییرات ذخیره نشده‌اند. خارج می‌شوید؟")) return;
          setDetail(null);
        };
        return (
          <Modal title={"تیکت #"+fa(t.id)} onClose={closeModal} maxWidth={520}>
            <div style={{ display:"grid", gap:12 }}>
              {/* Status + category badges */}
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <span style={{ fontSize:11, padding:"3px 10px", borderRadius:5, background:st.color+"20", color:st.color, fontWeight:700 }}>{st.label}</span>
                <span style={{ fontSize:11, padding:"3px 10px", borderRadius:5, background:C.surfaceAlt, color:C.textMuted }}>{catLabel}</span>
                {t.resolved_at && <span style={{ fontSize:11, padding:"3px 10px", borderRadius:5, background:C.successDim, color:C.success }}>✓ {new Date(t.resolved_at).toLocaleDateString("fa-IR")}</span>}
              </div>
              {/* Subject */}
              <h3 style={{ fontSize:15, fontWeight:600, color:C.text, margin:0 }}>{t.subject}</h3>
              {/* Customer + meta */}
              <div style={{ fontSize:13, color:C.textMuted }}>
                <span>مشتری: <b style={{color:C.text}}>{c?c.name:"کاربر #"+fa(t.customer_id)}</b></span>
                {c?.phone && <span style={{ margin:"0 10px" }}>•</span>}
                {c?.phone && <span>📱 {c.phone}</span>}
                {c?.city && <span style={{ margin:"0 10px" }}>•</span>}
                {c?.city && <span>📍 {c.city}</span>}
              </div>
              {t.order_id && <div style={{ fontSize:13, color:C.textMuted }}>سفارش مرتبط: <b style={{color:C.text}}>#{fa(t.order_id)}</b></div>}
              {/* Original message */}
              <div style={{ background:C.surfaceAlt, borderRadius:8, padding:12, fontSize:13, lineHeight:1.6 }}>
                <span style={{fontWeight:600,color:C.textDim,fontSize:11,display:"block",marginBottom:4}}>📝 متن درخواست:</span>
                {t.message}
              </div>
              {/* Admin editable fields */}
              <Fld label={hasChanges?"📝 وضعیت (تغییر کرده)":"وضعیت"}>
                <select style={{...iStyle,cursor:"pointer"}} value={dStatus} onChange={function(e){setDStatus(e.target.value);}}>
                  {Object.entries(STATUS_MAP).map(function(en){ return <option key={en[0]} value={en[0]}>{en[1].label}</option>; })}
                </select>
              </Fld>
              <Fld label={hasChanges?"📝 یادداشت ادمین (تغییر کرده)":"یادداشت ادمین"}>
                <textarea style={{...iStyle,resize:"none"}} rows={3} value={dNotes} onChange={function(e){setDNotes(e.target.value);}} placeholder="یادداشت داخلی..." />
              </Fld>
              {dErr && <p style={{ fontSize:12, color:C.danger, background:C.dangerDim, borderRadius:6, padding:"6px 10px" }}>{dErr}</p>}
              {/* Actions */}
              <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                <Btn label="انصراف" outline onClick={closeModal} disabled={dSaving} />
                <Btn label={dSaving?"در حال ذخیره...":"ذخیره"} icon={dSaving?null:"check"} disabled={dSaving||!hasChanges} onClick={saveDetail} />
              </div>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

/* ═══════════════════════════════════════ PORTAL REGISTRATION REQUESTS ════════════════ */
function PortalRegistrationRequests({ me, showToast }) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [approving, setApproving] = useState(null);
  const [rejecting, setRejecting] = useState(null);
  const [showForm, setShowForm] = useState(null); // request object being approved
  const [filterType, setFilterType] = useState("all");
  const [formUser, setFormUser] = useState("");
  const [formPass, setFormPass] = useState("");
  const isSA = me?.system_role === "super_admin" || me?.system_role === "admin";

  const load = async () => {
    setLoading(true);
    try {
      const data = await api("GET", "portal-registration-requests");
      setRequests(data || []);
    } catch(e) { showToast("خطا در بارگذاری درخواست‌ها", "error"); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const approve = async (req) => {
    if (!formUser.trim() || !formPass.trim()) {
      showToast("نام کاربری و رمز عبور را وارد کنید", "error"); return;
    }
    if (formPass.length < 4) {
      showToast("رمز عبور باید حداقل ۴ حرف باشد", "error"); return;
    }
    setApproving(req.id);
    try {
      const result = await api("POST", "portal-registration-requests", {
        id: req.id,
        portal_username: formUser.trim(),
        portal_password: formPass.trim(),
      });
      showToast(`✅ تأیید شد! نام کاربری: ${result.credentials.username} — رمز: ${result.credentials.password}`);
      setShowForm(null);
      setFormUser(""); setFormPass("");
      load();
    } catch (e) {
      showToast(e.message || "خطا در تأیید", "error");
    } finally { setApproving(null); }
  };

  const reject = async (id) => {
    if (!confirm("این درخواست رد شود؟")) return;
    setRejecting(id);
    try {
      await api("DELETE", "portal-registration-requests", { id });
      showToast("درخواست رد شد");
      load();
    } catch(e) {
      showToast("خطا در رد درخواست", "error");
    } finally { setRejecting(null); }
  };

  const openApprove = (req) => {
    setShowForm(req);
    setFormUser(req.portal_username || "");
    setFormPass("");
  };

  const Lbl = ({ children }) => <label style={{ display:"block", fontSize:11, marginBottom:5, color:C.textMuted, fontWeight:600 }}>{children}</label>;

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>درخواست‌های ثبت‌نام پورتال</h2>
          <p style={{ fontSize:12, color:C.textDim }}>مشتریانی که از پورتال عمده‌فروشی درخواست ثبت‌نام داده‌اند</p>
        </div>
        <Btn label="بروزرسانی" icon="refresh" small outline onClick={load} disabled={loading} />
      </div>

      {/* Approve Modal */}
      {showForm && (
        <Modal title="تأیید درخواست دسترسی پورتال" onClose={() => { setShowForm(null); setFormUser(""); setFormPass(""); }}>
          <p style={{ fontSize:13, color:C.textMuted, marginBottom:16 }}>
            تأیید دسترسی برای <strong style={{ color:C.text }}>{showForm.name}</strong>
            {showForm.phone && <span> — {fa(showForm.phone)}</span>}
          </p>
          <div style={{ marginBottom:12 }}>
            <Lbl>نام کاربری پورتال *</Lbl>
            <input style={iStyle} value={formUser} onChange={e=>setFormUser(e.target.value)}
              placeholder="مثلاً: customer_1" />
          </div>
          <div style={{ marginBottom:16 }}>
            <Lbl>رمز عبور پورتال *</Lbl>
            <input style={iStyle} type="text" value={formPass} onChange={e=>setFormPass(e.target.value)}
              placeholder="حداقل ۴ حرف" />
          </div>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn label="انصراف" outline onClick={() => { setShowForm(null); setFormUser(""); setFormPass(""); }} />
            <Btn label={approving?"در حال تأیید...":"تأیید و فعال‌سازی"} icon="check" onClick={() => approve(showForm)} disabled={!!approving} />
          </div>
        </Modal>
      )}

      {/* Filter by customer_type */}
      <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
        {[['all','همه'],['wholesale','عمده‌فروش'],['retail','خرده‌فروش']].map(([k,l]) => (
          <div key={k} onClick={() => setFilterType(k)}
            style={{ padding:"5px 14px", borderRadius:20, fontSize:12, cursor:"pointer", fontWeight:600,
              background:filterType===k?C.primary:C.surfaceAlt, color:filterType==k?"#111":C.textMuted }}>
            {l}
          </div>
        ))}
      </div>

      {/* Requests List */}
      <div style={{ ...cardStyle, overflow:"hidden", marginBottom:24 }}>
        {loading ? (
          <div style={{ padding:32, textAlign:"center", color:C.textDim, fontSize:13 }}>در حال بارگذاری...</div>
        ) : requests.length === 0 ? (
          <div style={{ padding:32, textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
            <p style={{ color:C.textDim, fontSize:13 }}>هیچ درخواست جدیدی وجود ندارد</p>
          </div>
        ) : (
          <>
            <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center" }}>
              <h3 style={{ fontSize:14, fontWeight:700, color:C.text, flex:1 }}>{fa(requests.length)} درخواست</h3>
            </div>
            {requests.filter(r => filterType === 'all' || r.customer_type === filterType).map((r, i) => (
              <div key={r.id} style={{
                display:"flex", flexWrap:"wrap", alignItems:"center", gap:12,
                padding:"13px 18px",
                borderBottom: i<requests.length-1 ? `1px solid ${C.border}` : "none",
                background: i%2===0 ? C.surface : C.surfaceAlt
              }}>
                {/* Info */}
                <div style={{ flex:"1 1 200px", minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:4 }}>
                    {r.name || r.company_name || "—"}
                  </div>
                  <div style={{ fontSize:11, color:C.textMuted, display:"flex", flexWrap:"wrap", gap:"4px 12px" }}>
                    <span>📞 {r.phone ? fa(r.phone) : "—"}</span>
                    {r.city && <span>📍 {r.city}</span>}
                    <span>👤 {r.legal_type === "legal" ? "حقوقی" : "حقیقی"}</span>
                    <span style={{ padding:"1px 6px", borderRadius:4, fontSize:10, fontWeight:600, background:r.customer_type==='retail'?C.successDim:C.warningDim, color:r.customer_type==='retail'?C.success:C.warning }}>
                      {r.customer_type === 'retail' ? 'خرده‌فروش' : 'عمده‌فروش'}
                    </span>
                    {r.company_name && <span>🏢 {r.company_name}</span>}
                  </div>
                  <div style={{ fontSize:11, color:C.textMuted, marginTop:3 }}>
                    {r.email && <span>✉️ {r.email}</span>}
                    {r.address && <span> • {r.address}</span>}
                    {r.national_id && <span> • کد ملی: {r.national_id}</span>}
                  </div>
                  {r.portal_username && (
                    <div style={{ fontSize:11, color:C.info, marginTop:3 }}>
                      نام کاربری پیشنهادی: {r.portal_username}
                    </div>
                  )}
                </div>

                {/* Actions */}
                <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                  <Btn label="تأیید" icon="check" small onClick={() => openApprove(r)} disabled={!!approving || !!rejecting} />
                  <Btn label="رد" icon="x" small danger onClick={() => reject(r.id)} disabled={!!approving || !!rejecting} />
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════ WHATSAPP BROADCAST ═════════════════════════ */
function WhatsAppBroadcast({ me, showToast }) {
  const BROADCAST_API = "https://whatsapp-broadcast-api.vercel.app/api";
  const [tab, setTab] = useState("new"); // new | history
  const [campaigns, setCampaigns] = useState([]);
  const [campaignDetail, setCampaignDetail] = useState(null);
  const [loading, setLoading] = useState(false);

  // Form state
  const [title, setTitle] = useState("");
  const [message, setMessage] = useState("");
  const [mode, setMode] = useState("all"); // all | filtered | selected
  const [selectedGrades, setSelectedGrades] = useState([]);
  const [selectedStatuses, setSelectedStatuses] = useState([]);
  const [selectedSegments, setSelectedSegments] = useState([]);
  const [selectedCustomerIds, setSelectedCustomerIds] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [previewCount, setPreviewCount] = useState(null);
  const [previewCustomers, setPreviewCustomers] = useState([]);
  const [sending, setSending] = useState(false);
  const [result, setResult] = useState(null);

  const fetchCampaigns = async () => {
    setLoading(true);
    try {
      const data = await api("GET", "whatsapp_broadcast", undefined, BROADCAST_API);
      setCampaigns(data || []);
    } catch(e) { showToast("خطا در بارگذاری کمپین‌ها", "error"); }
    finally { setLoading(false); }
  };

  const loadCustomers = async () => {
    try {
      const data = await api("GET", "crm_customers?select=id,name,phone,grade,city,status&order=name.asc");
      setCustomers(data || []);
    } catch(e) {}
  };

  useEffect(() => { fetchCampaigns(); loadCustomers(); }, []);

  // پیش‌نمایش تعداد گیرندگان
  const handlePreview = async () => {
    const params = new URLSearchParams();
    params.set("preview", "1");
    if (mode === "filtered") {
      if (selectedGrades.length > 0) params.set("grades", selectedGrades.join(","));
      if (selectedStatuses.length > 0) params.set("statuses", selectedStatuses.join(","));
      if (selectedSegments.length > 0) params.set("segments", selectedSegments.join(","));
    } else if (mode === "selected") {
      if (selectedCustomerIds.length > 0) params.set("customer_ids", selectedCustomerIds.join(","));
    }
    try {
      const data = await api("GET", `whatsapp_broadcast?${params.toString()}`, undefined, BROADCAST_API);
      setPreviewCount(data.count);
      setPreviewCustomers(data.customers || []);
      showToast(`${fa(data.count)} گیرنده با شماره موبایل معتبر`, "success");
    } catch (e) {
      showToast("خطا در پیش‌نمایش: " + (e.message || ""), "error");
    }
  };

  // ارسال پیام
  const handleSend = async (testMode) => {
    if (!title.trim()) { showToast("عنوان کمپین را وارد کنید", "error"); return; }
    if (!message.trim()) { showToast("متن پیام را وارد کنید", "error"); return; }

    let audience = {};
    if (mode === "filtered") {
      audience = { grades: selectedGrades, statuses: selectedStatuses, segments: selectedSegments };
    } else if (mode === "selected") {
      audience = { customer_ids: selectedCustomerIds };
    }

    setSending(true);
    setResult(null);
    try {
      if (testMode) {
        showToast("پیام تست فقط برای حساب ادمین ارسال می‌شود (شبیه‌سازی)", "warning");
        return;
      }
      const res = await api("POST", "whatsapp_broadcast", {
        title: title.trim(),
        message: message.trim(),
        selection_mode: mode,
        audience_criteria: audience,
      }, BROADCAST_API);
      setResult(res);
      showToast(res.message || "کمپین با موفقیت ارسال شد", "success");
      setTitle(""); setMessage(""); setMode("all");
      setSelectedGrades([]); setSelectedStatuses([]); setSelectedSegments([]); setSelectedCustomerIds([]);
      setPreviewCount(null); setPreviewCustomers([]);
      fetchCampaigns();
      setTab("history");
    } catch (e) {
      showToast("خطا در ارسال: " + (e.message || ""), "error");
    } finally { setSending(false); }
  };

  // مشاهده جزئیات کمپین
  const viewCampaign = async (id) => {
    try {
      const data = await api("GET", `whatsapp_broadcast?id=${id}`, undefined, BROADCAST_API);
      setCampaignDetail(data);
    } catch(e) { showToast("خطا در بارگذاری", "error"); }
  };

  const toggleSelect = (arr, val, setter) => {
    setter(prev => prev.includes(val) ? prev.filter(x => x !== val) : [...prev, val]);
  };

  const toggleCustomer = (id) => {
    setSelectedCustomerIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const modeLabel = m => ({ all: "همه مشتریان", filtered: "فیلتر شده", selected: "انتخابی" }[m] || m);
  const statusLabel = s => ({ draft: "پیش‌نویس", sent: "ارسال شده", cancelled: "لغو شده" }[s] || s);
  const statusColor = s => ({ draft: C.textMuted, sent: C.success, cancelled: C.danger }[s] || C.textMuted);
  const gradeLabel = g => ({ standard: "معمولی", silver: "نقره‌ای", gold: "طلایی", vip: "VIP" }[g] || g);
  const gradeColor = g => ({ standard: C.textMuted, silver: "#9CA3AF", gold: "#F59E0B", vip: "#8B5CF6" }[g] || C.textMuted);

  const inputStyle = { width:"100%", padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13, boxSizing:"border-box" };
  const labelStyle = { display:"block", fontSize:11, marginBottom:5, color:C.textMuted, fontWeight:600 };

  // ==================== صفحه اصلی ====================
  if (campaignDetail) {
    return (
      <div style={{ animation:"fadeUp 0.3s ease", maxWidth:900, margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
          <button onClick={() => setCampaignDetail(null)} style={{ background:"transparent", border:"none", color:C.textMuted, cursor:"pointer", padding:"4px 8px", fontSize:18 }}>→</button>
          <h2 style={{ fontSize:18, fontWeight:700, color:C.text }}>{campaignDetail.title}</h2>
          <span style={{ fontSize:11, padding:"3px 9px", borderRadius:5, background:statusColor(campaignDetail.status)+"22", color:statusColor(campaignDetail.status), fontWeight:600 }}>
            {statusLabel(campaignDetail.status)}
          </span>
        </div>

        <div style={cardStyle}>
          <div style={{ marginBottom:12 }}>
            <span style={{ fontSize:11, color:C.textDim }}>نوع ارسال: </span>
            <span style={{ fontSize:13, color:C.text, fontWeight:600 }}>{modeLabel(campaignDetail.selection_mode)}</span>
          </div>
          <div style={{ marginBottom:12 }}>
            <span style={{ fontSize:11, color:C.textDim }}>تعداد گیرندگان: </span>
            <span style={{ fontSize:13, color:C.text, fontWeight:600 }}>{fa(campaignDetail.recipient_count)}</span>
            <span style={{ margin:"0 12px", fontSize:11, color:C.success }}>✓ ارسال شده: {fa(campaignDetail.sent_count)}</span>
            {campaignDetail.failed_count > 0 && <span style={{ fontSize:11, color:C.danger }}>✗ ناموفق: {fa(campaignDetail.failed_count)}</span>}
          </div>
          <div style={{ marginBottom:12 }}>
            <span style={{ fontSize:11, color:C.textDim }}>تاریخ ارسال: </span>
            <span style={{ fontSize:13, color:C.text }}>{campaignDetail.sent_at ? new Date(campaignDetail.sent_at).toLocaleDateString("fa-IR") : "—"}</span>
          </div>
          <div style={{ background:C.surfaceAlt, borderRadius:8, padding:14, marginBottom:12 }}>
            <div style={{ fontSize:11, color:C.textDim, marginBottom:6 }}>متن پیام:</div>
            <div style={{ fontSize:13, color:C.text, whiteSpace:"pre-wrap", lineHeight:1.7 }}>{campaignDetail.message}</div>
          </div>

          <h3 style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:12 }}>گیرندگان ({fa(campaignDetail.recipients?.length || 0)})</h3>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                  <th style={{ padding:"8px 10px", textAlign:"right", color:C.textDim }}>نام</th>
                  <th style={{ padding:"8px 10px", textAlign:"right", color:C.textDim }}>شماره</th>
                  <th style={{ padding:"8px 10px", textAlign:"right", color:C.textDim }}>سطح</th>
                  <th style={{ padding:"8px 10px", textAlign:"right", color:C.textDim }}>وضعیت</th>
                </tr>
              </thead>
              <tbody>
                {(campaignDetail.recipients || []).map(r => (
                  <tr key={r.id} className="tr-hover" style={{ borderBottom:`1px solid ${C.border}33` }}>
                    <td style={{ padding:"7px 10px", color:C.text }}>{r.customer_name || "—"}</td>
                    <td style={{ padding:"7px 10px", color:C.textMuted, direction:"ltr", textAlign:"left" }}>{r.phone}</td>
                    <td style={{ padding:"7px 10px", color:gradeColor(r.customer_grade) }}>{gradeLabel(r.customer_grade)}</td>
                    <td style={{ padding:"7px 10px", color: r.status === "sent" ? C.success : r.status === "failed" ? C.danger : C.textMuted }}>
                      {r.status === "sent" ? "✓ ارسال" : r.status === "failed" ? "✗ خطا" : r.status === "skipped" ? "— حذف" : "در انتظار"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth:1000, margin:"0 auto" }}>
      <h2 style={{ fontSize:18, fontWeight:700, color:C.text, marginBottom:20 }}>📢 ارسال پیام جمعی واتساپ (Broadcast)</h2>

      {/* Tab buttons */}
      <div style={{ display:"flex", gap:6, marginBottom:20 }}>
        {[["new","ارسال جدید"],["history","تاریخچه"]].map(([k,l]) => (
          <button key={k} onClick={() => { setTab(k); setCampaignDetail(null); }}
            style={{ padding:"8px 18px", borderRadius:8, border:"none", cursor:"pointer", fontFamily:FF, fontSize:13, fontWeight:600,
              background:tab===k?C.primary:C.surface, color:tab===k?"#111":C.text }}>
            {l}
          </button>
        ))}
      </div>

      {/* ─── برگه ارسال جدید ─────────────────────────────────────────── */}
      {tab === "new" && (
        <>
          {/* عنوان کمپین */}
          <div style={cardStyle}>
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>عنوان کمپین (داخلی)</label>
              <input value={title} onChange={e => setTitle(e.target.value)} placeholder="مثال: تخفیف نوروزی VIPها" style={inputStyle} />
            </div>

            {/* نوع ارسال */}
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>نوع ارسال</label>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {[
                  ["all","📋 همه مشتریان","ارسال به تمام مشتریان دارای شماره"],
                  ["filtered","🎯 فیلتر شده","ارسال بر اساس سطح، وضعیت و رفتار"],
                  ["selected","👤 انتخابی","انتخاب دستی مشتریان خاص"],
                ].map(([k, lbl, desc]) => (
                  <div key={k} onClick={() => setMode(k)}
                    style={{ flex:1, minWidth:180, padding:"12px 14px", borderRadius:10, cursor:"pointer",
                      border:`2px solid ${mode===k?C.primary:C.border}`,
                      background:mode===k?C.primaryDim:C.surface,
                      transition:"0.15s" }}>
                    <div style={{ fontSize:14, fontWeight:600, color:mode===k?C.primary:C.text, marginBottom:4 }}>{lbl}</div>
                    <div style={{ fontSize:11, color:C.textDim }}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* فیلترها (فقط در حالت filtered) */}
            {mode === "filtered" && (
              <div style={{ background:C.surface, borderRadius:10, border:`1px solid ${C.border}`, padding:16, marginBottom:16 }}>
                <h3 style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:12 }}>فیلترهای پیشرفته</h3>

                {/* سطح مشتری */}
                <div style={{ marginBottom:14 }}>
                  <label style={labelStyle}>سطح مشتری (چند انتخابی)</label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {["standard","silver","gold","vip"].map(g => (
                      <button key={g} onClick={() => toggleSelect(selectedGrades, g, setSelectedGrades)}
                        style={{ padding:"6px 14px", borderRadius:6, border:"none", cursor:"pointer", fontFamily:FF, fontSize:12, fontWeight:600,
                          background:selectedGrades.includes(g)?gradeColor(g):C.surfaceAlt,
                          color:selectedGrades.includes(g)?"#fff":C.text }}>
                        {gradeLabel(g)}
                      </button>
                    ))}
                  </div>
                </div>

                {/* وضعیت حساب */}
                <div style={{ marginBottom:14 }}>
                  <label style={labelStyle}>وضعیت حساب</label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {[["active","فعال"],["inactive","غیرفعال"]].map(([k,l]) => (
                      <button key={k} onClick={() => toggleSelect(selectedStatuses, k, setSelectedStatuses)}
                        style={{ padding:"6px 14px", borderRadius:6, border:"none", cursor:"pointer", fontFamily:FF, fontSize:12, fontWeight:600,
                          background:selectedStatuses.includes(k)?C.primary:C.surfaceAlt,
                          color:selectedStatuses.includes(k)?"#111":C.text }}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>

                {/* دسته‌بندی رفتار */}
                <div style={{ marginBottom:6 }}>
                  <label style={labelStyle}>دسته‌بندی خرید</label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {[["recent_buyers","🛒 خریداران اخیر (۳۰ روز)"],["debtors","⚠️ بدهکاران"]].map(([k,l]) => (
                      <button key={k} onClick={() => toggleSelect(selectedSegments, k, setSelectedSegments)}
                        style={{ padding:"6px 14px", borderRadius:6, border:"none", cursor:"pointer", fontFamily:FF, fontSize:12, fontWeight:600,
                          background:selectedSegments.includes(k)?C.info:C.surfaceAlt,
                          color:selectedSegments.includes(k)?"#fff":C.text }}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* انتخاب مشتریان (فقط در حالت selected) */}
            {mode === "selected" && (
              <div style={{ background:C.surface, borderRadius:10, border:`1px solid ${C.border}`, padding:16, marginBottom:16, maxHeight:300, overflowY:"auto" }}>
                <h3 style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:12 }}>انتخاب مشتریان ({fa(selectedCustomerIds.length)} انتخاب)</h3>
                {customers.filter(c => c.phone).map(c => (
