                  <div key={c.id} onClick={() => toggleCustomer(c.id)}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 10px", borderRadius:6, cursor:"pointer",
                      background:selectedCustomerIds.includes(c.id)?C.primaryDim:"transparent",
                      borderBottom:`1px solid ${C.border}33` }}>
                    <input type="checkbox" checked={selectedCustomerIds.includes(c.id)} readOnly
                      style={{ accentColor:C.primary, width:16, height:16, cursor:"pointer" }} />
                    <div style={{ flex:1 }}>
                      <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{c.name || "بدون نام"}</span>
                      <span style={{ fontSize:11, color:C.textDim, marginRight:8, direction:"ltr", display:"inline-block" }}>{c.phone}</span>
                    </div>
                    <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, color:gradeColor(c.grade), background:gradeColor(c.grade)+"18", fontWeight:600 }}>
                      {gradeLabel(c.grade)}
                    </span>
                  </div>
                ))}
              </div>
            )}

            {/* متن پیام */}
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>متن پیام واتساپ</label>
              <textarea value={message} onChange={e => setMessage(e.target.value)} rows={6}
                placeholder="متن پیام خود را وارد کنید..."
                style={{ ...inputStyle, resize:"vertical", lineHeight:1.7 }} />
              <div style={{ fontSize:10, color:C.textDim, marginTop:4, textAlign:"left" }}>
                {fa(message.length)} کاراکتر
              </div>
            </div>

            {/* دکمه‌ها */}
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <button onClick={handlePreview}
                style={{ padding:"10px 20px", borderRadius:8, border:`1px solid ${C.primary}`, background:"transparent", color:C.primary, cursor:"pointer", fontFamily:FF, fontSize:13, fontWeight:600, flex:1 }}>
                🔍 پیش‌نمایش تعداد گیرندگان
              </button>
              <button onClick={() => handleSend(true)}
                style={{ padding:"10px 20px", borderRadius:8, border:`1px solid ${C.border}`, background:C.surface, color:C.textMuted, cursor:"pointer", fontFamily:FF, fontSize:13, fontWeight:600 }}>
                📱 ارسال تست
              </button>
              <button onClick={() => handleSend(false)} disabled={sending}
                style={{ padding:"10px 24px", borderRadius:8, border:"none", background:C.primary, color:"#111", cursor:sending?"not-allowed":"pointer", fontFamily:FF, fontSize:13, fontWeight:700, opacity:sending?0.6:1 }}>
                {sending ? "در حال ارسال..." : "📨 ارسال نهایی"}
              </button>
            </div>

            {/* نتیجه پیش‌نمایش */}
            {previewCount !== null && (
              <div style={{ marginTop:16, background:C.surface, borderRadius:10, border:`1px solid ${C.border}`, padding:16 }}>
                <div style={{ fontSize:14, fontWeight:700, color:C.primary, marginBottom:8 }}>
                  تعداد گیرندگان نهایی: {fa(previewCount)} نفر
                </div>
                {previewCustomers.length > 0 && (
                  <div style={{ maxHeight:200, overflowY:"auto" }}>
                    {previewCustomers.map(c => (
                      <div key={c.id} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}22`, fontSize:12 }}>
                        <span style={{ color:C.text }}>{c.name || "بدون نام"}</span>
                        <span style={{ color:gradeColor(c.grade||'') }}>{gradeLabel(c.grade)}</span>
                        <span style={{ color:C.textMuted, direction:"ltr" }}>{c.phone}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* نتیجه ارسال */}
            {result && (
              <div style={{ marginTop:16, background:C.successDim, border:`1px solid ${C.success}44`, borderRadius:10, padding:16 }}>
                <div style={{ fontSize:14, fontWeight:700, color:C.success, marginBottom:6 }}>✅ ارسال با موفقیت انجام شد</div>
                <div style={{ fontSize:13, color:C.text }}>کل گیرندگان: {fa(result.total_recipients)}</div>
                <div style={{ fontSize:13, color:C.success }}>موفق: {fa(result.sent)}</div>
                {result.failed > 0 && <div style={{ fontSize:13, color:C.danger }}>ناموفق: {fa(result.failed)}</div>}
              </div>
            )}
          </div>
        </>
      )}

      {/* ─── برگه تاریخچه ──────────────────────────────────────────── */}
      {tab === "history" && (
        <div style={cardStyle}>
          <h3 style={{ fontSize:15, fontWeight:600, color:C.text, marginBottom:16 }}>تاریخچه کمپین‌ها</h3>
          {loading ? <div style={{ textAlign:"center", padding:30, color:C.textDim }}>در حال بارگذاری...</div> :
            campaigns.length === 0 ? <div style={{ textAlign:"center", padding:30, color:C.textDim }}>هیچ کمپینی ثبت نشده</div> :
            campaigns.map(c => (
              <div key={c.id} onClick={() => viewCampaign(c.id)}
                style={{ padding:"14px 16px", borderRadius:10, background:C.surfaceAlt, marginBottom:8, cursor:"pointer", border:`1px solid ${C.border}`, transition:"0.15s" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{c.title}</span>
                  <span style={{ fontSize:11, padding:"3px 9px", borderRadius:5, background:statusColor(c.status)+"22", color:statusColor(c.status), fontWeight:600 }}>
                    {statusLabel(c.status)}
                  </span>
                </div>
                <div style={{ display:"flex", gap:16, fontSize:12, color:C.textDim }}>
                  <span>{modeLabel(c.selection_mode)}</span>
                  <span>👥 {fa(c.recipient_count)} گیرنده</span>
                  <span style={{ color:C.success }}>✓ {fa(c.sent_count)}</span>
                  {c.failed_count > 0 && <span style={{ color:C.danger }}>✗ {fa(c.failed_count)}</span>}
                  <span>{c.created_at ? new Date(c.created_at).toLocaleDateString("fa-IR") : "—"}</span>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════ LEADS INBOX ════════════════════════════════ */
const LEADS_BACKEND = "https://azarmehr-backend-main.vercel.app/api";

const LS = [
  { value:"new",       label:"جدید",          color:"#5ba3e6" },
  { value:"contacted", label:"در حال پیگیری",  color:"#e6a35b" },
  { value:"qualified", label:"تأیید شده",      color:"#5be65b" },
  { value:"converted", label:"تبدیل به مشتری", color:"#5be6e6" },
  { value:"rejected",  label:"رد شده",         color:"#e65b5b" },
];

const LS_COLORS = { new:{bg:"#1a3a5c",text:"#5ba3e6"}, contacted:{bg:"#3a2a1a",text:"#e6a35b"}, qualified:{bg:"#1a3a1a",text:"#5be65b"}, converted:{bg:"#1a3a3a",text:"#5be6e6"}, rejected:{bg:"#3a1a1a",text:"#e65b5b"} };

function LeadsInbox({ me, showToast }) {
  const [leads, setLeads]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [updatingId, setUpdatingId] = useState(null);
  const [search, setSearch]     = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [selectedLead, setSelectedLead] = useState(null);
  const [leadMessages, setLeadMessages] = useState([]);
  const [msgsLoading, setMsgsLoading] = useState(false);
  const [stats, setStats]       = useState({ total:0, new:0, contacted:0, qualified:0, converted:0 });
  const [proformaLead, setProformaLead] = useState(null);
  const [proformaLoading, setProformaLoading] = useState(false);
  const [proformaResult, setProformaResult] = useState(null);

  const fmtDate = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    const j = g2j(d.getFullYear(), d.getMonth()+1, d.getDate());
    return `${fa(j[0])}/${fa(String(j[1]).padStart(2,"0"))}/${fa(String(j[2]).padStart(2,"0"))} ${fa(String(d.getHours()).padStart(2,"0"))}:${fa(String(d.getMinutes()).padStart(2,"0"))}`;
  };

  const computeStats = (arr) => {
    const s = { total:arr.length, new:0, contacted:0, qualified:0, converted:0 };
    arr.forEach(l => { if (s.hasOwnProperty(l.status)) s[l.status]++; });
    return s;
  };

  const fetchLeads = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      let path = "leads";
      const params = [];
      if (search) params.push("search="+encodeURIComponent(search));
      if (statusFilter) params.push("status="+statusFilter);
      if (params.length) path += "?" + params.join("&");
      const res = await api("GET", path, undefined, LEADS_BACKEND);
      const data = res?.data || res || [];
      setLeads(data);
      setStats(computeStats(data));
    } catch(e) {
      console.error("[Leads] Fetch error:", e.message);
      setError(e.message);
    } finally { setLoading(false); }
  }, [search, statusFilter]);

  useEffect(() => { fetchLeads(); }, [fetchLeads]);

  const handleStatus = async (id, newStatus) => {
    setUpdatingId(id);
    try {
      const body = { id, status: newStatus };
      if (newStatus === "converted") body.converted_at = new Date().toISOString();
      await api("PATCH", "leads", body, LEADS_BACKEND);
      setLeads(prev => prev.map(l => l.id===id ? {...l, status:newStatus, ...(newStatus==="converted"?{converted_at:new Date().toISOString()}:{})} : l));
      setStats(prev => ({...prev, [newStatus]: (prev[newStatus]||0)+1 }));
    } catch(e) {
      showToast?.("خطا در تغییر وضعیت: "+e.message, "error");
    } finally { setUpdatingId(null); }
  };

  const openDetail = async (lead) => {
    setSelectedLead(lead);
    setMsgsLoading(true);
    setLeadMessages([]);
    try {
      const res = await api("GET", "leads?id="+lead.id+"&messages=true", undefined, LEADS_BACKEND);
      setLeadMessages(res?.messages || []);
    } catch(e) {
      console.error("[Leads] Messages error:", e.message);
    } finally { setMsgsLoading(false); }
  };

  const inpStyle = { background:C.surfaceAlt, color:C.text, border:"1px solid "+C.border, borderRadius:10, padding:"8px 14px", fontSize:13, fontFamily:FF, outline:"none", width:"100%", boxSizing:"border-box" };

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      {/* Stats Cards */}
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {LS.map(s => (
          <div key={s.value} onClick={() => setStatusFilter(prev => prev===s.value ? "" : s.value)} style={{
            background:LS_COLORS[s.value].bg, borderRadius:10, padding:"6px 14px", textAlign:"center",
            minWidth:56, cursor:"pointer", opacity: statusFilter===s.value?1:0.5,
            border: statusFilter===s.value?("1px solid "+s.color):"1px solid transparent",
          }}>
            <div style={{ fontSize:18, fontWeight:700, color:LS_COLORS[s.value].text }}>{fa(stats[s.value]||0)}</div>
            <div style={{ fontSize:10, color:LS_COLORS[s.value].text, opacity:0.8 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Search + Filter */}
      <div style={{ display:"flex", gap:12, marginBottom:16, alignItems:"center" }}>
        <div style={{ flex:1, maxWidth:320, position:"relative" }}>
          <input type="text" placeholder="جستجو با موبایل یا نام..." value={search}
            onChange={e => setSearch(e.target.value)} style={inpStyle} />
          {search && <span onClick={() => setSearch("")} style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", cursor:"pointer", color:C.textMuted, fontSize:14 }}>✕</span>}
        </div>
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ ...inpStyle, width:"auto", minWidth:120 }}>
          <option value="">همه وضعیت‌ها</option>
          {LS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
        <button onClick={fetchLeads} style={{ padding:"8px 14px", borderRadius:8, border:"none", background:C.primaryDim, color:C.primary, cursor:"pointer", fontFamily:FF, fontSize:12, fontWeight:600, display:"flex", alignItems:"center", gap:4 }}>
          <Ic name="refresh" size={14} color={C.primary} /> تازه‌سازی
        </button>
      </div>

      {/* Error */}
      {error && (
        <div style={{ background:"#3a1a1a", border:"1px solid #e65b5b", borderRadius:10, padding:12, marginBottom:16, color:"#e65b5b", fontSize:13 }}>
          خطا: {error}
        </div>
      )}

      {/* Loading */}
      {loading && <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>در حال بارگذاری لیدها...</div>}

      {/* Empty */}
      {!loading && !error && leads.length===0 && (
        <div style={{ background:C.surface, borderRadius:14, padding:40, textAlign:"center", border:"1px solid "+C.border, color:C.textMuted, fontSize:14 }}>
          {search||statusFilter ? "لیدی با این فیلترها یافت نشد." : "هیچ لیدی ثبت نشده است."}
        </div>
      )}

      {/* Table */}
      {!loading && leads.length>0 && (
        <table style={{ width:"100%", borderCollapse:"collapse", background:C.surface, borderRadius:14, overflow:"hidden", border:"1px solid "+C.border }}>
          <thead>
            <tr>
              {["#","موبایل","آخرین پیام","تاریخ","وضعیت","عملیات"].map(h => (
                <th key={h} style={{ padding:"10px 14px", textAlign:"right", fontSize:12, fontWeight:700, color:C.primary, borderBottom:"2px solid "+C.border, background:C.surfaceAlt, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {leads.map((lead, idx) => (
              <React.Fragment key={lead.id}>
                <tr style={{ background: selectedLead?.id===lead.id ? C.surfaceAlt : "transparent" }}>
                  <td style={{ padding:"10px 14px", fontSize:12, borderBottom:"1px solid "+C.border, color:C.textMuted }}>{fa(idx+1)}</td>
                  <td style={{ padding:"10px 14px", fontSize:12, borderBottom:"1px solid "+C.border }}>
                    <span onClick={() => openDetail(lead)} style={{ color:C.primary, fontWeight:600, cursor:"pointer", textDecoration:"none" }} title="مشاهده پیام‌ها">{lead.mobile||"—"}</span>
                  </td>
                  <td style={{ padding:"10px 14px", fontSize:12, borderBottom:"1px solid "+C.border, color:C.textMuted, maxWidth:260, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{lead.last_message||"—"}</td>
                  <td style={{ padding:"10px 14px", fontSize:11, borderBottom:"1px solid "+C.border, color:C.textMuted, whiteSpace:"nowrap" }}>{fmtDate(lead.last_message_at)}</td>
                  <td style={{ padding:"10px 14px", fontSize:12, borderBottom:"1px solid "+C.border }}>
                    <select value={lead.status} onChange={e => handleStatus(lead.id, e.target.value)} disabled={updatingId===lead.id} style={{
                      background:C.surfaceAlt, color:C.text, border:"1px solid "+C.border, borderRadius:8,
                      padding:"3px 6px", fontSize:11, cursor:"pointer", fontFamily:FF, opacity:updatingId===lead.id?0.5:1,
                    }}>
                      {LS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </select>
                  </td>
                  <td style={{ padding:"10px 14px", fontSize:12, borderBottom:"1px solid "+C.border }}>
                    <button onClick={() => openDetail(lead)} style={{
                      background:C.primaryDim, color:C.primary, border:"none", borderRadius:6, padding:"4px 8px", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:FF, marginLeft:6,
                    }}>پیام‌ها</button>
                    <button onClick={() => { setProformaLead(lead); setProformaResult(null); }}
                      disabled={lead.status==="converted"} style={{
                      background:lead.status==="converted" ? "#2A2A2A" : "#D4880E",
                      color:lead.status==="converted" ? "#6B7280" : "#111",
                      border:"none", borderRadius:6, padding:"4px 8px", fontSize:11, fontWeight:600,
                      cursor:lead.status==="converted" ? "not-allowed" : "pointer",
                      fontFamily:FF, whiteSpace:"nowrap",
                    }}>پیش‌فاکتور</button>
                  </td>
                </tr>

                {/* Expandable messages row */}
                {selectedLead?.id===lead.id && (
                  <tr>
                    <td colSpan={6} style={{ padding:0, background:"#141414", borderBottom:"1px solid "+C.border }}>
                      <div style={{ padding:"12px 16px" }}>
                        <h4 style={{ margin:"0 0 8px", color:C.text, fontSize:13, fontWeight:600 }}>💬 {lead.mobile} ({fa(leadMessages.length)} پیام)</h4>
                        {msgsLoading ? (
                          <p style={{ color:C.textMuted, fontSize:12 }}>در حال بارگذاری...</p>
                        ) : (
                          <div style={{ maxHeight:280, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>
                            {leadMessages.length===0 && <p style={{ color:C.textMuted, fontSize:12 }}>هیچ پیامی یافت نشد.</p>}
                            {leadMessages.map(msg => (
                              <div key={msg.id} style={{
                                background:C.surfaceAlt, borderRadius:6, padding:"6px 10px", fontSize:12, lineHeight:1.5,
                                borderRight: msg.auto_replied ? "3px solid "+C.primary : msg.needs_human ? "3px solid #e65b5b" : "3px solid transparent",
                              }}>
                                <div style={{ color:C.text }}>{msg.message_body}</div>
                                <div style={{ display:"flex", justifyContent:"space-between", marginTop:2, fontSize:10, color:C.textMuted }}>
                                  <span>{fmtDate(msg.created_at)}</span>
                                  <span>{msg.auto_replied ? "🤖 پاسخ خودکار" : msg.needs_human ? "⚠️ نیاز به بررسی" : "📩 دریافتی"}</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      )}

      {/* ── Proforma modal ── */}
      {proformaLead && (
        <div style={{
          position:"fixed", inset:0, zIndex:1000, background:"rgba(0,0,0,0.7)",
          display:"flex", alignItems:"center", justifyContent:"center", padding:20,
          animation:"fadeIn 0.15s ease"
        }} onClick={() => { if (!proformaLoading) { setProformaLead(null); setProformaResult(null); } }}>
          <div style={{
            background:C.surface, borderRadius:16, maxWidth:480, width:"100%",
            maxHeight:"90vh", overflow:"auto", padding:28,
            animation:"fadeUp 0.2s ease", border:"1px solid "+C.border
          }} onClick={e => e.stopPropagation()}>
            {proformaResult ? (
              /* ── Success result ── */
              <div style={{ textAlign:"center", padding:"10px 0" }}>
                <div style={{ fontSize:32, marginBottom:12 }}>✅</div>
                <h2 style={{ fontSize:15, fontWeight:700, marginBottom:8, color:C.text }}>پیش‌فاکتور صادر شد</h2>
                <p style={{ fontSize:13, color:C.textMuted, marginBottom:4 }}>
                  سفارش شماره: <strong style={{ color:C.primary }}>{fa(proformaResult.order_id)}</strong>
                </p>
                <p style={{ fontSize:11, color:C.textDim, marginBottom:16 }}>{proformaResult.message}</p>
                <button onClick={() => { setProformaLead(null); setProformaResult(null); }}
                  style={{ padding:"10px 24px", borderRadius:8, border:"none", background:C.primaryDim, color:C.primary, cursor:"pointer", fontFamily:FF, fontWeight:600, fontSize:13 }}>
                  بستن
                </button>
              </div>
            ) : (
              /* ── Confirm form ── */
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <h2 style={{ fontSize:15, fontWeight:700, color:C.text }}>صدور پیش‌فاکتور</h2>
                  <button onClick={() => { setProformaLead(null); setProformaResult(null); }}
                    disabled={proformaLoading}
                    style={{ background:"none", border:"none", cursor:proformaLoading?"wait":"pointer", color:C.textDim, fontSize:18 }}>✕</button>
                </div>
                <div style={{ background:C.surfaceAlt, borderRadius:10, padding:14, marginBottom:16, fontSize:13, color:C.text, lineHeight:1.7 }}>
                  <div><span style={{ color:C.textMuted }}>شماره:</span> {fa(proformaLead.mobile || "—")}</div>
                  <div><span style={{ color:C.textMuted }}>آخرین پیام:</span> {proformaLead.last_message ? proformaLead.last_message.substring(0, 80) : "—"}</div>
                  <div><span style={{ color:C.textMuted }}>وضعیت فعلی:</span> <span style={{
                    color: LS_COLORS[proformaLead.status]?.text || C.text, fontWeight:600
                  }}>{LS.find(s=>s.value===proformaLead.status)?.label || proformaLead.status}</span></div>
                  <div style={{ marginTop:8, fontSize:11, color:C.warning }}>
                    ⚠️ یک سفارش جدید ایجاد و پیش‌فاکتور آن صادر می‌شود. پس از تأیید، می‌توانید آیتم‌ها را در بخش سفارشات ویرایش کنید.
                  </div>
                </div>
                <button onClick={async () => {
                  setProformaLoading(true);
                  try {
                    const res = await api("POST", "lead-to-proforma", { lead_id: proformaLead.id }, LEADS_BACKEND);
                    if (res?.ok) {
                      setProformaResult(res);
                      // Refresh leads list to show updated status
                      fetchLeads();
                      showToast?.("پیش‌فاکتور صادر شد", "success");
                    } else {
                      showToast?.(res?.error || "خطا در صدور پیش‌فاکتور", "error");
                    }
                  } catch(e) {
                    showToast?.("خطا: "+e.message, "error");
                  } finally {
                    setProformaLoading(false);
                  }
                }} disabled={proformaLoading} style={{
                  width:"100%", padding:"12px", borderRadius:10, border:"none",
                  background: proformaLoading ? C.textMuted : "#D4880E",
                  color: proformaLoading ? "#333" : "#111",
                  cursor: proformaLoading ? "wait" : "pointer",
                  fontFamily:FF, fontSize:13, fontWeight:700,
                  display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                  opacity: proformaLoading ? 0.6 : 1,
                }}>
                  {proformaLoading ? "در حال صدور..." : "صدور پیش‌فاکتور"}
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════ CUSTOMER TIMELINE ════════════════════════ */
function CustomerTimeline({ me, showToast }) {
  const [customers, setCustomers] = useState([]);
  const [custId, setCustId] = useState("");
  const [custName, setCustName] = useState("");
  const [loading, setLoading] = useState(false);
  const [timeline, setTimeline] = useState([]);
  const [search, setSearch] = useState("");
  const [open, setOpen] = useState(false);

  // Load customer list on mount
  useEffect(() => {
    (async () => {
      try {
        const r = await api("GET", "crm-customers");
        setCustomers(r||[]);
      } catch(e) { showToast("خطا در بارگذاری مشتریان","error"); }
    })();
  }, []);

  const loadTimeline = useCallback(async (id) => {
    if (!id) { setTimeline([]); return; }
    setLoading(true);
    try {
      // crm_invoices: has total (not total_amount), no status column
      // crm_payments: has customer_id but no order_id
      // whatsapp_logs: no customer_id — links via phone_number
      const cust = customers.find(c => String(c.id) === String(id));
      const phones = [cust?.phone, cust?.mobile].filter(Boolean);

      const qO = `crm-orders?customer_id=${id}`;
      const qI = `crm-invoices?customer_id=${id}`;
      const qP = `crm-payments?customer_id=${id}`;

      // whatsapp_logs: query by phone_number (or filter for multiple phones)
      let lUrl;
      if (phones.length >= 1) {
        lUrl = `whatsapp-logs?phone=${encodeURIComponent(phones.join(","))}`;
      } else {
        lUrl = null;
      }

      const reqs = [
        api("GET", qO),
        api("GET", qI),
        api("GET", qP),
      ];
      if (lUrl) reqs.push(api("GET", lUrl));

      const results = await Promise.all(reqs.map(async p => { try { return await p; } catch(e) { return []; } }));
      const [orders, invoices, payments, logs] = [results[0]||[], results[1]||[], results[2]||[], results[3]||[]];

      const ev = [];
      (orders||[]).forEach(o => ev.push({
        id:`o-${o.id}`, type:"order", date:o.created_at,
        title:`سفارش #${fa(o.id)}`,
        subtitle:`وضعیت: ${ORDER_STATUS[o.order_status]?.label||o.order_status||"نامشخص"}`,
        amount:o.total_amount,
      }));
      (invoices||[]).forEach(inv => ev.push({
        id:`i-${inv.id}`, type:"invoice", date:inv.created_at,
        title:`فاکتور ${inv.invoice_number?"#"+fa(inv.invoice_number):"#"+fa(inv.id)}`,
        subtitle:inv.issue_date ? `تاریخ صدور: ${inv.issue_date}` : "",
        amount:inv.total,
      }));
      (payments||[]).forEach(p => ev.push({
        id:`p-${p.id}`, type:"payment", date:p.created_at,
        title:`پرداخت ${p.payment_method||""}`.trim(),
        subtitle:p.status||"",
        amount:p.amount,
      }));
      (logs||[]).forEach(l => ev.push({
        id:`l-${l.id}`, type:"whatsapp", date:l.created_at,
        title:`واتساپ — ${l.phone_number||""}`,
        subtitle:l.message_type||"پیام",
        content:l.message_content,
      }));

      ev.sort((a,b) => new Date(b.date) - new Date(a.date));
      setTimeline(ev);
    } catch(e) { console.error("loadTimeline:", e); showToast("خطا در بارگذاری تایم‌لاین","error"); }
    setLoading(false);
  }, [customers]);

  useEffect(() => { loadTimeline(custId); }, [custId, loadTimeline]);

  const selCust = customers.filter(c => String(c.id) === custId)[0];
  const flt = customers.filter(c => {
    if (!search) return true;
    const q = search.trim();
    return (c.name&&c.name.includes(q))||(c.phone&&c.phone.includes(q));
  });

  const fd = (d) => {
    if (!d) return "";
    const dt = new Date(d);
    const [y,m,dd] = g2j(dt.getFullYear(), dt.getMonth()+1, dt.getDate());
    return `${fa(y)}/${fa(String(m).padStart(2,"0"))}/${fa(String(dd).padStart(2,"0"))}`;
  };
  const ft = (d) => {
    if (!d) return "";
    const dt = new Date(d);
    return `${fa(String(dt.getHours()).padStart(2,"0"))}:${fa(String(dt.getMinutes()).padStart(2,"0"))}`;
  };

  const typeColor = (t) => ({ order:C.info, invoice:C.purple, payment:C.success, whatsapp:C.warning })[t]||C.textMuted;
  const typeLabel = (t) => ({ order:"سفارش", invoice:"فاکتور", payment:"پرداخت", whatsapp:"پیام" })[t]||t;

  return (
    <div style={{ padding:"24px 20px", maxWidth:720, margin:"0 auto" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
        <Ic name="clock" size={22} color={C.primary} />
        <span style={{ fontSize:18, fontWeight:700, color:C.text }}>تایم‌لاین مشتری</span>
      </div>

      {/* Customer Selector */}
      <div style={{ position:"relative", marginBottom:20 }}>
        <input
          placeholder="جستجوی مشتری..."
          value={open ? search : (selCust ? selCust.name : "")}
          onChange={e => { setSearch(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          style={{
            width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`,
            borderRadius:10, padding:"10px 14px", color:C.text, fontSize:14, fontFamily:FF,
          }}
        />
        {open && (
          <div style={{
            position:"absolute", zIndex:500, top:"calc(100% + 4px)", right:0, left:0,
            background:C.surface, border:`1px solid ${C.border}`, borderRadius:12,
            boxShadow:"0 12px 40px #000a", maxHeight:260, overflowY:"auto",
          }}>
            {flt.length===0 ? (
              <div style={{ padding:14, color:C.textMuted, fontSize:13, textAlign:"center" }}>مشتری‌ای یافت نشد</div>
            ) : flt.map(c => (
              <div key={c.id} onClick={() => {
                setCustId(String(c.id)); setCustName(c.name||"");
                setSearch(""); setOpen(false);
              }} style={{
                padding:"10px 14px", cursor:"pointer", display:"flex", alignItems:"center",
                justifyContent:"space-between", borderBottom:`1px solid ${C.border}`,
                background:String(c.id)===custId ? C.primaryDim : "transparent",
              }}
                onMouseEnter={e => e.currentTarget.style.background = C.surfaceAlt}
                onMouseLeave={e => e.currentTarget.style.background = String(c.id)===custId ? C.primaryDim : "transparent"}
              >
                <div>
                  <div style={{ color:C.text, fontSize:14, fontWeight:600 }}>{c.name}</div>
                  {c.phone && <div style={{ color:C.textMuted, fontSize:12 }}>{c.phone}</div>}
                </div>
                {c.city && <div style={{ color:C.textDim, fontSize:12 }}>{c.city}</div>}
              </div>
            ))}
            <div style={{ padding:"8px 14px", borderTop:`1px solid ${C.border}`, textAlign:"center" }}>
              <span style={{ color:C.textMuted, fontSize:11 }}>{fa(flt.length)} مشتری</span>
            </div>
          </div>
        )}
        {/* Click outside to close */}
        {open && <div onClick={() => setOpen(false)} style={{ position:"fixed", inset:0, zIndex:499 }} />}
      </div>

      {/* Timeline */}
      {loading ? (
        <div style={{ textAlign:"center", padding:40 }}>
          <div style={{ width:28, height:28, border:"3px solid #2A2A2A", borderTopColor:C.primary, borderRadius:"50%", animation:"spin .7s linear infinite", margin:"0 auto 12px" }} />
          <div style={{ color:C.textMuted, fontSize:13 }}>در حال بارگذاری...</div>
        </div>
      ) : !custId ? (
        <div style={{ textAlign:"center", padding:40, color:C.textMuted, fontSize:14 }}>
          <Ic name="clock" size={40} color={C.textDim} />
          <div style={{ marginTop:12 }}>لطفاً یک مشتری را انتخاب کنید</div>
        </div>
      ) : timeline.length===0 ? (
        <div style={{ textAlign:"center", padding:40, color:C.textMuted, fontSize:14 }}>
          <Ic name="inbox" size={40} color={C.textDim} />
          <div style={{ marginTop:12 }}>هیچ رویدادی برای این مشتری یافت نشد</div>
        </div>
      ) : (
        <div style={{ position:"relative" }}>
          {/* Vertical line */}
          <div style={{ position:"absolute", right:23, top:0, bottom:0, width:2, background:C.border }} />
          {timeline.map((ev,idx) => (
            <div key={ev.id} style={{ position:"relative", marginBottom:16, paddingRight:56, animation:"fadeUp .3s ease", animationDelay:`${Math.min(idx*30,300)}ms` }}>
              {/* Dot */}
              <div style={{
                position:"absolute", right:16, top:6, width:16, height:16, borderRadius:"50%",
                background:typeColor(ev.type), border:`3px solid ${C.surface}`,
                boxShadow:`0 0 0 2px ${typeColor(ev.type)}44`, zIndex:2,
              }} />
              {/* Card */}
              <div style={{
                background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:"12px 16px",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <span style={{
                    fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4,
                    background:typeColor(ev.type)+"22", color:typeColor(ev.type),
                  }}>{typeLabel(ev.type)}</span>
                  <span style={{ color:C.textDim, fontSize:11 }}>{fd(ev.date)}</span>
                  <span style={{ color:C.textDim, fontSize:11 }}>{ft(ev.date)}</span>
                </div>
                <div style={{ color:C.text, fontSize:14, fontWeight:600, marginBottom:2 }}>{ev.title}</div>
                <div style={{ color:C.textMuted, fontSize:12 }}>{ev.subtitle}</div>
                {ev.amount != null && (
                  <div style={{ color:ev.type==="payment"?C.success:C.text, fontSize:13, marginTop:4, fontWeight:700 }}>
                    {shortCur(ev.amount)} ریال
                  </div>
                )}
                {ev.content && (
                  <div style={{
                    marginTop:6, padding:"8px 10px", background:C.surfaceAlt, borderRadius:8,
                    color:C.textMuted, fontSize:12, maxHeight:48, overflow:"hidden",
                    textOverflow:"ellipsis", whiteSpace:"nowrap",
                  }}>{ev.content}</div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Stats footer */}
      {timeline.length > 0 && (
        <div style={{ marginTop:20, padding:"12px 16px", background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, display:"flex", gap:16, flexWrap:"wrap" }}>
          {["order","invoice","payment","whatsapp"].map(t => {
            const cnt = timeline.filter(e => e.type===t).length;
            return cnt > 0 ? (
              <div key={t} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:typeColor(t) }} />
                <span style={{ color:C.text, fontSize:12 }}>{typeLabel(t)}: <strong>{fa(cnt)}</strong></span>
              </div>
            ) : null;
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════ ORDER OPS BOARD (KANBAN) ═══════════════════ */
function OrderOpsBoard({ me, showToast }) {
  const [orders, setOrders]   = useState([]);
  const [custMap, setCustMap] = useState({});
  const [loading, setLoading] = useState(true);
  const [detailOrder, setDetailOrder] = useState(null);
  const [q, setQ] = useState("");

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [ords, custs] = await Promise.all([
        api("GET", "crm_orders?order=created_at.desc&limit=500"),
        api("GET", "crm_customers?select=id,name,phone,credit_allowed&limit=1000")
      ]);
      const cm = {};
      (custs||[]).forEach(c => { cm[c.id] = c; });
      setCustMap(cm);
      setOrders(ords||[]);
    } catch(e) {
      showToast("خطا در بارگذاری برد سفارش‌ها","error");
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { load(); }, [load]);

  const columns = useMemo(() => {
    const filtered = q.trim()
      ? orders.filter(o => {
          const c = custMap[o.customer_id];
          const hay = `${o.id} ${c?.name||""} ${c?.phone||""}`.toLowerCase();
          return hay.includes(q.trim().toLowerCase());
        })
      : orders;

    const groups = {};
    Object.keys(ORDER_STATUS).forEach(k => { groups[k] = []; });
    filtered.forEach(o => {
      const st = o.order_status || "registered";
      if (!groups[st]) groups[st] = [];
      groups[st].push(o);
    });
    return groups;
  }, [orders, custMap, q]);

  if (detailOrder) {
    return (
      <OrderDetail
        order={detailOrder.order}
        customer={detailOrder.customer}
        me={me}
        showToast={showToast}
        onUpdate={() => { setDetailOrder(null); load(); }}
        onClose={() => setDetailOrder(null)}
      />
    );
  }

  return (
    <div style={{ padding:16, animation:"fadeUp 0.3s ease" }}>
      {/* ── Header ── */}
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <Ic name="columns" size={20} color={C.primary} />
          <h2 style={{ fontSize:16, fontWeight:700, color:C.text, margin:0 }}>برد عملیات سفارش‌ها</h2>
        </div>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          placeholder="جستجو: کد سفارش، نام یا شماره مشتری"
          style={{
            flex:1, maxWidth:320, background:C.surfaceAlt, border:`1px solid ${C.border}`,
            borderRadius:8, padding:"8px 12px", color:C.text, fontSize:13, fontFamily:FF,
          }}
        />
        <button onClick={load} style={{
          display:"inline-flex", alignItems:"center", gap:6, padding:"8px 16px",
          borderRadius:8, border:`1px solid ${C.border}`, background:C.surface,
          color:C.text, fontSize:13, fontFamily:FF, cursor:"pointer",
        }}>به‌روزرسانی</button>
      </div>

      {/* ── Columns ── */}
      {loading ? (
        <div style={{ textAlign:"center", padding:40 }}>
          <div style={{ width:28, height:28, border:"3px solid #2A2A2A", borderTopColor:C.primary, borderRadius:"50%", animation:"spin .7s linear infinite", margin:"0 auto 12px" }} />
          <div style={{ color:C.textMuted, fontSize:13 }}>در حال بارگذاری…</div>
        </div>
      ) : (
        <div style={{ display:"flex", gap:12, overflowX:"auto", paddingBottom:12 }}>
          {Object.keys(ORDER_STATUS).map(stKey => {
            const list = columns[stKey];
            const meta = ORDER_STATUS[stKey];
            return (
              <div key={stKey} style={{
                minWidth:260, maxWidth:260, background:C.surface,
                borderRadius:12, padding:10, flexShrink:0,
                border:`1px solid ${C.border}`,
              }}>
                {/* Column header */}
                <div style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  marginBottom:8, padding:"0 4px",
                }}>
                  <span style={{ display:"flex", alignItems:"center", gap:6, fontWeight:700, fontSize:12, color:C.text }}>
                    <span style={{ width:10, height:10, borderRadius:"50%", background:meta.color, display:"inline-block" }} />
                    {meta.label}
                  </span>
                  <span style={{ fontSize:11, color:C.textDim }}>{fa(list.length)}</span>
                </div>

                {/* Cards */}
                <div style={{ display:"flex", flexDirection:"column", gap:6, minHeight:20 }}>
                  {list.map(o => {
                    const cust = custMap[o.customer_id];
                    return (
                      <div
                        key={o.id}
                        onClick={() => setDetailOrder({ order:o, customer:cust })}
                        style={{
                          background:C.surfaceAlt, border:`1px solid ${C.border}`,
                          borderRadius:10, padding:10, cursor:"pointer",
                          boxShadow:"0 1px 3px #0004", transition:"all 0.12s",
                        }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = meta.color; e.currentTarget.style.background = meta.bg; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.surfaceAlt; }}
                      >
                        {/* Order ID + Type */}
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:4 }}>
                          <b style={{ color:C.text }}>#{fa(o.id)}</b>
                          <span style={{ color:C.textMuted }}>
                            {o.order_type === "CUSTOM" ? "سفارشی" : "موجودی"}
                          </span>
                        </div>
                        {/* Customer name */}
                        <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{cust?.name || "—"}</div>
                        {/* Phone */}
                        <div style={{ fontSize:11, color:C.textMuted }}>{cust?.phone || ""}</div>
                        {/* Amount */}
                        {o.total_amount != null && (
                          <div style={{ fontSize:12, marginTop:4, color:C.primary, fontWeight:600 }}>
                            {shortCur(o.total_amount)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════ WHATSAPP INBOX ════════════════════════════ */
function WhatsAppInbox({ me, showToast }) {
  const BROADCAST_API = "https://whatsapp-broadcast-api.vercel.app/api";
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 30;

  // ── Manual Link State ──
  const [linkRow, setLinkRow] = useState(null);
  const [linkQuery, setLinkQuery] = useState("");
  const [linkResults, setLinkResults] = useState([]);
  const [linkLoading, setLinkLoading] = useState(false);
  const [linkSubmitting, setLinkSubmitting] = useState(false);

  const searchCustomers = useCallback(async (q) => {
    const query = (q||"").trim();
    if (query.length < 2) { setLinkResults([]); return; }
    setLinkLoading(true);
    try {
      const data = await api("GET", `crm-customers?search=${encodeURIComponent(query)}&limit=10`);
      setLinkResults(data||[]);
    } catch(e) {
      console.error("searchCustomers error:", e);
      setLinkResults([]);
    } finally { setLinkLoading(false); }
  }, []);

  const handleManualLink = async (customer) => {
    if (!linkRow?.id || !customer?.id) return;
    setLinkSubmitting(true);
    try {
      const res = await api("PATCH", `whatsapp-inbox/${linkRow.id}`, { customer_id: customer.id }, BROADCAST_API);
      if (res?.error) throw new Error(res.error);
      showToast?.("مشتری با موفقیت متصل شد", "success");
      setLinkRow(null); setLinkQuery(""); setLinkResults([]);
    } catch(e) {
      console.error("handleManualLink error:", e);
      showToast?.(e.message||"خطا در اتصال مشتری", "error");
    } finally { setLinkSubmitting(false); }
  };

  const fetchMessages = useCallback(async (pageNum = 0) => {
    setLoading(true);
    try {
      const offset = pageNum * PAGE_SIZE;
      const res = await api("GET", `whatsapp-inbox?limit=${PAGE_SIZE}&offset=${offset}`, undefined, BROADCAST_API);
      setMessages(res.data || []);
      setTotal(res.count || 0);
    } catch (e) {
      showToast("خطا در بارگذاری پیام‌ها: " + (e.message || ""), "error");
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { fetchMessages(page); }, [page]);

  const formatDate = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    const j = g2j(d.getFullYear(), d.getMonth() + 1, d.getDate());
    const h = String(d.getHours()).padStart(2, "0");
    const m = String(d.getMinutes()).padStart(2, "0");
    return `${fa(j[0])}/${fa(String(j[1]).padStart(2,"0"))}/${fa(String(j[2]).padStart(2,"0"))} ${fa(h)}:${fa(m)}`;
  };

  const totalPages = Math.ceil(total / PAGE_SIZE);

  return (
    <div style={{ animation:"fadeUp 0.3s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>صندوق پیام‌ها</h2>
          <p style={{ fontSize:12, color:C.textDim }}>پیام‌های دریافتی از واتساپ — {fa(total)} پیام</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={() => setPage(p => Math.max(0, p-1))} disabled={page <= 0} style={{
            padding:"8px 14px", borderRadius:8, border:"1px solid " + C.border,
            background: page <= 0 ? "transparent" : C.surfaceAlt, cursor: page <= 0 ? "not-allowed" : "pointer",
            color: page <= 0 ? C.textDim : C.text, fontFamily:FF, fontSize:12, fontWeight:600,
            opacity: page <= 0 ? 0.4 : 1
          }}>‹ قبلی</button>
          <span style={{ display:"flex", alignItems:"center", fontSize:12, color:C.textMuted, padding:"0 8px" }}>
            {fa(page + 1)} از {fa(Math.max(totalPages, 1))}
          </span>
          <button onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page >= totalPages - 1} style={{
            padding:"8px 14px", borderRadius:8, border:"1px solid " + C.border,
            background: page >= totalPages - 1 ? "transparent" : C.surfaceAlt,
            cursor: page >= totalPages - 1 ? "not-allowed" : "pointer",
            color: page >= totalPages - 1 ? C.textDim : C.text, fontFamily:FF, fontSize:12, fontWeight:600,
            opacity: page >= totalPages - 1 ? 0.4 : 1
          }}>بعدی ›</button>
          <button onClick={() => fetchMessages(page)} style={{
            padding:"8px 14px", borderRadius:8, border:"none",
            background:C.primaryDim, color:C.primary, cursor:"pointer",
            fontFamily:FF, fontSize:12, fontWeight:600,
            display:"flex", alignItems:"center", gap:4
          }}><Ic name="refresh" size={14} color={C.primary} /> تازه‌سازی</button>
        </div>
      </div>

      {loading ? <Spinner /> : messages.length === 0 ? (
        <Empty text="هنوز پیامی دریافت نشده است" icon="📭" />
      ) : (
        <div style={{ overflowX:"auto", borderRadius:12, border:`1px solid ${C.border}` }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:C.surfaceAlt }}>
                <th style={thStyle}>#</th>
                <th style={thStyle}>شماره فرستنده</th>
                <th style={thStyle}>متن پیام</th>
                <th style={thStyle}>تاریخ دریافت</th>
                <th style={thStyle}>عملیات</th>
              </tr>
            </thead>
            <tbody>
              {messages.map((msg, i) => (
                <tr key={msg.id} className="tr-hover" style={{ borderBottom:`1px solid ${C.border}` }}>
                  <td style={tdStyle}>{fa(page * PAGE_SIZE + i + 1)}</td>
                  <td style={{...tdStyle, direction:"ltr", textAlign:"right", fontFamily:"monospace", fontSize:12}}>
                    {fa(msg.sender_phone || "—")}
                  </td>
                  <td style={{...tdStyle, maxWidth:400, whiteSpace:"pre-wrap", wordBreak:"break-word"}}>
                    {msg.message_body || "—"}
                  </td>
                  <td style={{...tdStyle, whiteSpace:"nowrap", fontSize:12, color:C.textMuted}}>
                    {formatDate(msg.created_at)}
                  </td>
                  <td style={tdStyle}>
                    <button onClick={() => setLinkRow(msg)} style={{
                      padding:"4px 10px", borderRadius:6, border:`1px solid ${C.primary}`,
                      background:"transparent", color:C.primary, cursor:"pointer",
                      fontFamily:FF, fontSize:11, fontWeight:600, whiteSpace:"nowrap",
                    }}><Ic name="link" size={12} color={C.primary} /> اتصال</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {linkRow && (
        <div style={{
          position:"fixed", inset:0, zIndex:1000, background:"rgba(0,0,0,0.7)",
          display:"flex", alignItems:"center", justifyContent:"center", padding:20,
          animation:"fadeIn 0.15s ease"
        }} onClick={() => { setLinkRow(null); setLinkQuery(""); setLinkResults([]); }}>
          <div style={{
            background:C.surface, borderRadius:16, maxWidth:500, width:"100%",
            maxHeight:"90vh", overflow:"auto", padding:28, fontFamily:FF, color:C.text,
            animation:"fadeUp 0.2s ease", border:`1px solid ${C.border}`
          }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h2 style={{ fontSize:15, fontWeight:700 }}>اتصال دستی به مشتری</h2>
              <button onClick={() => { setLinkRow(null); setLinkQuery(""); setLinkResults([]); }}
                style={{ background:"none", border:"none", cursor:"pointer", color:C.textDim, fontSize:18 }}>✕</button>
            </div>
            <div style={{ fontSize:12, color:C.textMuted, marginBottom:12 }}>
              شماره: {fa(linkRow.sender_phone)} · {fa(linkRow.message_body?.slice(0,50))}{linkRow.message_body?.length>50?'...':''}
            </div>
            <input value={linkQuery} onChange={e => { const v=e.target.value; setLinkQuery(v); searchCustomers(v); }}
              style={{ width:"100%", padding:"10px 14px", borderRadius:8, border:`1px solid ${C.border}`,
                background:C.bg, color:C.text, fontFamily:FF, fontSize:13 }}
              placeholder="نام یا شماره مشتری را جستجو کنید" />
            <div style={{ marginTop:12, maxHeight:280, overflowY:"auto" }}>
              {linkLoading ? (
                <Spinner />
              ) : linkResults.length === 0 ? (
                <div style={{ textAlign:"center", padding:20, fontSize:13, color:C.textDim }}>
                  {linkQuery.length < 2 ? "حداقل ۲ کاراکتر وارد کنید" : "موردی یافت نشد"}
                </div>
              ) : (
                linkResults.map(c => (
                  <button key={c.id} onClick={() => handleManualLink(c)} disabled={linkSubmitting} style={{
                    display:"flex", justifyContent:"space-between", width:"100%", padding:"10px 14px",
                    borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt,
                    cursor:"pointer", fontFamily:FF, fontSize:13, color:C.text, marginBottom:6,

                ))
              )}

      )}

}

/* ═══════════════════════════════════════ SETTINGS PANEL ═══════════════════════════════ */
function SettingsPanel({ me, showToast }) {
  const [sections, setSections] = useState([]);
  const [activeSection, setActiveSection] = useState(null);
  const [formValues, setFormValues] = useState({});
  const [dirty, setDirty] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [users, setUsers] = useState([]);
  const [error, setError] = useState("");

  const SECTION_LABELS = {
    general:'عمومی', workflow:'گردش کار', assignments:'وظایف',
    appearance:'ظاهر', notifications:'اعلان‌ها', order:'سفارش', project:'پروژه'
  };

  useEffect(function() {
    setLoading(true);
    api('GET', 'settings').then(function(data) {
      var grouped = {};
      data.forEach(function(s) { if (!grouped[s.section]) grouped[s.section] = []; grouped[s.section].push(s); });
      var arr = Object.entries(grouped).map(function(e) { return { key:e[0], items:e[1] }; });
      setSections(arr);
      if (arr.length > 0) { setActiveSection(arr[0].key); initForm(arr[0].items); }
      api('GET', 'users').then(function(u) { setUsers(Array.isArray(u)?u:[]); }).catch(function(){});
      setLoading(false);
    }).catch(function(e) {
      setError(e.message);
      setLoading(false);
    });
  }, []);

  function initForm(items) { var v={}; items.forEach(function(s) { v[s.key]=s.value; }); setFormValues(v); setDirty({}); }

  function changeSection(key) {
    setActiveSection(key);
    var sec = null;
    for (var i = 0; i < sections.length; i++) { if (sections[i].key === key) { sec = sections[i]; break; } }
    if (sec) initForm(sec.items);
  }

  function setVal(key, val) { setFormValues(function(f) { var n={}; for (var k in f) n[k]=f[k]; n[key]=val; return n; }); setDirty(function(d) { var n={}; for (var k in d) n[k]=d[k]; n[key]=true; return n; }); }

  function saveAll() {
    var sec = null;
    for (var i = 0; i < sections.length; i++) { if (sections[i].key === activeSection) { sec = sections[i]; break; } }
    if (!sec) return;
    setSaving(true);
    var updates = [];
    sec.items.forEach(function(item) {
      if (dirty[item.key]) updates.push({ section:item.section, key:item.key, value:formValues[item.key] });
    });
    if (updates.length === 0) { showToast('تغییری اعمال نشد', 'warning'); setSaving(false); return; }
    api('PUT', 'settings', { settings: updates }).then(function() {
      showToast('تنظیمات با موفقیت ذخیره شد');
      setDirty({});
      setSaving(false);
    }).catch(function(e) {
      showToast(e.message, 'error');
      setSaving(false);
    });
  }

  function renderField(item) {
    var val = formValues[item.key];
    var inp = { style:{ width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid '+C.border, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 } };
    var type = item.type;
    if (type === 'boolean') {
      return React.createElement('label', { style:{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', userSelect:'none' } },
        React.createElement('div', { onClick:function(){ setVal(item.key, !val); }, style:{ width:40, height:22, borderRadius:11, background:val?C.primary:C.border, position:'relative', transition:'0.2s', flexShrink:0 } },
          React.createElement('div', { style:{ width:18, height:18, borderRadius:'50%', background:'#fff', position:'absolute', top:2, transition:'0.2s', left:val?20:2 } })
        ),
        React.createElement('span', { style:{ fontSize:12, color:C.text, fontWeight:600 } }, val?'فعال':'غیرفعال')
      );
    }
    if (type === 'color') {
      return React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:8 } },
        React.createElement('input', { type:'color', value:val||'#000000', onChange:function(e){ setVal(item.key, e.target.value); }, style:{ width:40, height:40, borderRadius:8, border:'none', cursor:'pointer', background:'transparent', padding:0 } }),
        React.createElement('input', { type:'text', value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, style:{ width:160, padding:'9px 12px', borderRadius:8, border:'1px solid '+C.border, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 } })
      );
    }
    if (type === 'image') {
      return React.createElement('div', null,
        React.createElement('input', { type:'text', value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, placeholder:'آدرس URL تصویر', style:inp.style }),
        val ? React.createElement('img', { src:val, alt:'', style:{ width:80, height:80, objectFit:'cover', borderRadius:8, marginTop:8, border:'1px solid '+C.border } }) : null
      );
    }
    if (type === 'select') {
      var opts = Array.isArray(item.options) ? item.options : [];
      return React.createElement('select', { value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, style:inp.style },
        opts.map(function(o) { return React.createElement('option', { key:o, value:o }, o); })
      );
    }
    if (type === 'json') {
      var str = typeof val==='string' ? val : JSON.stringify(val, null, 2);
      return React.createElement('textarea', { rows:4, value:str, onChange:function(e){ try { setVal(item.key, JSON.parse(e.target.value)); } catch(ex) { setVal(item.key, e.target.value); } }, style:Object.assign({}, inp.style, { fontFamily:'monospace', fontSize:12, direction:'ltr', textAlign:'left' }) });
    }
    if (type === 'textarea') {
      return React.createElement('textarea', { rows:3, value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, style:inp.style });
    }
    if (type === 'user_select') {
      return React.createElement('select', { value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, style:inp.style },
        React.createElement('option', { value:'' }, 'انتخاب کنید'),
        users.map(function(u) { return React.createElement('option', { key:u.id, value:u.id }, u.full_name||u.username); })
      );
    }
    if (type === 'multi_user_select') {
      var selected = Array.isArray(val) ? val : [];
      return React.createElement('div', { style:{ display:'flex', flexWrap:'wrap', gap:6 } },
        users.map(function(u) {
          var isSel = selected.indexOf(u.id) !== -1;
          return React.createElement('button', { key:u.id, onClick:function(){ setVal(item.key, isSel ? selected.filter(function(x){return x!==u.id}) : selected.concat([u.id])); }, style:{ padding:'5px 10px', borderRadius:6, border:'none', background:isSel?C.primary:C.surfaceAlt, color:isSel?'#111':C.text, fontSize:11, cursor:'pointer', fontFamily:FF, fontWeight:500 } }, u.full_name||u.username);
        })
      );
    }
    return React.createElement('input', { type:'text', value:val||'', onChange:function(e){ setVal(item.key, e.target.value); }, style:inp.style });
  }

  if (loading) return React.createElement('div', { style:{ display:'flex', justifyContent:'center', padding:48 } }, React.createElement('div', { style:{ width:32, height:32, border:'3px solid '+C.border, borderTop:'3px solid '+C.primary, borderRadius:'50%', animation:'spin 0.7s linear infinite' } }));
  if (error) return React.createElement('div', { style:{ color:C.danger, padding:24, textAlign:'center', fontSize:13 } }, 'خطا: '+error);

  var activeItems = [];
  for (var i = 0; i < sections.length; i++) { if (sections[i].key === activeSection) { activeItems = sections[i].items; break; } }
  var hasDirty = false; for (var k in dirty) { hasDirty = true; break; }

  return React.createElement('div', { style:{ maxWidth:900, margin:'0 auto' } },
    React.createElement('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20, flexWrap:'wrap', gap:10 } },
      React.createElement('h2', { style:{ fontSize:18, fontWeight:700, color:C.text } }, 'تنظیمات سیستم'),
      React.createElement('button', { onClick:saveAll, disabled:!hasDirty||saving, style:{ display:'inline-flex', alignItems:'center', gap:6, justifyContent:'center', padding:'8px 16px', borderRadius:8, border:'none', background:hasDirty&&!saving?C.primary:C.surfaceAlt, color:hasDirty&&!saving?'#111':C.textDim, cursor:hasDirty&&!saving?'pointer':'not-allowed', fontFamily:FF, fontSize:13, fontWeight:500, opacity:!hasDirty||saving?0.6:1 } }, saving?'در حال ذخیره...':'ذخیره تغییرات')
    ),
    React.createElement('div', { style:{ display:'flex', gap:4, marginBottom:20, flexWrap:'wrap' } },
      sections.map(function(sec) {
        var act = activeSection === sec.key;
        return React.createElement('button', { key:sec.key, onClick:function(){ changeSection(sec.key); }, style:{ padding:'8px 16px', borderRadius:8, border:'none', cursor:'pointer', background:act?C.primary:C.surface, color:act?'#111':C.text, fontFamily:FF, fontSize:13, fontWeight:act?700:500, transition:'0.15s' } }, SECTION_LABELS[sec.key]||sec.key);
      })
    ),
    React.createElement('div', { style:Object.assign({}, cardStyle, { padding:24 }) },
      activeItems.length === 0 ? React.createElement('div', { style:{ textAlign:'center', padding:'48px 20px', color:C.textDim, fontSize:13 } }, 'هیچ تنظیمی برای این بخش یافت نشد') : null,
      activeItems.map(function(item) {
        return React.createElement('div', { key:item.key, style:{ marginBottom:14 } },
          React.createElement('label', { style:{ display:'block', fontSize:11, marginBottom:5, color:C.textMuted, fontWeight:600 } }, item.label),
          renderField(item),
          item.description ? React.createElement('div', { style:{ fontSize:10, color:C.textDim, marginTop:4 } }, item.description) : null
        );
      })
    )
  );
}

/* ═══════════════════════════════════════ ORG CHART EDITOR ══════════════════════════════ */
function OrgChartEditor({ me, showToast }) {
  const [flat, setFlat] = useState([]);
  const [tree, setTree] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // { mode:'add'|'edit', node }
  const [form, setForm] = useState({ title:'', department:'', parent_id:'', user_id:'' });

  const userMap = {};
  users.forEach(function(u) { userMap[u.id] = u; });

  useEffect(() => { fetchTree(); }, []);

  async function fetchTree() {
    setLoading(true);
    try {
      const [orgData, usersData] = await Promise.all([
        api('GET', 'org-chart'),
        api('GET', 'users')
      ]);
      setFlat(orgData.flat || []);
      setTree(orgData.tree || []);
      setUsers(Array.isArray(usersData) ? usersData : (Array.isArray(usersData?.users) ? usersData.users : []));
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  function openAdd(parentId) {
    setForm({ title:'', department:'', parent_id:parentId||'', user_id:'' });
    setModal({ mode:'add' });
  }
  function openEdit(node) {
    setForm({ title:node.title, department:node.department||'', parent_id:node.parent_id||'', user_id:node.user_id||'' });
    setModal({ mode:'edit', node });
  }
  function closeModal() { setModal(null); }

  async function submit() {
    if (!form.title.trim()) { showToast('عنوان سمت الزامی است', 'warning'); return; }
    try {
      if (modal.mode === 'add') {
        await api('POST', 'org-chart', { title:form.title.trim(), department:form.department.trim(), parent_id:form.parent_id||null, user_id:form.user_id||null });
        showToast('سمت جدید اضافه شد');
      } else {
        await api('PUT', 'org-chart', { id:modal.node.id, title:form.title.trim(), department:form.department.trim(), parent_id:form.parent_id||null, user_id:form.user_id||null });
        showToast('سمت ویرایش شد');
      }
      closeModal();
      fetchTree();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function removeNode(node) {
    if (!confirm(`آیا از حذف "${node.title}" اطمینان دارید؟`)) return;
    try {
      await api('DELETE', 'org-chart', { id:node.id });
      showToast('سمت حذف شد');
      fetchTree();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function renderNode(node, depth=0) {
    return (
      <div key={node.id} style={{ marginRight:depth*24 }}>
        <div style={{
          display:'flex', alignItems:'center', gap:8, padding:'8px 12px',
          borderRadius:8, marginBottom:2, transition:'0.12s',
          cursor:'default', background:'transparent'
        }}>
          <div style={{
            width:28, height:28, borderRadius:8,
            background:C.primaryDim, display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:13
          }}>{'🏢'}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{node.title}</div>
            <div style={{ fontSize:10, color:C.textDim }}>{node.department}</div>
            {node.user_id && userMap[node.user_id] ? (
              <div style={{ fontSize:10, color:C.primary, marginTop:1, fontWeight:600 }}>{userMap[node.user_id].full_name || userMap[node.user_id].username}</div>
            ) : (
              <div style={{ fontSize:9, color:C.textMuted, marginTop:1 }}>بدون کاربر</div>
            )}
          </div>
          <button onClick={() => openEdit(node)} style={{ background:'transparent', border:'none', cursor:'pointer', padding:4 }}>
            <Ic name="edit" size={14} color={C.textDim} />
          </button>
          <button onClick={() => removeNode(node)} style={{ background:'transparent', border:'none', cursor:'pointer', padding:4 }}>
            <Ic name="trash" size={14} color={C.danger} />
          </button>
          <button onClick={() => openAdd(node.id)} title="افزودن زیرمجموعه" style={{
            width:24, height:24, display:'flex', alignItems:'center', justifyContent:'center',
            background:C.primaryDim, border:'none', cursor:'pointer', borderRadius:5,
            color:C.primary, fontSize:15, fontWeight:600, lineHeight:1, transition:'0.12s'
          }} onMouseOver={e => e.currentTarget.style.background='#D4880E44'} onMouseOut={e => e.currentTarget.style.background=C.primaryDim}>+</button>
        </div>
        {node.children && node.children.map(child => renderNode(child, depth+1))}
      </div>
    );
  }

  if (loading) return <Spinner />;

  return (
      <div style={{ maxWidth:800, margin:'0 auto' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <h2 style={{ fontSize:18, fontWeight:700, color:C.text }}>چارت سازمانی</h2>
        <button onClick={() => openAdd('')} style={{...glowBtn, padding:'8px 14px', fontSize:12}}>+ افزودن سمت</button>
      </div>
      <div style={{...cardStyle, padding:20 }}>
        {tree.length === 0 && <Empty text="چارت سازمانی خالی است" />}
        {tree.map(node => renderNode(node))}
      </div>

      {modal && (
        <div style={{ position:'fixed', inset:0, zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', background:'#000a' }} onClick={closeModal}>
          <div style={{ background:C.surface, borderRadius:14, width:'100%', maxWidth:420, padding:24, border:`1px solid ${C.border}`, margin:16 }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:20 }}>{modal.mode==='add' ? 'افزودن سمت جدید' : 'ویرایش سمت'}</h3>
            <Fld label="عنوان سمت">
              <input type="text" value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 }} />
            </Fld>
            <Fld label="دپارتمان">
              <input type="text" value={form.department} onChange={e => setForm(f=>({...f,department:e.target.value}))} style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 }} />
            </Fld>
            <Fld label="زیرمجموعه">
              <select value={form.parent_id} onChange={e => setForm(f=>({...f,parent_id:e.target.value}))} style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 }}>
                <option value="">بدون والد (ریشه)</option>
                {flat.filter(n => modal.mode==='edit' ? n.id!==modal.node.id : true).map(n => (
                  <option key={n.id} value={n.id}>{n.title}</option>
                ))}
              </select>
            </Fld>
            <Fld label="کاربر">
              <select value={form.user_id} onChange={e => setForm(f=>({...f,user_id:e.target.value}))} style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:`1px solid ${C.border}`, background:C.surfaceAlt, color:C.text, fontFamily:FF, fontSize:13 }}>
                <option value="">بدون انتساب</option>
                {users.map(u => (
                  <option key={u.id} value={u.id}>{u.full_name || u.username}</option>
                ))}
              </select>
            </Fld>
            <div style={{ display:'flex', gap:10, marginTop:20 }}>
              <button onClick={submit} style={{ flex:1, padding:'10px', borderRadius:10, border:'none', background:C.primary, color:'#111', fontWeight:700, cursor:'pointer', fontFamily:FF, fontSize:13 }}>{modal.mode==='add' ? 'افزودن' : 'ذخیره'}</button>
              <button onClick={closeModal} style={{ flex:1, padding:'10px', borderRadius:10, border:`1px solid ${C.border}`, background:'transparent', color:C.textDim, cursor:'pointer', fontFamily:FF, fontSize:13 }}>انصراف</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            </svg>
