# Azarmehr Backend — Render.com deployment config
# Browse:  https://dashboard.render.com/select-repo?type=web
#
# After linking this repository to Render:
#   1. Render reads this file automatically and creates the Web Service
#   2. Add the environment variables listed below in the Render dashboard
#   3. Deploy — Render runs `npm install` then `npm start`

services:
  - type: web
    name: azarmehr-backend
    runtime: node
    repo: https://github.com/bozorgmehr1355/azarmehr-backend
    branch: main                                    # ← Change to your deployment branch
    region: singapore                               # or frankfurt (closer to Iran)
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SETUP_ENABLED
        sync: false
      - key: SETUP_SECRET
        sync: false
      - key: SEED_PASSWORDS_JSON
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
